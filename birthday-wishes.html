<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axapri | 生日祝福</title>
    <link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafafa;
            padding: 20px;
            flex-direction: column;
            position: relative;
            padding-bottom: 70px; 
        }

        .wish-card {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fef7fb, #fcf1f7);
            z-index: 0;
        }

        .decor-left {
            top: -80px;
            left: -80px;
        }

        .decor-right {
            bottom: -80px;
            right: -80px;
            background: linear-gradient(135deg, #f5fafe, #eaf6fa);
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .birthday-title {
            font-size: 32px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 16px;
        }

        .birthday-title span {
            color: #ae3333;
        }

        .wish-text {
            font-size: 16px;
            line-height: 1.8;
            color: #4a5568;
            margin-bottom: 20px;
        }

        .signature {
            font-size: 14px;
            color: #718096;
            font-style: italic;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ae3333;
            opacity: 0;
            animation: confetti-fall 6s linear infinite;
            z-index: 0;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
        }

        @keyframes title-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .bottom-group {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        .back-home {
            color: #ae3333;
            text-decoration: none;
            margin-bottom: 6px;
            display: block;
        }
        .back-home:hover {
            text-decoration: underline;
        }
        .copyright {
            color: #999;
        }
    </style>
</head>

<body>
    <div class="wish-card">
        <div class="card-decoration decor-left"></div>
        <div class="card-decoration decor-right"></div>
        
        <div class="card-content">
            <h1 class="birthday-title">HAPPY <span>BIRTHDAY</span></h1>
            <p class="wish-text">
                愿你在新的一岁里，
                既有随处可栖的温柔，
                也有追风逐梦的骁勇。
                日子清透，世事温柔，
                生日快乐 🎂
            </p>
            <p class="signature">—— 致独一无二的你</p>
        </div>
    </div>

    <div class="bottom-group">
        <a href="index.html" class="back-home">首页</a>
        <div class="copyright">© 2026 Axapri · 记录学习与创作</div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const card = document.querySelector('.wish-card');
            card.style.opacity = 0;
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'all 0.8s ease';
            
            setTimeout(() => {
                card.style.opacity = 1;
                card.style.transform = 'translateY(0)';
                startSurprise();
            }, 300);
        });

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            const colors = ['#ae3333','#ed8936','#48bb78','#4299e1','#9f7aea'];
            confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
            confetti.style.left = `${Math.random()*100}%`;
            confetti.style.width = `${Math.random()*6+4}px`;
            confetti.style.height = `${Math.random()*6+4}px`;
            confetti.style.animationDuration = `${Math.random()*4+4}s`;
            
            document.querySelector('.wish-card').appendChild(confetti);
            setTimeout(()=>confetti.remove(),6000);
        }

        function startSurprise() {
            setInterval(createConfetti,50);
            const title = document.querySelector('.birthday-title');
            title.style.animation = 'title-pulse 2s ease-in-out infinite';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axapri | 随机抽签器</title>
    <link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f9fafb;
            color: #111827;
            padding: 20px;
        }

        /* 主容器 卡片式 */
        #container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.04);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* 标题 */
        .title {
            font-size: 32px;
            font-weight: 600;
            color: #111827;
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            color: #6b7280;
            text-align: center;
            line-height: 1.5;
        }

        /* 输入框 → 自动换行 */
        #names {
            width: 100%;
            min-height: 60px;
            max-height: 120px;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            font-size: 15px;
            background: #f9fafb;
            outline: none;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            resize: vertical;
        }

        #names:focus {
            border-color: #2563eb;
            background: #ffffff;
        }

        /* 结果展示 */
        #result {
            font-size: 48px;
            font-weight: 700;
            color: #2563eb;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            min-width: 160px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #d1d5db;
            transform: translateY(-2px);
        }

        /* 提示 */
        .tip {
            font-size: 14px;
            color: #6b7280;
            text-align: center;
        }

        /* 动画效果 */
        .draw-animation {
            animation: fadeScale 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 适配手机 */
        @media (max-width: 500px) {
            #container {
                padding: 24px;
            }
            .title {
                font-size: 28px;
            }
            #result {
                font-size: 36px;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="title">随机抽签器</div>
        <div class="subtitle">将想要抽签的数据输入在输入框内，数据用中文符号“，”隔开即可</div>

        <div id="names" contenteditable="true"></div>

        <div id="result"></div>

        <div class="btn-group">
            <button class="btn btn-primary" id="drawBtn">开始抽签</button>
            <button class="btn btn-secondary" id="resetBtn">重置清空</button>
        </div>

        <div class="tip">支持：点名、分组、抽奖、决策、活动抽签</div>
    </div>

    <script>
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        const namesInput = document.getElementById('names');
        const resultArea = document.getElementById('result');

        // 获取输入内容
        function getText() {
            return namesInput.innerText.trim();
        }

        // 抽签
        drawBtn.addEventListener('click', () => {
            const text = getText();
            if (!text) {
                resultArea.innerText = "请输入内容";
                resultArea.style.color = "#ef4444";
                return;
            }

            // 按中文逗号分割
            const list = text.split('，').filter(item => item.trim() !== '');
            
            if (list.length === 0) {
                resultArea.innerText = "请输入有效内容";
                resultArea.style.color = "#ef4444";
                return;
            }

            const random = list[Math.floor(Math.random() * list.length)];

            resultArea.innerText = random;
            resultArea.style.color = "#2563eb";
            resultArea.classList.add('draw-animation');
            
            setTimeout(() => {
                resultArea.classList.remove('draw-animation');
            }, 600);
        });

        // 重置
        resetBtn.addEventListener('click', () => {
            namesInput.innerText = '';
            resultArea.innerText = '';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-web-app-capable" content="yes">
    <title>Axapri | 定投计算器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 340px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            min-height: 310px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .form-item input,
        .form-item select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-item select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }

        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--theme);
            line-height:1.7;
        }

        .btn-box {
            display: flex;
            gap: 12px;
            margin: 22px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }

        #calcBtn {
            background: var(--theme);
            color: #fff;
        }

        #resetBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-arrow-trend-up"></i> 定投计算器
        </div>
        <div class="desc">基金/理财定投复利收益测算 · 本地离线运算</div>

        <div class="calc-box">
            <div class="form-item">
                <label>每期定投金额（元）</label>
                <input type="number" id="perMoney" value="1000">
            </div>

            <div class="form-item">
                <label>定投周期</label>
                <select id="cycleType">
                    <option value="week">每周定投</option>
                    <option value="month" selected>每月定投</option>
                    <option value="year">每年定投</option>
                </select>
            </div>

            <div class="form-item">
                <label>预期年化收益率（%）</label>
                <input type="number" id="yearRate" value="8.0">
            </div>

            <div class="form-item">
                <label>定投总年限</label>
                <input type="number" id="totalYear" value="5">
            </div>

            <div class="form-item">
                <label>定投起始年月</label>
                <input type="month" id="startMonth">
            </div>

            <div class="result-box" id="result">
                计算结果将显示在这里
            </div>
        </div>

        <div class="btn-box">
            <button id="calcBtn">立即计算</button>
            <button id="resetBtn">清空重置</button>
        </div>

        <div class="soft-text">
            采用标准年金复利公式计算<br>测算仅理论参考，不构成任何理财投资建议
        </div>
    </div>

    <script>
        const perMoney = document.getElementById('perMoney');
        const cycleType = document.getElementById('cycleType');
        const yearRate = document.getElementById('yearRate');
        const totalYear = document.getElementById('totalYear');
        const startMonth = document.getElementById('startMonth');
        const calcBtn = document.getElementById('calcBtn');
        const resetBtn = document.getElementById('resetBtn');
        const result = document.getElementById('result');

        // 默认当前年月
        let now = new Date();
        let defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        startMonth.value = defaultMonth;

        // 本地缓存
        function autoSave() {
            let saveObj = {
                per:perMoney.value,
                cycle:cycleType.value,
                rate:yearRate.value,
                year:totalYear.value,
                start:startMonth.value
            };
            localStorage.setItem('dingtouSave',JSON.stringify(saveObj));
        }

        // 页面读取缓存
        window.onload = function(){
            let cache = localStorage.getItem('dingtouSave');
            if(cache){
                let d = JSON.parse(cache);
                perMoney.value = d.per||1000;
                cycleType.value = d.cycle||'month';
                yearRate.value = d.rate||8.0;
                totalYear.value = d.year||5;
                startMonth.value = d.start||defaultMonth;
            }
        }

        // 核心计算
        function calcData(){
            let money = Number(perMoney.value);
            let rate = Number(yearRate.value);
            let year = Number(totalYear.value);
            if(money <= 0 || rate < 0 || year <=0){
                result.innerText = "请填写有效正数";
                return;
            }

            let perYearTimes;
            if(cycleType.value === 'week') perYearTimes = 52;
            else if(cycleType.value === 'month') perYearTimes =12;
            else perYearTimes =1;

            let totalTimes = perYearTimes * year;
            let perRate = rate / 100 / perYearTimes;
            // 普通年金终值公式
            let finalSum = money * ( (Math.pow(1+perRate,totalTimes)-1)/perRate );
            let costAll = money * totalTimes;
            let profit = finalSum - costAll;
            let yearAvgInput = costAll / year;
            let totalProfitRate = profit / costAll * 100;

            result.innerHTML = `
总投入本金：${costAll.toFixed(2)} 元<br>
年化投入：${yearAvgInput.toFixed(2)} 元<br>
理财总收益：${profit.toFixed(2)} 元<br>
总收益率：${totalProfitRate.toFixed(2)}%<br>
到期本息：${finalSum.toFixed(2)} 元
            `;
            autoSave();
        }

        // 重置
        function resetAll(){
            perMoney.value = "1000";
            cycleType.value = "month";
            yearRate.value = "8.0";
            totalYear.value = "5";
            startMonth.value = defaultMonth;
            result.innerText = "计算结果将显示在这里";
            localStorage.removeItem('dingtouSave');
        }

        // 绑定事件
        calcBtn.onclick = calcData;
        resetBtn.onclick = resetAll;
        [perMoney,yearRate,totalYear,startMonth].forEach(el=>el.oninput=autoSave);
        cycleType.onchange = autoSave;
    </script>
</body>
</html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }
        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
            --match-bg: #ffe8e8;
        }
        .theme-dark {
            --bg: #111827;
            --text: #f3f6f6;
            --subtext: #9ca3af;
            --border: #374151;
            --theme: #c94444;
            --card: #1f3133;
            --hover: #374151;
            --match-bg: #662222;
        }
        .theme-green {
            --bg: #f8fff9;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dcfce7;
            --theme: #16a34a;
            --card: #f0fdf4;
            --hover: #dcfce7;
            --match-bg: #d9ffde;
        }
        .theme-blue {
            --bg: #f8fafc;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dbeafe;
            --theme: #3b82f6;
            --card: #eff6ff;
            --hover: #dbeafe;
            --match-bg: #d0e7ff;
        }
        .theme-purple {
            --bg: #fdfaff;
            --text: #1e293b;
            --subtext: #475569;
            --border: #f3e8ff;
            --theme: #a855f7;
            --card: #faf5ff;
            --hover: #f3e8ff;
            --match-bg: #eed9ff;
        }
        .theme-yellow {
            --bg: #fffbeb;
            --text: #292524;
            --subtext: #78716c;
            --border: #fef3c7;
            --theme: #d97706;
            --card: #fffced;
            --hover: #fef3c7;
            --match-bg: #fff2cc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }
        .container {
            width: 100%;
            max-width: 340px;
        }
        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            min-height: 340px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }
        .form-item textarea,
        .form-item input,
        .form-item select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-item select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }
        .form-item textarea {
            resize: none;
            height: 80px;
        }
        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: left;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            line-height:1.7;
            word-break: break-all;
            min-height: 90px;
        }
        .btn-box {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 12px 0;
        }
        button {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }
        .runBtn {
            background: var(--theme);
            color: #fff;
        }
        .copyBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .clearBtn {
            background: var(--card);
            color: var(--subtext);
            border: 1px solid var(--border);
        }
        .soft-text {
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
        .tip-text {
            font-size: 12px;
            color: var(--subtext);
            line-height: 1.7;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.03);
        }
        .theme-dark .tip-text {
            background: rgba(255,255,255,0.05);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: var(--bg);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            visibility: visible;
        }
        .match-highlight {
            background-color: var(--match-bg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-code"></i> 正则表达式测试
        </div>
        <div class="desc">JS正则在线匹配，支持全局、忽略大小写、多行模式</div>
        <div class="calc-box">
            <div class="form-item">
                <label>正则表达式</label>
                <input type="text" id="regInput" placeholder="示例：\d+  /[a-z]/">
            </div>
            <div class="form-item">
                <label>匹配修饰符</label>
                <select id="flagSelect">
                    <option value="g">g 全局匹配</option>
                    <option value="gi">gi 全局+忽略大小写</option>
                    <option value="gm">gm 全局+多行模式</option>
                    <option value="gim">gim 全部开启</option>
                    <option value="i">i 仅忽略大小写</option>
                </select>
            </div>
            <div class="form-item">
                <label>待测试文本</label>
                <textarea id="contentInput" placeholder="粘贴需要匹配的原文内容"></textarea>
            </div>
            <div class="result-box" id="result">
                匹配结果、高亮内容将展示在此处
            </div>
        </div>
        <div class="btn-box">
            <button class="runBtn" id="runBtn">执行匹配</button>
            <button class="copyBtn" id="copyBtn">复制结果</button>
            <button class="clearBtn" id="clearBtn">清空</button>
        </div>
        <div class="soft-text">
            纯本地前端JS运算，数据不会上传服务器
        </div>
        <div class="tip-text">
            <strong>常用简易正则范例：</strong><br>
            数字：\d+  英文：[a-zA-Z]+  手机号：1[3-9]\d{9}  邮箱：\w+@\w+\.\w+
        </div>
    </div>
    <div class="toast" id="toast"></div>
<script>
    const regInput = document.getElementById('regInput');
    const flagSelect = document.getElementById('flagSelect');
    const contentInput = document.getElementById('contentInput');
    const runBtn = document.getElementById('runBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultBox = document.getElementById('result');
    const toast = document.getElementById('toast');
    let outputResult = "";

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function handleMatch() {
        let regStr = regInput.value.trim();
        const text = contentInput.value.trim();
        const flag = flagSelect.value;
        outputResult = "";
        if (!regStr) {
            resultBox.innerText = "请输入正则表达式";
            return;
        }
        if (!text) {
            resultBox.innerText = "请输入待匹配文本";
            return;
        }
        // 自动剔除首尾斜杠
        if (regStr.startsWith('/') && regStr.lastIndexOf('/') > 0) {
            regStr = regStr.slice(1, regStr.lastIndexOf('/'));
        }
        try {
            const reg = new RegExp(regStr, flag);
            const matchArr = text.match(reg);
            if (!matchArr || matchArr.length === 0) {
                resultBox.innerText = "✅ 正则语法正常，未匹配到任何内容";
                return;
            }
            outputResult = matchArr.join('\n');
            // 高亮匹配文本
            let html = text.replace(reg, `<span class="match-highlight">$&</span>`);
            resultBox.innerHTML = `匹配总数：${matchArr.length}\n匹配列表：\n${outputResult}\n\n原文高亮预览：\n${html}`;
        } catch (err) {
            resultBox.innerText = `❌ 正则语法错误：${err.message}`;
        }
    }

    clearBtn.addEventListener('click', () => {
        regInput.value = '';
        contentInput.value = '';
        resultBox.innerText = '匹配结果、高亮内容将展示在此处';
        outputResult = '';
        showToast('已清空');
    })

    async function copyResult() {
        if (!outputResult) {
            showToast('暂无匹配结果');
            return;
        }
        try {
            await navigator.clipboard.writeText(outputResult);
            showToast('复制成功');
        } catch (e) {
            const temp = document.createElement('textarea');
            temp.value = outputResult;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            showToast('已选中，直接粘贴');
        }
    }

    runBtn.addEventListener('click', handleMatch);
    copyBtn.addEventListener('click', copyResult);

    // 全局主题读取
    const localTheme = localStorage.getItem('site-theme');
    if (localTheme) document.body.className = `theme-${localTheme}`;
</script>
</body>

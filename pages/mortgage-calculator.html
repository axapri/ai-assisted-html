<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 房贷计算器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 340px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            min-height: 310px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .form-item input,
        .form-item select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-item select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }

        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--theme);
            line-height:1.7;
        }

        .btn-box {
            display: flex;
            gap: 12px;
            margin: 22px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }

        #calcBtn {
            background: var(--theme);
            color: #fff;
        }

        #resetBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-house-chimney"></i> 房贷计算器
        </div>
        <div class="desc">等额本息 / 等额本金双算法 · 住房贷款测算</div>

        <div class="calc-box">
            <div class="form-item">
                <label>贷款总额（万元）</label>
                <input type="number" id="loanMoney" value="100">
            </div>
            <div class="form-item">
                <label>贷款年利率（%）</label>
                <input type="number" id="yearRate" value="3.8">
            </div>
            <div class="form-item">
                <label>贷款年限（年）</label>
                <input type="number" id="loanYear" value="30">
            </div>
            <div class="form-item">
                <label>还款方式</label>
                <select id="payType">
                    <option value="avg-interest">等额本息</option>
                    <option value="avg-prin">等额本金</option>
                </select>
            </div>
            <div class="result-box" id="result">
                计算结果将显示在这里
            </div>
        </div>

        <div class="btn-box">
            <button id="calcBtn">立即计算</button>
            <button id="resetBtn">清空重置</button>
        </div>

        <div class="soft-text">
            测算结果仅供参考，实际月供以银行放款为准<br>等额本息月供固定，等额本金逐月递减
        </div>
    </div>

    <script>
        const loanMoney = document.getElementById('loanMoney');
        const yearRate = document.getElementById('yearRate');
        const loanYear = document.getElementById('loanYear');
        const payType = document.getElementById('payType');
        const calcBtn = document.getElementById('calcBtn');
        const resetBtn = document.getElementById('resetBtn');
        const result = document.getElementById('result');

        // 本地缓存保存
        function autoSave() {
            let saveData = {
                loan: loanMoney.value,
                rate: yearRate.value,
                year: loanYear.value,
                type: payType.value
            }
            localStorage.setItem('houseLoanData', JSON.stringify(saveData));
        }

        // 页面加载读取缓存
        window.onload = function () {
            let cache = localStorage.getItem('houseLoanData');
            if (cache) {
                let data = JSON.parse(cache);
                loanMoney.value = data.loan || 100;
                yearRate.value = data.rate || 3.8;
                loanYear.value = data.year || 30;
                payType.value = data.type || 'avg-interest';
            }
        }

        // 核心计算
        function calcData() {
            let loan = Number(loanMoney.value) * 10000;
            let monthRate = Number(yearRate.value) / 100 / 12;
            let monthTotal = Number(loanYear.value) * 12;

            if (loan <= 0 || monthRate <= 0 || monthTotal <= 0) {
                result.innerText = '请输入有效正数';
                return;
            }

            let monthPay, totalCost, totalInterest, tips;
            if (payType.value === 'avg-interest') {
                // 等额本息
                monthPay = loan * monthRate * Math.pow(1 + monthRate, monthTotal) / (Math.pow(1 + monthRate, monthTotal) - 1);
                totalCost = monthPay * monthTotal;
                totalInterest = totalCost - loan;
                tips = '每月月供固定不变';
            } else {
                // 等额本金
                let singlePrin = loan / monthTotal;
                let firstPay = singlePrin + loan * monthRate;
                let lastPay = singlePrin + singlePrin * monthRate;
                totalInterest = (firstPay + lastPay) * monthTotal / 2 - loan;
                totalCost = loan + totalInterest;
                monthPay = firstPay;
                tips = '首月月供最高，每月逐步减少';
            }

            result.innerHTML = `
首月月供：${monthPay.toFixed(2)} 元<br>
还款总利息：${totalInterest.toFixed(2)} 元<br>
还款总额：${totalCost.toFixed(2)} 元<br>
备注：${tips}
            `
            autoSave();
        }

        // 重置
        function resetAll() {
            loanMoney.value = '100';
            yearRate.value = '3.8';
            loanYear.value = '30';
            payType.value = 'avg-interest';
            result.innerText = '计算结果将显示在这里';
            localStorage.removeItem('houseLoanData');
        }

        // 绑定事件
        calcBtn.addEventListener('click', calcData);
        resetBtn.addEventListener('click', resetAll);
        [loanMoney, yearRate, loanYear].forEach(item => item.oninput = autoSave);
        payType.onchange = autoSave;
    </script>
</body>
</html>

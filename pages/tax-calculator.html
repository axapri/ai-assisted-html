<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 个税计算器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color: 0.25s ease, border-color: 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .form-item input,
        .form-item select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-item select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }

        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--theme);
            line-height:1.7;
        }

        .btn-box {
            display: flex;
            gap: 12px;
            margin: 22px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }

        #calcBtn {
            background: var(--theme);
            color: #fff;
        }

        #resetBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-money-bill-wave"></i> 个税计算器
        </div>
        <div class="desc">Personal Income Tax Calculator｜月薪+年终奖计税</div>

		<div style="background:var(--card);border:1px solid var(--border);color:var(--subtext);font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:16px;text-align:center;">
    		本工具仅作模拟测算参考，不构成税务建议，实际缴税额请以税务部门官方核算结果为准
		</div>

        <div class="calc-box">
            <div class="form-item">
                <label>税前月薪（元）</label>
                <input type="number" id="salary" value="15000">
            </div>
            <div class="form-item">
                <label>社保缴费基数（元）</label>
                <input type="number" id="base" value="15000">
            </div>
            <div class="form-item">
                <label>公积金个人比例 %</label>
                <input type="number" id="fundRate" value="12">
            </div>
            <div class="form-item">
                <label>专项附加扣除（元/月）</label>
                <input type="number" id="deduction" value="1000">
            </div>
            <div class="form-item">
                <label>全年一次性年终奖（元，无填0）</label>
                <input type="number" id="bonus" value="30000">
            </div>

            <div class="result-box" id="result">
                计算结果将显示在这里
            </div>
        </div>

        <div class="btn-box">
            <button id="calcBtn">立即计算</button>
            <button id="resetBtn">清空重置</button>
        </div>

        <div class="soft-text">
            起征点5000｜五险一金自动核算｜年终奖单独计税
        </div>
    </div>

    <script>
        const salary = document.getElementById('salary');
        const base = document.getElementById('base');
        const fundRate = document.getElementById('fundRate');
        const deduction = document.getElementById('deduction');
        const bonus = document.getElementById('bonus');
        const result = document.getElementById('result');
        const calcBtn = document.getElementById('calcBtn');
        const resetBtn = document.getElementById('resetBtn');

        const pensionRate = 8 / 100;
        const medRate = 2 / 100;
        const loseRate = 0.5 / 100;
        const threshold = 5000;

        function getMonthTax(taxable) {
            if(taxable <= 0) return 0;
            const table = [
                [3000,0.03,0],
                [12000,0.1,210],
                [25000,0.2,1410],
                [35000,0.25,2660],
                [55000,0.3,4410],
                [80000,0.35,7160],
                [Infinity,0.45,15160]
            ];
            for(let [max,rate,quick] of table){
                if(taxable <= max){
                    return taxable * rate - quick;
                }
            }
        }

        function getBonusTax(bon) {
            if(bon <=0) return 0;
            let avg = bon / 12;
            const table = [
                [3000,0.03,0],
                [12000,0.1,210],
                [25000,0.2,1410],
                [35000,0.25,2660],
                [55000,0.3,4410],
                [80000,0.35,7160],
                [Infinity,0.45,15160]
            ];
            for(let [max,rate,quick] of table){
                if(avg <= max){
                    return bon * rate - quick;
                }
            }
        }

        function calc(){
            let s = +salary.value || 0;
            let bs = +base.value || 0;
            let fr = +fundRate.value /100 ||0;
            let ded = +deduction.value ||0;
            let bon = +bonus.value ||0;

            let pension = bs * pensionRate;
            let med = bs * medRate;
            let lose = bs * loseRate;
            let fund = bs * fr;
            let fiveTotal = pension + med + lose + fund;

            let monthTaxable = s - fiveTotal - ded - threshold;
            let monthTax = getMonthTax(monthTaxable);
            let monthNet = s - fiveTotal - monthTax;

            let bonTax = getBonusTax(bon);
            let bonNet = bon - bonTax;

            result.innerHTML = `
五险合计：${fiveTotal.toFixed(2)}元<br>
月度个税：${monthTax.toFixed(2)}元<br>
税后月薪：${monthNet.toFixed(2)}元<br>
年终奖个税：${bonTax.toFixed(2)}元<br>
年终奖到手：${bonNet.toFixed(2)}元
            `;
            autoSave();
        }

        function resetAll(){
            salary.value = "15000";
            base.value = "15000";
            fundRate.value = "12";
            deduction.value = "1000";
            bonus.value = "30000";
            result.innerText = "计算结果将显示在这里";
            localStorage.removeItem('taxData');
        }

        function autoSave(){
            let data = {
                salary:salary.value,
                base:base.value,
                fundRate:fundRate.value,
                deduction:deduction.value,
                bonus:bonus.value
            };
            localStorage.setItem('taxData',JSON.stringify(data));
        }

        window.onload = function(){
            let d = localStorage.getItem('taxData');
            if(d){
                let obj = JSON.parse(d);
                salary.value = obj.salary||15000;
                base.value = obj.base||15000;
                fundRate.value = obj.fundRate||12;
                deduction.value = obj.deduction||1000;
                bonus.value = obj.bonus||30000;
            }
        };

        calcBtn.onclick = calc;
        resetBtn.onclick = resetAll;
        [salary,base,fundRate,deduction,bonus].forEach(el=>el.addEventListener('input',autoSave));
    </script>
</body>
</html>

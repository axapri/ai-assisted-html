<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 纪念日倒数器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }
        .theme-dark {
            --bg: #111827;
            --text: #f3f6f6;
            --subtext: #9ca3af;
            --border: #374151;
            --theme: #c94444;
            --card: #1f3133;
            --hover: #374151;
        }
        .theme-green {
            --bg: #f8fff9;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dcfce7;
            --theme: #16a34a;
            --card: #f0fdf4;
            --hover: #dcfce7;
        }
        .theme-blue {
            --bg: #f8fafc;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dbeafe;
            --theme: #3b82f6;
            --card: #eff6ff;
            --hover: #dbeafe;
        }
        .theme-purple {
            --bg: #fdfaff;
            --text: #1e293b;
            --subtext: #475569;
            --border: #f3e8ff;
            --theme: #a855f7;
            --card: #faf5ff;
            --hover: #f3e8ff;
        }
        .theme-yellow {
            --bg: #fffbeb;
            --text: #292524;
            --subtext: #78716c;
            --border: #fef3c7;
            --theme: #d97706;
            --card: #fffced;
            --hover: #fef3c7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .item {
            margin-bottom: 24px;
        }

        .item label {
            display: block;
            font-size: 15px;
            color: var(--subtext);
            margin-bottom: 8px;
        }

        input[type="date"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--card);
            color: var(--text);
            outline: none;
        }

        .btn-box {
            display: flex;
            gap: 14px;
            margin: 40px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        #startBtn {
            background: var(--theme);
            color: #fff;
        }

        #resetBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .result-box {
            padding-top: 30px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .event-name {
            font-size: 20px;
            color: var(--theme);
            margin-bottom: 15px;
        }

        .time-info {
            font-size: 16px;
            color: var(--text);
            margin: 6px 0;
        }

        .big-day {
            font-size: 48px;
            font-weight: 700;
            color: var(--theme);
            margin: 12px 0;
        }

        .soft-text {
            margin-top: 20px;
            font-size: 14px;
            color: var(--subtext);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-calendar-heart"></i>纪念日倒数器
        </div>
        <div class="desc">珍藏每一个特别的日子，静待温柔如期而至</div>

        <div class="item">
            <label>纪念日名称</label>
            <input type="text" id="eventName" placeholder="例如：生日、相遇、纪念日">
        </div>

        <div class="item">
            <label>纪念日日期</label>
            <input type="date" id="eventDate">
        </div>

        <div class="btn-box">
            <button id="startBtn">开始倒数</button>
            <button id="resetBtn">重置</button>
        </div>

        <div class="result-box">
            <div class="event-name" id="showName">——</div>
            <div class="big-day" id="showDay">0</div>
            <div class="time-info">距离纪念日还有 天</div>
            <div class="soft-text">平凡日子里，总有人和事值得我们静静等待</div>
        </div>
    </div>

    <script>
        // 同步全局主题
        document.body.className = localStorage.getItem('site-theme') ? 'theme-' + localStorage.getItem('site-theme') : '';

        const eventName = document.getElementById('eventName');
        const eventDate = document.getElementById('eventDate');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const showName = document.getElementById('showName');
        const showDay = document.getElementById('showDay');

        // 页面加载恢复
        window.onload = function(){
            eventName.value = localStorage.getItem('memo_name') || '';
            eventDate.value = localStorage.getItem('memo_date') || '';
        };

        // 计算倒数
        startBtn.onclick = function(){
            let name = eventName.value.trim();
            let date = eventDate.value;

            if(!name || !date){
                alert('请填写纪念日名称并选择日期');
                return;
            }

            let target = new Date(date).getTime();
            let now = Date.now();

            // 保存本地
            localStorage.setItem('memo_name', name);
            localStorage.setItem('memo_date', date);

            // 计算天数
            let diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            if(diff < 0) diff = Math.abs(diff);

            showName.innerText = name;
            showDay.innerText = diff;
        };

        // 重置
        resetBtn.onclick = function(){
            localStorage.removeItem('memo_name');
            localStorage.removeItem('memo_date');
            eventName.value = '';
            eventDate.value = '';
            showName.innerText = '——';
            showDay.innerText = '0';
        };
    </script>
</body>
</html>

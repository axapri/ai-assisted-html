<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 幸运抽签</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 340px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        input, select, textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-item select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }

        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: #333;
            line-height:1.7;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-box {
            display: flex;
            gap: 12px;
            margin: 22px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        button:active {
            transform: scale(0.96);
        }

        #drawBtn {
            background: var(--theme);
            color: #fff;
        }

        #resetBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }

        /* 居中提示弹窗 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-clone"></i> 幸运抽签
        </div>
        <div class="desc">随手抽一份好运，日日皆有小幸运</div>

        <div class="calc-box">
            <div class="form-item">
                <label>抽签类型</label>
                <select id="luckType">
                    <option>每日运势</option>
                    <option>暖心祝福</option>
                    <option>开心小寄语</option>
                    <option>生活小指引</option>
                </select>
            </div>

            <div class="result-box" id="result">
                点击下方按钮开始抽签
            </div>
        </div>

        <div class="btn-box">
            <button id="drawBtn">立即抽签</button>
            <button id="resetBtn">重置</button>
        </div>

        <div class="soft-text">
            趣味互动小工具｜抽取专属好运｜治愈日常心情
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const luckType = document.getElementById('luckType');
        const result = document.getElementById('result');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        const toast = document.getElementById('toast');

        // 居中提示
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        // 各类签文库
        const luckData = {
            "每日运势": [
                "今日运势极佳，万事顺心如意",
                "好运正在路上，保持轻松心情",
                "平淡日子也藏着小小惊喜",
                "心情明朗，诸事皆顺",
                "今日福气满满，快乐常伴左右"
            ],
            "暖心祝福": [
                "愿你被温柔以待，岁岁无忧",
                "所有美好，都如约而至",
                "心怀暖意，所见皆是温柔",
                "平安喜乐，万事胜意",
                "愿每一天都过得轻松又愉快"
            ],
            "开心小寄语": [
                "把烦恼丢掉，快乐才会上门",
                "认真生活，就能找到细碎欢喜",
                "嘴角上扬，好运自会降临",
                "简单一点，快乐多一点",
                "今天也要开开心心呀"
            ],
            "生活小指引": [
                "放慢脚步，感受当下美好",
                "大胆向前，你远比想象优秀",
                "接纳所有，生活处处有风景",
                "给自己一点时间，慢慢来也无妨",
                "保持热爱，奔赴下一场山海"
            ]
        };

        // 随机抽签
        drawBtn.onclick = function () {
            let type = luckType.value;
            let list = luckData[type];
            let randomText = list[Math.floor(Math.random() * list.length)];
            result.innerText = randomText;
            showToast("抽签成功，收获一份好运✨");
        };

        // 重置
        resetBtn.onclick = function () {
            result.innerText = "点击下方按钮开始抽签";
            showToast("已重置");
        };
    </script>
</body>
</html>

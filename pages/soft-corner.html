<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 心情标签</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 340px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        input, select, textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }

        textarea {
            resize: none;
            min-height: 120px;
            line-height: 1.5;
        }

        .form-item select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }

        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            line-height:1.7;
            white-space: pre-line;
            max-height: 220px;
            overflow-y: auto;
        }

        .btn-box {
            display: flex;
            gap: 12px;
            margin: 22px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        button:active {
            transform: scale(0.96);
        }

        #saveBtn {
            background: var(--theme);
            color: #fff;
        }

        #viewBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        #clearBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }

        /* 居中提示弹窗 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-feather"></i> 心情标签
        </div>
        <div class="desc">写给自己的温柔便签，安静保存，不被打扰</div>

        <div class="calc-box">
            <div class="form-item">
                <label>今天的心情</label>
                <select id="mood">
                    <option>平静</option>
                    <option>开心</option>
                    <option>温暖</option>
                    <option>疲惫</option>
                    <option>难过</option>
                    <option>治愈</option>
                </select>
            </div>

            <div class="form-item">
                <label>想写下的话</label>
                <textarea id="content" placeholder="在这里写下属于你的温柔..."></textarea>
            </div>

            <div class="result-box" id="result">
                便签会安静保存在这里
            </div>
        </div>

        <div class="btn-box">
            <button id="saveBtn">保存便签</button>
            <button id="viewBtn">查看便签</button>
            <button id="clearBtn">清空所有</button>
        </div>

        <div class="soft-text">
            本地离线保存｜不联网不上传｜多条记录不覆盖
        </div>
    </div>

    <!-- 居中提示框 -->
    <div class="toast" id="toast"></div>

    <script>
        const mood = document.getElementById('mood');
        const content = document.getElementById('content');
        const result = document.getElementById('result');
        const saveBtn = document.getElementById('saveBtn');
        const viewBtn = document.getElementById('viewBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');

        // 居中提示函数
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 获取所有便签
        function getNotes() {
            let data = localStorage.getItem('softNotes');
            return data ? JSON.parse(data) : [];
        }

        // 保存新便签
        saveBtn.onclick = () => {
            let text = content.value.trim();
            if (!text) {
                showToast("请输入内容再保存");
                return;
            }

            let notes = getNotes();
            let now = new Date();
            let time = now.toLocaleString();

            notes.unshift({
                mood: mood.value,
                content: text,
                time: time
            });

            localStorage.setItem('softNotes', JSON.stringify(notes));
            showToast("✅ 便签保存成功");
            result.innerText = "✅ 保存成功！\n点击【查看便签】查看所有记录";
            content.value = "";
        };

        // 查看所有便签
        viewBtn.onclick = () => {
            let notes = getNotes();
            if (notes.length === 0) {
                showToast("暂无便签记录");
                result.innerText = "暂无便签记录";
                return;
            }

            let str = "";
            notes.forEach((item, i) => {
                str += `【${i+1}】${item.time}\n心情：${item.mood}\n${item.content}\n\n`;
            });
            result.innerText = str;
        };

        // 清空所有
        clearBtn.onclick = () => {
            if (getNotes().length === 0) {
                showToast("暂无记录可清空");
                return;
            }
            localStorage.removeItem('softNotes');
            showToast("已清空所有便签");
            result.innerText = "已清空所有记录";
        };
    </script>
</body>
</html>

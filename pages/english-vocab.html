<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Axapri | 专升本英语单词背诵器</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
    --bg-color:#f5f7fa;
    --card-bg:#ffffff;
    --text-color:#222222;
    --sub-text:#555555;
    --border-color:#eeeeee;
    --main-color:#ae3333;
    --shadow:0 2px 10px rgba(0,0,0,0.08);
}
.eye-protect{
    --bg-color:#fff8e1;
    --card-bg:#fffef5;
}
.dark{
    --bg-color:#12141d;
    --card-bg:#202330;
    --text-color:#f5f5f5;
    --sub-text:#c5c5d8;
    --border-color:#333745;
    --shadow:0 2px 10px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html {scroll-behavior: smooth;}
body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background: var(--bg-color);
    min-height:100vh;
    color:var(--text-color);
    line-height:1.5;
    padding:20px 15px;
    transition: all 0.3s ease;
    font-size:14px;
}
.container{max-width:950px;margin:0 auto;}
.top-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:15px;color:var(--main-color);}

.data-panel{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    padding:12px;
    background:var(--card-bg);
    border-radius:10px;
    border:1px solid var(--border-color);
    margin-bottom:20px;
}
.data-item{
    padding:6px 12px;
    font-size:13px;
    color:var(--sub-text);
}
.data-item strong{color:var(--main-color);font-size:15px;}
.tool-bar{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
}
.tool-btn, select, .search-box {
    height: 38px;
    min-height: 38px;
    display: inline-flex;
    align-items:center;
    vertical-align: middle;
    box-sizing: border-box;
	width: 150px;
    flex-shrink: 0;
}
.tool-btn,select{
    padding:0 10px;
    border-radius:6px;
    border:1px solid var(--border-color);
    background:var(--card-bg);
    color:var(--text-color);
    cursor:pointer;
    font-size:14px;
    outline:none;
    transition: all 0.2s ease;
}
.tool-btn:hover,select:hover{border-color:var(--main-color);}
.tool-btn:active{transform:scale(0.96);}
.search-box{
    padding:0 10px;
    border-radius:6px;
    border:1px solid var(--border-color);
    background:var(--card-bg);
    color:var(--text-color);
    width:160px;
    outline:none;
    font-size:14px;
}
.search-box:focus{border-color:var(--main-color);}

.hot-title{
    font-size:17px;
    font-weight:600;
    margin:10px 0 18px;
    color:var(--main-color);
    border-left:5px solid var(--main-color);
    padding-left:12px;
}
.list-wrap{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:16px;
    margin-bottom:50px;
}
.item{
    background:var(--card-bg);
    padding:18px;
    border-radius:14px;
    border:1px solid var(--border-color);
    box-shadow:var(--shadow);
    transition: all 0.3s ease;
    min-height: 260px;
    height: auto;
    display: flex;
    flex-direction: column;
    position:relative;
    cursor: pointer;
}
.item:hover{transform: translateY(-4px);box-shadow: 0 6px 18px rgba(0,0,0,0.12);}
.word-text{
    font-size:18px;
    font-weight:bold;
    color:var(--main-color);
    margin-bottom:4px;
    display:flex;
    align-items:center;
    gap:6px;
    word-break: break-all;
}
.word-phonetic{font-size:13px;color:var(--sub-text);margin-bottom:6px;}
.word-level{display:inline-block;font-size:12px;padding:2px 6px;border-radius:4px;margin-bottom:6px;}
.level-high{background:#ffe8e8;color:#d8334a;}
.level-mid{background:#fff6e8;color:#e69500;}
.level-low{background:#e8f4ff;color:#2b7cd3;}
.word-exam-tag{
    font-size:11px;
    padding:2px 5px;
    background:#e3f2fd;
    color:#1565c0;
    border-radius:3px;
    display:inline-block;
    margin:4px 0;
}
.word-expand{
    font-size:12px;
    color:var(--sub-text);
    margin:6px 0;
    line-height:1.5;
}
.word-mean{
    font-size:14px;
    color:var(--sub-text);
    line-height:1.6;
    flex: 1;
    word-break: normal;
    transition: all 0.3s;
}
.hide-mean{
    opacity: 0;
    height: 0;
    overflow: hidden;
}
.word-sentence{font-size:12px;margin-top:6px;color:var(--sub-text);opacity:0.8;}
.card-foot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:12px;
    padding-top:8px;
    border-top:1px dashed var(--border-color);
    flex-wrap:wrap;
    gap:5px;
}
.card-btn{
    font-size:13px;
    color:var(--sub-text);
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:3px;
    transition:color 0.3s ease;
}
.card-btn:hover{color:var(--main-color);}
.card-btn.faved{color:var(--main-color);}
.card-btn.recited{color:#27ae60 !important;}
.card-btn.forget-act{color:#ff6700 !important;}
.full-screen-card{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:99999;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.full-card-box{
    background:var(--card-bg);
    width:100%;
    max-width:600px;
    padding:40px;
    border-radius:20px;
    text-align:center;
}
.full-card-operate{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}
.write-panel{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.65);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:15px;
}
.write-box{
    background:var(--card-bg);
    border-radius:16px;
    padding:30px;
    width:100%;
    max-width:520px;
    box-shadow:var(--shadow);
}
.write-progress{text-align:center;margin-bottom:15px;color:var(--sub-text);}
.write-set-line{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin:10px 0;
    font-size:13px;
    color:var(--sub-text);
}
.mode-switch{padding:6px 14px;border-radius:6px;border:none;background:var(--main-color);color:#fff;cursor:pointer;}
.write-word{font-size:22px;font-weight:bold;color:var(--main-color);margin-bottom:12px;min-height:30px;}
.write-input{
    width:100%;
    padding:12px 15px;
    border:1px solid var(--border-color);
    border-radius:10px;
    font-size:16px;
    margin:15px 0;
    outline:none;
    background:var(--card-bg);
    color:var(--text-color);
}
.write-btn-group{display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.write-submit,.write-next,.write-close,.write-prev{
    padding:10px 22px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-size:14px;
    opacity:0.9;
}
.write-submit{background:var(--main-color);color:#fff;}
.write-next{background:#3690ff;color:#fff;}
.write-prev{background:#6c5ce7;color:#fff;}
.write-close{background:#999;color:#fff;}
.result-tip{font-size:15px;text-align:center;min-height:22px;}
.toast{
    position:fixed;
    bottom:50px;
    left:50%;
    transform:translateX(-50%);
    background:var(--main-color);
    color:#fff;
    padding:12px 28px;
    border-radius:30px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:10000;
}
.toast.show{opacity:1;}
.confirm-modal{
    position: fixed;
    top: 0;left: 0;
    width: 100%;height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items:center;
    justify-content:center;
    z-index:10001;
    padding:20px;
}
.confirm-box{
    background: var(--card-bg);
    border-radius: 16px;
    width: 100%;
    max-width: 380px;
    padding: 30px;
    text-align: center;
}
.confirm-title{font-size: 18px;font-weight: 600;color: var(--main-color);margin-bottom: 15px;}
.confirm-content{font-size: 15px;color: var(--text-color);margin-bottom: 25px;line-height: 1.6;}
.confirm-btns{display: flex;gap: 15px;justify-content: center;}
.confirm-cancel,.confirm-ok{padding:10px 25px;border-radius:8px;border:none;cursor:pointer;font-size:14px;}
.confirm-cancel{background:#999;color:#fff;}
.confirm-ok{background:var(--main-color);color:#fff;}
/* 自定义每日数量居中弹窗 */
.daily-num-modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10002;
}
.daily-num-box{
    background:var(--card-bg);
    width:90%;
    max-width:360px;
    padding:30px;
    border-radius:16px;
    text-align:center;
}
.daily-num-title{
    font-size:17px;
    font-weight:600;
    color:var(--main-color);
    margin-bottom:20px;
}
.daily-num-inp{
    width:100%;
    padding:12px 15px;
    border:1px solid var(--border-color);
    border-radius:8px;
    font-size:15px;
    outline:none;
    background:var(--card-bg);
    color:var(--text-color);
    margin-bottom:25px;
    text-align:center;
}
.daily-num-tip{
    font-size:13px;
    color:var(--sub-text);
    margin-bottom:20px;
}
.daily-num-btns{
    display:flex;
    gap:12px;
    justify-content:center;
}
.daily-num-cancel,.daily-num-sure{
    padding:9px 24px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-size:14px;
}
.daily-num-cancel{background:#999;color:#fff;}
.daily-num-sure{background:var(--main-color);color:#fff;}
.add-word-modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10003;
    padding:15px;
}
.add-word-box{
    background:var(--card-bg);
    width:100%;
    max-width:420px;
    padding:25px;
    border-radius:16px;
}
.add-word-title{
    font-size:17px;
    font-weight:600;
    color:var(--main-color);
    text-align:center;
    margin-bottom:20px;
}
.add-item{
    margin-bottom:15px;
}
.add-item label{
    display:block;
    font-size:13px;
    color:var(--sub-text);
    margin-bottom:5px;
}
.add-item input,.add-item select,.add-item textarea{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border-color);
    border-radius:8px;
    background:var(--card-bg);
    color:var(--text-color);
    font-size:14px;
    outline:none;
}
.add-item textarea{resize:none;min-height:60px;}
.add-word-btns{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:10px;
}
.add-cancel,.add-sure{
    padding:9px 24px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-size:14px;
}
.add-cancel{background:#999;color:#fff;}
.add-sure{background:var(--main-color);color:#fff;}
#fileInput{display:none;}
</style>
</head>
<body>
<div class="container">
    <h2 class="top-title">专升本英语核心词汇背诵</h2>

    <div class="data-panel" id="dataPanel">
        <div class="data-item">总词汇：<strong id="totalWord">0</strong></div>
        <div class="data-item">已背诵：<strong id="reciteWord">0</strong></div>
        <div class="data-item">未背诵：<strong id="noReciteWord">0</strong></div>
        <div class="data-item">错题数量：<strong id="errorWord">0</strong></div>
        <div class="data-item">收藏数量：<strong id="collectWord">0</strong></div>
        <div class="data-item">易忘单词：<strong id="forgetWord">0</strong></div>
    </div>

    <div class="tool-bar">

		<button class="tool-btn" id="planBtn">每日背词</button>

        <select id="typeSelect">
            <option value="a">A开头词汇</option>
            <option value="b">B开头词汇</option>
            <option value="c">C开头词汇</option>
            <option value="d">D开头词汇</option>
            <option value="e">E开头词汇</option>
            <option value="f">F开头词汇</option>
            <option value="g">G开头词汇</option>
            <option value="h">H开头词汇</option>
            <option value="i">I开头词汇</option>
            <option value="j">J开头词汇</option>
            <option value="k">K开头词汇</option>
            <option value="l">L开头词汇</option>
            <option value="m">M开头词汇</option>
            <option value="n">N开头词汇</option>
            <option value="o">O开头词汇</option>
            <option value="p">P开头词汇</option>
            <option value="q">Q开头词汇</option>
            <option value="r">R开头词汇</option>
            <option value="s">S开头词汇</option>
            <option value="t">T开头词汇</option>
            <option value="u">U开头词汇</option>
            <option value="v">V开头词汇</option>
            <option value="w">W开头词汇</option>
            <option value="x">X开头词汇</option>
            <option value="y">Y开头词汇</option>
            <option value="z">Z开头词汇</option>
            <option value="phrase">高频短语</option>
            <option value="sentence">作文句型</option>
            <option value="wrongbook">我的错题本</option>
            <option value="forgetBook">易忘单词本</option>
            <option value="allRecite">已背单词</option>
            <option value="noRecite">未背单词</option>
            <option value="reviewPlan">复习单词</option>
            <option value="filterHigh">仅高频必考</option>
            <option value="filterMid">仅中频常考</option>
            <option value="filterLow">仅低频拓展</option>
            <!-- 新增：自定义生词分类 -->
            <option value="custom">自定义生词</option>
        </select>

        <select id="modeSelect">
            <option value="">学习模式</option>
            <option value="orderSort">顺序排列</option>
            <option value="randomSort">乱序排列</option>
            <option value="voiceUs">美式发音</option>
            <option value="voiceUk">英式发音</option>
            <option value="styleDefault">默认浅色</option>
            <option value="styleEye">护眼模式</option>
            <option value="styleDark">深色模式</option>
            <option value="autoTheme">自动昼夜主题</option>
            <option value="normal">正常浏览</option>
            <option value="blindRead">盲记模式(点击显释义)</option>
            <option value="write">普通单词默写</option>
            <option value="dictation">标准单词听写</option>
            <option value="randomWrite">全局随机默写</option>
            <option value="errorWrite">错题专项默写</option>
            <option value="collectWrite">收藏单词默写</option>
            <option value="todayPlanWrite">今日计划默写</option>
            <option value="phraseWrite">短语专项默写</option>
            <option value="fullSpeed">全屏速记</option>
            <option value="addWord">添加生词</option>
        </select>

        <select id="batchSelect">
            <option value="">快捷操作</option>
            <option value="batchRecite">批量已背</option>
            <option value="batchCollect">批量收藏</option>
            <option value="batchForget">批量易忘</option>
            <option value="batchClearRecite">取消背诵</option>
        </select>

        <select id="toolSelect">
            <option value="">工具操作</option>
            <option value="exportAll">导出当前</option>
            <option value="exportCollect">导出收藏</option>
            <option value="printWord">打印单词</option>
            <option value="clearCollect">清空收藏</option>
            <option value="clearWrong">清空错题</option>
            <option value="clearRecited">清空已背</option>
            <option value="resetTodayPlan">重置今日进度</option>
            <option value="resetAll">重置全部数据</option>
        </select>

		<input class="search-box" id="searchInp" placeholder="搜索单词/释义">

    </div>

    <div class="hot-title" id="hotTitle">A开头单词 · 专升本高频词汇</div>
    <div class="list-wrap" id="wordList"></div>
</div>

<div class="full-screen-card" id="fullCardBox">
    <div class="full-card-box" id="fullCardContent"></div>
</div>

<div class="write-panel" id="writePanel">
    <div class="write-box">
        <div class="write-progress" id="writeProgress">进度：0/0</div>
        <div class="write-mode" style="display:flex;align-items:center;justify-content:center;gap:15px;flex-wrap:wrap;margin-bottom:10px;">
            <button class="mode-switch" id="switchWriteMode">切换：中译英</button>
            <label class="write-set-line">
                <input type="checkbox" id="autoAddForgetCheck" checked>
                答错自动加入易忘词
            </label>
        </div>
        <div class="write-word" id="writeWord">中文释义</div>
        <input class="write-input" id="writeInput" placeholder="仅输入英文单词(回车快速提交)">
        <div class="result-tip" id="resultTip"></div>
        <div class="write-btn-group">
            <button class="write-close" id="btnCloseWrite">关闭弹窗</button>
            <button class="write-prev" id="btnPrevWord">上一个</button>
            <button class="write-submit" id="btnCheck">核对答案</button>
            <button class="write-next" id="btnNextWord">下一个</button>
        </div>
    </div>
</div>

<div class="confirm-modal" id="confirmModal">
    <div class="confirm-box">
        <div class="confirm-title">操作确认</div>
        <div class="confirm-content" id="confirmContent">确定要执行此操作吗？</div>
        <div class="confirm-btns">
            <button class="confirm-cancel" id="confirmCancel">取消</button>
            <button class="confirm-ok" id="confirmOk">确定</button>
        </div>
    </div>
</div>

<div class="daily-num-modal" id="dailyNumModal">
    <div class="daily-num-box">
        <div class="daily-num-title">设置每日背诵单词数量</div>
        <div class="daily-num-tip">当前每日目标：<span id="nowDailyNum">30</span> 个</div>
        <input type="number" class="daily-num-inp" id="dailyNumInp" placeholder="请输入1-100之间数字">
        <div class="daily-num-btns">
            <button class="daily-num-cancel" id="closeDailyNum">取消</button>
            <button class="daily-num-sure" id="sureDailyNum">确定设置</button>
        </div>
    </div>
</div>

<!-- 新增：添加生词弹窗 -->
<div class="add-word-modal" id="addWordModal">
    <div class="add-word-box">
        <div class="add-word-title">自定义添加生词</div>
        <div class="add-item">
            <label>英文单词 <span style="color:red">*</span></label>
            <input type="text" id="addWordVal" placeholder="请输入英文单词">
        </div>
        <div class="add-item">
            <label>音标</label>
            <input type="text" id="addPhoneticVal" placeholder="例：/æbændən/">
        </div>
        <div class="add-item">
            <label>中文释义 <span style="color:red">*</span></label>
            <input type="text" id="addMeanVal" placeholder="多个释义用逗号分隔">
        </div>
        <div class="add-item">
            <label>例句</label>
            <textarea id="addSentenceVal" placeholder="填写实用例句"></textarea>
        </div>
        <div class="add-item">
            <label>考频等级</label>
            <select id="addLevelVal">
                <option value="high">高频必考</option>
                <option value="mid" selected>中频常考</option>
                <option value="low">低频拓展</option>
            </select>
        </div>
        <div class="add-word-btns">
            <button class="add-cancel" id="closeAddWord">取消</button>
            <button class="add-sure" id="sureAddWord">确认添加</button>
        </div>
    </div>
</div>

<!-- 编辑生词弹窗（复用添加弹窗样式） -->
<div class="add-word-modal" id="editWordModal">
    <div class="add-word-box">
        <div class="add-word-title">编辑自定义生词</div>
        <div class="add-item">
            <label>英文单词 <span style="color:red">*</span></label>
            <input type="text" id="editWordVal" placeholder="请输入英文单词">
        </div>
        <div class="add-item">
            <label>音标</label>
            <input type="text" id="editPhoneticVal" placeholder="例：/æbændən/">
        </div>
        <div class="add-item">

<script>
const typeNameMap = {
a:"A开头单词 · 专升本高频词汇",b:"B开头单词 · 专升本高频词汇",
c:"C开头单词 · 专升本高频词汇",d:"D开头单词 · 专升本高频词汇",
e:"E开头单词 · 专升本高频词汇",f:"F开头单词 · 专升本高频词汇",
g:"G开头单词 · 专升本高频词汇",h:"H开头单词 · 专升本高频词汇",
i:"I开头单词 · 专升本高频词汇",j:"J开头单词 · 专升本高频词汇",
k:"K开头单词 · 专升本高频词汇",l:"L开头单词 · 专升本高频词汇",
m:"M开头单词 · 专升本高频词汇",n:"N开头单词 · 专升本高频词汇",
o:"O开头单词 · 专升本高频词汇",p:"P开头单词 · 专升本高频词汇",
q:"Q开头单词 · 专升本高频词汇",r:"R开头单词 · 专升本高频词汇",
s:"S开头单词 · 专升本高频词汇",t:"T开头单词 · 专升本高频词汇",
u:"U开头单词 · 专升本高频词汇",v:"V开头单词 · 专升本高频词汇",
w:"W开头单词 · 专升本高频词汇",x:"X开头单词 · 专升本高频词汇",
y:"Y开头单词 · 专升本高频词汇",z:"Z开头单词 · 专升本高频词汇",
phrase:"专升本必考英语短语",sentence:"英语作文万能高分句型",
wrongbook:"个人单词错题本",forgetBook:"易忘单词专属本",
allRecite:"全部已背诵单词合集",noRecite:"全部未背诵单词合集",
reviewPlan:"艾宾浩斯每日复习单词",
filterHigh:"仅高频必考词汇",filterMid:"仅中频常考词汇",filterLow:"仅低频拓展词汇",
// 自定义生词名称
custom:"自定义生词本"
};

let nowType = localStorage.getItem("wordCardType") || "a";
let isDark = localStorage.getItem("darkMode") === "1";
let isEye = localStorage.getItem("eyeMode") === "1";
let voiceType = localStorage.getItem("voiceType") || "us";
let sortType = "order";
let collectWords = JSON.parse(localStorage.getItem("wordCollect")) || [];
let wrongWords = JSON.parse(localStorage.getItem("wordWrong")) || [];
let recitedWords = JSON.parse(localStorage.getItem("recitedWords")) || [];
let forgetWords = JSON.parse(localStorage.getItem("forgetWords")) || [];
let reviewRecord = JSON.parse(localStorage.getItem("reviewRecord")) || {};
let dailyPlan = JSON.parse(localStorage.getItem("dailyPlan")) || {num:30,finish:0,date:""};
let showCollect = false;
let currentWriteList = [];
let currentWriteIndex = 0;
let isRandomWrite = false;
let writeMode = 1;
let confirmCallback = null;
let isBlindMode = false;
let manualThemeSet = localStorage.getItem("manualThemeSet") === "1";
let voiceTimer = null;
let autoAddForget = true;
// 自定义生词数组
let customUserWords = JSON.parse(localStorage.getItem("customUserWords")) || [];
// 编辑生词索引
let currentEditIndex = -1;

const listDom = document.getElementById('wordList');
const searchInp = document.getElementById('searchInp');
const toast = document.getElementById('toast');
const typeSelect = document.getElementById('typeSelect');
const hotTitle = document.getElementById('hotTitle');
const modeSelect = document.getElementById('modeSelect');
const batchSelect = document.getElementById('batchSelect');
const planBtn = document.getElementById('planBtn');
const toolSelect = document.getElementById('toolSelect');
const writePanel = document.getElementById('writePanel');
const writeWord = document.getElementById('writeWord');
const writeInput = document.getElementById('writeInput');
const resultTip = document.getElementById('resultTip');
const writeProgress = document.getElementById('writeProgress');
const switchWriteMode = document.getElementById('switchWriteMode');
const confirmModal = document.getElementById('confirmModal');
const confirmContent = document.getElementById('confirmContent');
const confirmCancel = document.getElementById('confirmCancel');
const confirmOk = document.getElementById('confirmOk');
const fullCardBox = document.getElementById('fullCardBox');
const fullCardContent = document.getElementById('fullCardContent');
const fileInput = document.getElementById('fileInput');
const autoAddForgetCheck = document.getElementById('autoAddForgetCheck');
const dailyNumModal = document.getElementById('dailyNumModal');
const dailyNumInp = document.getElementById('dailyNumInp');
const nowDailyNum = document.getElementById('nowDailyNum');
const closeDailyNum = document.getElementById('closeDailyNum');
const sureDailyNum = document.getElementById('sureDailyNum');
// 添加生词弹窗DOM
const addWordModal = document.getElementById('addWordModal');
const closeAddWord = document.getElementById('closeAddWord');
const sureAddWord = document.getElementById('sureAddWord');
// 编辑生词弹窗DOM
const editWordModal = document.getElementById('editWordModal');
const closeEditWord = document.getElementById('closeEditWord');
const sureEditWord = document.getElementById('sureEditWord');

function filterEnglishOnly(val){
    return val.replace(/[^a-zA-Z\s-]/g,'');
}
function autoSwitchTheme(){
    if(manualThemeSet) return;
    let hour = new Date().getHours();
    if(hour >=6 && hour < 18){
        isEye = false;isDark = false;
        document.body.classList.remove("eye-protect","dark");
    }else if(hour >=18 && hour <21){
        isEye = true;isDark = false;
        document.body.classList.remove("dark");
        document.body.classList.add("eye-protect");
    }else{
        isEye = false;isDark = true;
        document.body.classList.remove("eye-protect");
        document.body.classList.add("dark");
    }
}
function getTodayDate() {
    return new Date().toISOString().split('T')[0];
}
function checkDailyPlanReset() {
    const today = getTodayDate();
    if (dailyPlan.date !== today) {
        dailyPlan.finish = 0;
        dailyPlan.date = today;
        localStorage.setItem("dailyPlan", JSON.stringify(dailyPlan));
    }
}
function filterSearchWords(list, keyword) {
    if (!keyword.trim()) return list;
    const kw = keyword.toLowerCase();
    return list.filter(item => {
        const word = (item.word || item.phrase || item.sentence || "").toLowerCase();
        const mean = (item.mean || item.translation || "").toLowerCase();
        const phonetic = (item.phonetic || "").toLowerCase();
        return word.includes(kw) || mean.includes(kw) || phonetic.includes(kw);
    });
}
function getTrimLowStr(str){
    return str.trim().toLowerCase().replace(/\s+/g,'');
}
function checkWordAnswer(userInput,rightAns){
    let user = getTrimLowStr(userInput);
    let right = getTrimLowStr(rightAns);
    if(user === right) return {isOk:true,tip:"回答正确"};
    if(Math.abs(user.length - right.length) <= 2){
        return {isOk:false,tip:`拼写接近，正确答案：${rightAns}`};
    }
    return {isOk:false,tip:`答案错误，正确：${rightAns}`};
}
function pushNoRepeat(arr,item,key){
    let exist = arr.some(v=>getTrimLowStr(v[key]||"") === getTrimLowStr(item[key]||""));
    if(!exist) arr.push(item);
}
function delArrItem(arr,word){
    let idx = arr.findIndex(v=>getTrimLowStr(v.word||v.phrase||v.sentence||"") === getTrimLowStr(word));
    if(idx>-1) arr.splice(idx,1);
}

function initDataCount(){
    let allWord = getAllBaseWords().length + customUserWords.length;
    let reciteNum = recitedWords.length;
    let noReciteNum = allWord - reciteNum;
    document.getElementById('totalWord').innerText = allWord;
    document.getElementById('reciteWord').innerText = reciteNum;
    document.getElementById('noReciteWord').innerText = noReciteNum;
    document.getElementById('errorWord').innerText = wrongWords.length;
    document.getElementById('collectWord').innerText = collectWords.length;
    document.getElementById('forgetWord').innerText = forgetWords.length;
}
function speakWord(text,repeat=1){
    if(!window.speechSynthesis) return;
    clearTimeout(voiceTimer);
    speechSynthesis.cancel();
    let lang = voiceType==="us" ? "en-US" : "en-GB";
    voiceTimer = setTimeout(()=>{
        let timer = 0;
        for(let i=0;i<repeat;i++){
            setTimeout(()=>{
                let utter = new SpeechSynthesisUtterance(text);
                utter.lang = lang;
                speechSynthesis.speak(utter);
            },timer);
            timer += 800;
        }
    },200);
}
function openConfirmModal(content, callback) {
    confirmContent.innerText = content;
    confirmCallback = callback;
    confirmModal.style.display = "flex";
}
function closeConfirmModal() {
    confirmModal.style.display = "none";
    confirmCallback = null;
}
function getAllBaseWords(){
    let all = [];
    Object.keys(wordData).forEach(key=>{
        if(key !== "wrongbook" && key !== "forgetBook") all = all.concat(wordData[key]);
    });
    return all;
}
function getReciteFilterWords(type){
    let allWords = getAllBaseWords().concat(customUserWords);
    if(type === "allRecite"){
        return allWords.filter(item=>{
            let w = item.word||item.phrase||item.sentence||"";
            return recitedWords.includes(w);
        });
    }
    if(type === "noRecite"){
        return allWords.filter(item=>{
            let w = item.word||item.phrase||item.sentence||"";
            return !recitedWords.includes(w);
        });
    }
    return [];
}
function getLevelFilterWords(level){
    return getAllBaseWords().concat(customUserWords).filter(item=>item.level === level);
}

// 添加生词功能
function openAddWordModal(){
    document.getElementById('addWordVal').value = '';
    document.getElementById('addPhoneticVal').value = '';
    document.getElementById('addMeanVal').value = '';
    document.getElementById('addSentenceVal').value = '';
    document.getElementById('addLevelVal').value = 'mid';
    addWordModal.style.display = "flex";
}
closeAddWord.onclick = () => addWordModal.style.display = "none";
sureAddWord.onclick = () => {
    let word = document.getElementById('addWordVal').value.trim();
    let mean = document.getElementById('addMeanVal').value.trim();
    if(!word || !mean) {
        showTip('单词和释义不能为空！');
        return;
    }
    // 去重判断
    let exist = customUserWords.some(i => getTrimLowStr(i.word) === getTrimLowStr(word));
    if(exist) {
        showTip('该单词已存在！');
        return;
    }
    // 新增生词
    let newWord = {
        word:word,
        phonetic:document.getElementById('addPhoneticVal').value.trim(),
        mean:mean,
        sentence:document.getElementById('addSentenceVal').value.trim(),
        level:document.getElementById('addLevelVal').value
    };
    customUserWords.push(newWord);
    localStorage.setItem('customUserWords', JSON.stringify(customUserWords));
    addWordModal.style.display = "none";
    showTip('✅ 生词添加成功！');
    renderList(getNowData());
    initDataCount();
};

// 打开编辑生词弹窗
function openEditWordModal(index){
    if(index <0 || index >= customUserWords.length) return;
    currentEditIndex = index;
    let item = customUserWords[index];
    document.getElementById('editWordVal').value = item.word || '';
    document.getElementById('editPhoneticVal').value = item.phonetic || '';
    document.getElementById('editMeanVal').value = item.mean || '';
    document.getElementById('editSentenceVal').value = item.sentence || '';
    document.getElementById('editLevelVal').value = item.level || 'mid';
    editWordModal.style.display = "flex";
}
// 关闭编辑弹窗
closeEditWord.onclick = () => editWordModal.style.display = "none";
// 确认编辑生词
sureEditWord.onclick = () => {
    if(currentEditIndex <0) return;
    let word = document.getElementById('editWordVal').value.trim();
    let mean = document.getElementById('editMeanVal').value.trim();
    if(!word || !mean) {
        showTip('单词和释义不能为空！');
        return;
    }
    // 更新生词数据
    customUserWords[currentEditIndex] = {
        word:word,
        phonetic:document.getElementById('editPhoneticVal').value.trim(),
        mean:mean,
        sentence:document.getElementById('editSentenceVal').value.trim(),
        level:document.getElementById('editLevelVal').value
    };
    localStorage.setItem('customUserWords', JSON.stringify(customUserWords));
    editWordModal.style.display = "none";
    showTip('✅ 生词编辑成功！');
    renderList(getNowData());
    initDataCount();
};

// 删除自定义生词
function deleteCustomWord(index){
    if(index <0 || index >= customUserWords.length) return;
    openConfirmModal('确定删除该自定义生词吗？删除后不可恢复！', ()=>{
        let word = customUserWords[index].word;
        // 同步删除关联数据
        delArrItem(recitedWords, word);
        delArrItem(collectWords, word);
        delArrItem(wrongWords, word);
        delArrItem(forgetWords, word);
        // 删除自定义生词
        customUserWords.splice(index, 1);
        localStorage.setItem('customUserWords', JSON.stringify(customUserWords));
        localStorage.setItem('recitedWords', JSON.stringify(recitedWords));
        localStorage.setItem('wordCollect', JSON.stringify(collectWords));
        localStorage.setItem('wordWrong', JSON.stringify(wrongWords));
        localStorage.setItem('forgetWords', JSON.stringify(forgetWords));
        showTip('🗑️ 生词删除成功！');
        renderList(getNowData());
        initDataCount();
    });
}

function init(){
    checkDailyPlanReset();
    autoSwitchTheme();
    if(isDark) document.body.classList.add("dark");
    if(isEye) document.body.classList.add("eye-protect");
    typeSelect.value = nowType;
    hotTitle.innerText = typeNameMap[nowType];
    wordData.wrongbook = wrongWords;
    wordData.forgetBook = forgetWords;
    // 绑定自定义生词
    wordData.custom = customUserWords;
    initDataCount();
    renderList(getNowData());

    autoAddForgetCheck.onchange = function(){
        autoAddForget = this.checked;
    };

    writeInput.addEventListener('input',function(){
        this.value = filterEnglishOnly(this.value);
    });

    closeDailyNum.onclick = ()=>dailyNumModal.style.display = "none";
    sureDailyNum.onclick = function(){
        let num = parseInt(dailyNumInp.value.trim());
        if(isNaN(num) || num <1 || num>100){
            showTip("请输入1-100之间有效数字");
            return;
        }
        dailyPlan.num = num;
        localStorage.setItem("dailyPlan",JSON.stringify(dailyPlan));
        dailyNumModal.style.display = "none";
        showTip(`已成功设置每日背诵${num}个单词`);
        let noReciteWords = getReciteFilterWords("noRecite");
        if(noReciteWords.length === 0){
            showTip("🎉 今日所有单词已背完！");
            return;
        }
        currentWriteList = noReciteWords.slice(0, dailyPlan.num);
        isRandomWrite = true;
        currentWriteIndex = 0;
        openWritePanel();
        showTip(`已加载今日 ${currentWriteList.length} 个背词任务`);
    };

    searchInp.addEventListener('input', () => renderList(getNowData()));
    confirmCancel.onclick = closeConfirmModal;
    confirmOk.onclick = function() {
        if (typeof confirmCallback === "function") confirmCallback();
        closeConfirmModal();
    };

    typeSelect.onchange = function() {
        nowType = typeSelect.value;
        localStorage.setItem("wordCardType", nowType);
        showCollect = false;
        searchInp.value = "";
        hotTitle.innerText = typeNameMap[nowType];
        renderList(getNowData());
    };
    
    modeSelect.onchange = function() {
        let val = this.value;
        if(["styleDefault","styleEye","styleDark"].includes(val)){
            manualThemeSet = true;
            localStorage.setItem("manualThemeSet","1");
        }
        if(val === "autoTheme"){
            manualThemeSet = false;
            localStorage.setItem("manualThemeSet","0");
            autoSwitchTheme();
            showTip("已开启昼夜自动切换主题");
            this.value = "";
            return;
        }
        // 添加生词逻辑
        if(val === "addWord"){
            openAddWordModal();
            this.value = "";
            return;
        }
        switch(val) {
            case "orderSort":sortType="order";renderList(getNowData());showTip("顺序排列");break;
            case "randomSort":sortType="random";renderList(getNowData());showTip("乱序排列");break;
            case "voiceUs":voiceType="us";localStorage.setItem("voiceType","us");showTip("美式发音");break;
            case "voiceUk":voiceType="uk";localStorage.setItem("voiceType","uk");showTip("英式发音");break;
            case "styleDefault":isEye=isDark=false;document.body.classList.remove("eye-protect","dark");localStorage.setItem("eyeMode","0");localStorage.setItem("darkMode","0");showTip("默认浅色");break;
            case "styleEye":isEye=true;isDark=false;document.body.classList.remove("dark");document.body.classList.add("eye-protect");localStorage.setItem("eyeMode","1");localStorage.setItem("darkMode","0");showTip("护眼模式");break;
            case "styleDark":isEye=false;isDark=true;document.body.classList.remove("eye-protect");document.body.classList.add("dark");localStorage.setItem("eyeMode","0");localStorage.setItem("darkMode","1");showTip("深色模式");break;
            case "normal":isBlindMode=false;showCollect=false;searchInp.value="";hotTitle.innerText=typeNameMap[nowType];renderList(getNowData());showTip("关闭盲记");break;
            case "blindRead":isBlindMode=true;renderList(getNowData());showTip("盲记开启，点击卡片显释义");break;
            case "write":isRandomWrite=false;currentWriteList=showCollect?collectWords:getNowData();if(!currentWriteList.length){showTip("暂无内容");break;}currentWriteIndex=0;openWritePanel();break;
            case "dictation":isRandomWrite=false;currentWriteList=showCollect?collectWords:getNowData();if(!currentWriteList.length){showTip("暂无内容");break;}currentWriteIndex=0;openWritePanel();setTimeout(()=>speakWord(currentWriteList[0]?.word||""),500);break;
            case "randomWrite":isRandomWrite=true;currentWriteList=[...getAllBaseWords().concat(customUserWords)].sort(()=>Math.random()-0.5);if(!currentWriteList.length){showTip("暂无内容");break;}currentWriteIndex=0;openWritePanel();break;
            case "errorWrite":currentWriteList=wrongWords;if(!currentWriteList.length){showTip("暂无错题");break;}currentWriteIndex=0;isRandomWrite=false;openWritePanel();break;
            case "collectWrite":currentWriteList=collectWords;if(!currentWriteList.length){showTip("暂无收藏");break;}currentWriteIndex=0;openWritePanel();break;
            case "todayPlanWrite":let tWords=getReciteFilterWords("noRecite").slice(0,dailyPlan.num);if(!tWords.length){showTip("今日任务已完成");break;}currentWriteList=tWords;currentWriteIndex=0;isRandomWrite=true;openWritePanel();break;
            case "phraseWrite":currentWriteList=wordData.phrase;if(!currentWriteList.length){showTip("暂无短语");break;}currentWriteIndex=0;openWritePanel();break;
            case "collect":showCollect=!showCollect;searchInp.value="";showCollect?(hotTitle.innerText="我的收藏单词本",renderList(collectWords)):(hotTitle.innerText=typeNameMap[nowType],renderList(getNowData()));break;
            case "fullSpeed":currentWriteList=showCollect?collectWords:getNowData();if(!currentWriteList.length){showTip("暂无内容");break;}currentWriteIndex=0;openFullCardPanel();break;
        }
        this.value = "";
    };
    
    batchSelect.onchange = function() {
        let val = this.value;
        let currentData = getNowData();
        if (!currentData.length) {showTip("当前无内容");this.value="";return;}
        switch(val) {
            case "batchRecite":openConfirmModal("确定批量标记已背诵？",()=>{currentData.forEach(item=>{let w=item.word||item.phrase||item.sentence||"";if(!recitedWords.includes(w)) recitedWords.push(w);});localStorage.setItem("recitedWords",JSON.stringify(recitedWords));renderList(currentData);initDataCount();showTip("批量完成");});break;
            case "batchCollect":openConfirmModal("确定批量加入收藏？",()=>{currentData.forEach(item=>{let w=item.word||item.phrase||item.sentence||"";if(!collectWords.some(v=>(v.word||v.phrase||v.sentence)===w)) collectWords.push(item);});localStorage.setItem("wordCollect",JSON.stringify(collectWords));renderList(currentData);initDataCount();showTip("批量收藏完成");});break;
            case "batchForget":openConfirmModal("确定批量加入易忘本？",()=>{currentData.forEach(item=>pushNoRepeat(forgetWords,item,"word"));localStorage.setItem("forgetWords",JSON.stringify(forgetWords));renderList(currentData);initDataCount();showTip("批量加入易忘本");});break;
            case "batchClearRecite":openConfirmModal("确定批量取消背诵？",()=>{currentData.forEach(item=>{let w=item.word||item.phrase||item.sentence||"";let idx=recitedWords.indexOf(w);if(idx>-1) recitedWords.splice(idx,1);});localStorage.setItem("recitedWords",JSON.stringify(recitedWords));renderList(currentData);initDataCount();showTip("批量取消完成");});break;
        }
        this.value = "";
    };
    
    toolSelect.onchange = function() {
        let val = this.value;
        switch(val) {
            case "exportAll":exportAllWord();break;
            case "exportCollect":exportCollectWord();break;
            case "printWord":printWordList();break;
            case "clearCollect":openConfirmModal("确定清空所有收藏？",()=>{collectWords=[];localStorage.setItem("wordCollect",JSON.stringify(collectWords));renderList(getNowData());initDataCount();showTip("收藏已清空");});break;
            case "clearWrong":openConfirmModal("确定清空错题？",()=>{wrongWords=[];localStorage.setItem("wordWrong",JSON.stringify(wrongWords));wordData.wrongbook=wrongWords;renderList(getNowData());initDataCount();showTip("错题已清空");});break;
            case "clearRecited":openConfirmModal("确定清空背诵记录？",()=>{recitedWords=[];localStorage.setItem("recitedWords",JSON.stringify(recitedWords));renderList(getNowData());initDataCount();showTip("背诵记录清空");});break;
            case "resetTodayPlan":openConfirmModal("确定清空今日背诵进度？",()=>{dailyPlan.finish=0;localStorage.setItem("dailyPlan",JSON.stringify(dailyPlan));initDataCount();showTip("今日进度已重置");});break;
            case "resetAll":openConfirmModal("重置全部数据不可恢复！",()=>{localStorage.clear();collectWords=[];wrongWords=[];recitedWords=[];forgetWords=[];customUserWords=[];reviewRecord={};dailyPlan={num:30,finish:0,date:getTodayDate()};isDark=false;isEye=false;manualThemeSet=false;document.body.classList.remove("dark","eye-protect");nowType="a";typeSelect.value="a";hotTitle.innerText=typeNameMap.a;renderList(wordData.a);initDataCount();showTip("数据已全部重置");});break;
        }
        this.value = "";
    };
    
    planBtn.onclick = function() {
        nowDailyNum.innerText = dailyPlan.num;
        dailyNumInp.value = dailyPlan.num;
        dailyNumModal.style.display = "flex";
        setTimeout(()=>dailyNumInp.focus(),100);
    };
    
    writeInput.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("btnCheck").click();});
    document.addEventListener("keydown",e=>{
        if(e.key==="Escape"){
            writePanel.style.display="none";
            fullCardBox.style.display="none";
            closeConfirmModal();
            dailyNumModal.style.display="none";
            addWordModal.style.display="none";
            editWordModal.style.display="none"; 
        }
    });
    const obs = new MutationObserver(()=>{if(writePanel.style.display==='flex') writeInput.focus();});
    obs.observe(writePanel, {attributes:true,attributeFilter:['style']});
    
    switchWriteMode.onclick = function(){
        writeMode = writeMode===1?2:1;
        this.innerText=writeMode===1?"切换：中译英":"切换：英译中";
        refreshWriteView();
    };
    document.getElementById("btnPrevWord").onclick=function(){
        currentWriteIndex--;
        if(currentWriteIndex<0){showTip("已是第一个");currentWriteIndex=0;return;}
        refreshWriteView();writeProgress.innerText=`进度：${currentWriteIndex+1}/${currentWriteList.length}`;
    };
    document.getElementById("btnNextWord").onclick=function(){
        currentWriteIndex++;
        if(currentWriteIndex>=currentWriteList.length){
            showTip("本轮背诵完成");writePanel.style.display="none";renderList(getNowData());initDataCount();return;
        }
        refreshWriteView();writeProgress.innerText=`进度：${currentWriteIndex+1}/${currentWriteList.length}`;
    };
    document.getElementById("btnCloseWrite").onclick=()=>writePanel.style.display="none";

    listDom.addEventListener("click",e=>{
        if(isBlindMode && e.target.closest('.item')){
            let meanDom = e.target.closest('.item').querySelector('.word-mean');
            if(meanDom) meanDom.classList.toggle('hide-mean');
            return;
        }
        // 编辑自定义生词
        if(e.target.closest('.card-btn[data-edit]')){
            let btn = e.target.closest('.card-btn[data-edit]');
            let index = parseInt(btn.dataset.edit);
            openEditWordModal(index);
            return;
        }
        // 删除自定义生词
        if(e.target.closest('.card-btn[data-del]')){
            let btn = e.target.closest('.card-btn[data-del]');
            let index = parseInt(btn.dataset.del);
            deleteCustomWord(index);
            return;
        }
        if(e.target.closest('.card-btn[data-forget]')){
            let btn = e.target.closest('.card-btn[data-forget]');
            let word = btn.dataset.forget;
            let item = JSON.parse(btn.dataset.info);
            let has = forgetWords.some(v=>getTrimLowStr(v.word||"")===getTrimLowStr(word));
            if(has){
                delArrItem(forgetWords,word);
                showTip("已移出易忘单词");
            }else{
                pushNoRepeat(forgetWords,item,"word");
                showTip("已加入易忘单词");
            }
            localStorage.setItem("forgetWords",JSON.stringify(forgetWords));
            renderList(getNowData());
            initDataCount();
            return;
        }
        if(e.target.closest('.card-btn[data-w]')){
            const btn=e.target.closest('.card-btn[data-w]');
            let w=btn.dataset.w,m=btn.dataset.m,p=btn.dataset.p,s=btn.dataset.s,l=btn.dataset.l;
            let idx=collectWords.findIndex(x=>(x.word||x.phrase||x.sentence)===w);
            let saveData={word:w,mean:m,phonetic:p,sentence:s,level:l};
            idx>-1?collectWords.splice(idx,1):collectWords.push(saveData);
            localStorage.setItem("wordCollect",JSON.stringify(collectWords));
            showTip(idx>-1?"取消收藏":"收藏成功");
            renderList(getNowData());initDataCount();return;
        }
        if(e.target.closest('.card-btn[data-word]')){
            const btn=e.target.closest('.card-btn[data-word]');
            const word=btn.dataset.word;
            const index=recitedWords.indexOf(word);
            index===-1?recitedWords.push(word):recitedWords.splice(index,1);
            localStorage.setItem("recitedWords",JSON.stringify(recitedWords));
            showTip(index===-1?"标记已背诵":"取消背诵");
            renderList(getNowData());initDataCount();return;
        }
        if(e.target.classList.contains('play-audio')){
            const word=e.target.closest('.word-text').textContent.trim();
            speakWord(word);
            return;
        }
    });
}

function exportAllWord(){
    let arr=getNowData();
    if(!arr.length){showTip("暂无内容");return;}
    let str="【专升本英语资料】\n";
    arr.forEach(v=>str+=`${v.word||v.phrase||v.sentence}  ${v.mean||v.translation||""}\n`);
    downloadFile(str,`专升本${getNowDate()}.txt`);
    showTip("导出完成");
}
function exportCollectWord(){
    if(!collectWords.length){showTip("暂无收藏");return;}
    let str="【收藏单词】\n";
    collectWords.forEach(v=>str+=`${v.word||v.phrase||v.sentence}  ${v.mean||v.translation||""}\n`);
    downloadFile(str,`收藏单词${getNowDate()}.txt`);
    showTip("收藏导出完成");
}
function printWordList(){
    let arr=getNowData();
    if(!arr.length){showTip("无内容可打印");return;}
    let html=`<html><head><meta charset="UTF-8"><title>单词打印</title><style>body{font-size:15px;}table{width:100%;border-collapse:collapse;}td,th{border:1px solid #ccc;padding:6px;}</style></head><body><h2 style="text-align:center">${typeNameMap[nowType]}</h2><table><tr><th>单词</th><th>音标</th><th>释义</th><th>例句</th></tr>`;
    arr.forEach(v=>html+=`<tr><td>${v.word||v.phrase||v.sentence||""}</td><td>${v.phonetic||"-"}</td><td>${v.mean||v.translation||""}</td><td>${v.sentence||"-"}</td></tr>`);

function getNowData(){
    let baseList = [];
    if(showCollect) baseList = collectWords;
    else if(nowType==="allRecite") baseList = getReciteFilterWords("allRecite");
    else if(nowType==="noRecite") baseList = getReciteFilterWords("noRecite");
    else if(nowType==="reviewPlan") baseList = [...forgetWords,...wrongWords.slice(-30)].filter((v,i,a)=>a.findIndex(t=>(t.word||t.phrase||t.sentence)===(v.word||t.phrase||t.sentence))===i);
    else if(nowType==="filterHigh") baseList = getLevelFilterWords("high");
    else if(nowType==="filterMid") baseList = getLevelFilterWords("mid");
    else if(nowType==="filterLow") baseList = getLevelFilterWords("low");
    // 加载自定义生词
    else if(nowType==="custom") baseList = customUserWords;
    else baseList = wordData[nowType] || [];
    return filterSearchWords(baseList, searchInp.value);
}

function renderList(arr){
    if(!arr.length){
        listDom.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--sub-text)">暂无内容</div>`;
        return;
    }
    let renderArr=[...arr];
    if(sortType==="random") renderArr.sort(()=>Math.random()-0.5);
    let html="";
    renderArr.forEach((item, index)=>{
        let showWord=item.word||item.phrase||item.sentence||"";
        let showMean=item.mean||item.translation||"";
        let showSentence=item.sentence||item.example||(item.type?`场景：${item.type}`:"")||"";
        let showPhonetic=item.phonetic||"";
        let level=item.level||"mid";
        let root=item.root||"";
        let synonym=item.synonym||"";
        let antonym=item.antonym||"";
        let examTip=item.examTip||"";
        let isCollected=collectWords.some(v=>(v.word||v.phrase||v.sentence)===showWord);
        let isRecited=recitedWords.includes(showWord);
        let isForget = forgetWords.some(v=>getTrimLowStr(v.word||"")===getTrimLowStr(showWord));
        let levelClass=level==="high"?"level-high":level==="mid"?"level-mid":"level-low";
        let levelText=level==="high"?"高频必考":level==="mid"?"中频常考":"低频拓展";
        let meanClass = isBlindMode ? "word-mean hide-mean" : "word-mean";

        // 自定义生词专用：编辑/删除按钮
        let customBtns = '';
        if(nowType === 'custom'){
            customBtns = `
                <button class="card-btn" data-edit="${index}" style="color:#3690ff">
                    <i class="fa-solid fa-pen"></i> 编辑
                </button>
                <button class="card-btn" data-del="${index}" style="color:#ff4444">
                    <i class="fa-solid fa-trash"></i> 删除
                </button>
            `;
        }

        html+=`
        <div class="item">
            <div class="word-text">${showWord}${showPhonetic?`<i class="fa-solid fa-volume-high play-audio"></i>`:''}</div>
            ${showPhonetic?`<div class="word-phonetic">${showPhonetic}</div>`:''}
            <span class="word-level ${levelClass}">${levelText}</span>
            ${examTip?`<span class="word-exam-tag">${examTip}</span>`:''}
            <div class="${meanClass}">${showMean}</div>
            ${(root||synonym||antonym)?`
            <div class="word-expand">
                ${root?`<div>词根：${root}</div>`:""}
                ${synonym?`<div>近义词：${synonym}</div>`:""}
                ${antonym?`<div>反义词：${antonym}</div>`:""}
            </div>`:""}
            ${showSentence?`<div class="word-sentence">📖${showSentence}</div>`:""}
            <div class="card-foot">
                <button class="card-btn ${isCollected?'faved':''}" data-w="${showWord}" data-m="${showMean}" data-p="${showPhonetic}" data-s="${showSentence}" data-l="${level}">
                    <i class="${isCollected?'fa-solid fa-heart':'fa-regular fa-heart'}"></i> 收藏
                </button>
                <button class="card-btn ${isRecited?'recited':''}" data-word="${showWord}">
                    <i class="fa-solid ${isRecited?'fa-check-circle':'fa-circle'}"></i> 背诵
                </button>
                <button class="card-btn ${isForget?'forget-act':''}" data-forget="${showWord}" data-info='${JSON.stringify(item)}'>
                    <i class="fa-solid fa-bookmark"></i> 易忘
                </button>
                ${customBtns}
            </div>
        </div>`;
    });
    listDom.innerHTML=html;
}
function showTip(txt){
    toast.innerText=txt;toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"),1500);
}
function getNowDate(){
    let d=new Date();
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function downloadFile(content,name){
    let blob=new Blob([content],{type:"text/plain;charset=utf-8"});
    let url=URL.createObjectURL(blob);
    let a=document.createElement("a");
    a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}
function refreshWriteView(){
    if(!currentWriteList.length)return;
    let item=currentWriteList[currentWriteIndex];
    writeInput.value="";resultTip.innerText="";
    let showWord=item.word||item.phrase||item.sentence||"";
    let showMean=item.mean||item.translation||"";
    if(writeMode===1){
        writeWord.innerText=showMean;
        writeInput.placeholder="填写对应英文";
    }else{
        writeWord.innerText=showWord;
        writeInput.placeholder="填写中文释义";
    }
}
function openWritePanel(){
    writePanel.style.display="flex";
    writeInput.value="";resultTip.innerText="";
    refreshWriteView();
    writeProgress.innerText=`进度：${currentWriteIndex+1}/${currentWriteList.length}`;
}
function openFullCardPanel(){
    if(!currentWriteList.length)return;
    fullCardBox.style.display="flex";renderFullCard();
}
function renderFullCard(){
    let item=currentWriteList[currentWriteIndex];
    let showWord=item.word||item.phrase||item.sentence||"";
    let showMean=item.mean||item.translation||"";
    let showPhonetic=item.phonetic||"";
    let showSentence=item.sentence||"";
    fullCardContent.innerHTML=`
        <div style="font-size:28px;font-weight:bold;color:var(--main-color);margin-bottom:10px;">${showWord}</div>

function fullCardPrev(){
    currentWriteIndex--;

function fullCardNext(){
    currentWriteIndex++;
    if(currentWriteIndex>=currentWriteList.length){showTip("速记完成");fullCardBox.style.display="none";return;}
    renderFullCard();
}

document.getElementById("btnCheck").onclick=function(){
    let item=currentWriteList[currentWriteIndex];
    let userAns=writeInput.value.trim();
    let showWord=item.word||item.phrase||item.sentence||"";
    let showMean=item.mean||item.translation||"";
    let realWord=item.word||item.phrase||item.sentence||"";
    let rightAns=writeMode===1?showWord:showMean;
    let res = checkWordAnswer(userAns,rightAns);
    if(!res.isOk){
        if(autoAddForget){
            pushNoRepeat(wrongWords,item,"word");
            pushNoRepeat(forgetWords,item,"word");
            localStorage.setItem("wordWrong",JSON.stringify(wrongWords));
            localStorage.setItem("forgetWords",JSON.stringify(forgetWords));
        }
        resultTip.innerText=res.tip;
        resultTip.style.color="#e74c3c";
    }else{
        resultTip.innerText="✅ 回答正确";
        resultTip.style.color="#27ae60";
        if(!recitedWords.includes(realWord)){
            recitedWords.push(realWord);
            localStorage.setItem("recitedWords",JSON.stringify(recitedWords));
            dailyPlan.finish++;
            localStorage.setItem("dailyPlan", JSON.stringify(dailyPlan));
        }
        delArrItem(wrongWords,showWord);
        delArrItem(forgetWords,showWord);
        localStorage.setItem("wordWrong",JSON.stringify(wrongWords));
        localStorage.setItem("forgetWords",JSON.stringify(forgetWords));
        initDataCount();
        setTimeout(()=>{
            currentWriteIndex++;
            if(currentWriteIndex>=currentWriteList.length){
                let todayAll = getReciteFilterWords("noRecite").length === 0;
                if(todayAll){
                    openConfirmModal(`🎉 恭喜你完成今日全部背诵任务！
今日完成：${dailyPlan.finish} 个单词
每日目标：${dailyPlan.num} 个
继续坚持，专升本上岸稳稳的！`,()=>{});
                }else{
                    showTip("本轮背诵全部完成");
                }
                writePanel.style.display="none";
                renderList(getNowData());
                initDataCount();
                return;
            }
            refreshWriteView();
            writeProgress.innerText=`进度：${currentWriteIndex+1}/${currentWriteList.length}`;
        },600);
    }
};

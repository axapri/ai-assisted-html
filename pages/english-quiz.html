<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 专升本英语自测</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }
        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #fafafa;
            --hover: #f1f1f1;
        }
        .dark-mode{
            --bg:#15171b;
            --text:#e8e8e8;
            --subtext:#999;
            --border:#2c2f36;
            --card:#1e2127;
            --hover:#2c2f36;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }
        .container {
            width: 100%;
            max-width: 340px;
        }
        .title-row{
            display:flex;
            justify-content: space-between;
            align-items:center;
            margin-bottom:12px;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }
        select, textarea, input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: var(--bg);
            color: var(--text);
        }
        select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }
        textarea {
            min-height: 90px;
            resize: none;
        }
        .question-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            line-height: 1.7;
        }
        .q-title {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .ans-area {
            margin-top: 10px;
        }
        .page-tip {
            text-align: center;
            font-size: 13px;
            color: var(--subtext);
        }
        .result-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--theme);
            line-height:1.8;
        }
        .btn-row, .nav-row,.func-row {
            display: flex;
            gap: 10px;
        }
        .btn-box {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            flex-wrap:wrap;
        }
        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }
        .main-btn {
            background: var(--theme);
            color: #fff;
        }
        .light-btn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
        .stat-box{
            padding:10px;
            border:1px solid var(--border);
            border-radius:10px;
            text-align:center;
            font-size:13px;
            color:var(--subtext);
            margin-bottom:10px;
        }

        /* 全局弹窗统一居中样式 */
        .modal{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 999;
        }
        .modal-inner{
            width: 100%;
            max-width: 340px;
            max-height: 80vh;
            overflow: auto;
            background: var(--card);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .hide{
            display:none !important;
        }
        .err-item{
            padding:10px 0;
            border-bottom:1px solid var(--border);
            font-size:14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .del-btn{
            color: var(--theme);
            background: transparent;
            border: none;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 6px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        /* 暗夜模式正方形按钮 + 图标防拉伸 */
        #darkToggle {
            width: 36px !important;
            height: 36px !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            flex: none !important;
        }
        #darkToggle i {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 自定义确认弹窗专用样式 */
        .confirm-modal .modal-inner{
            text-align:center;
        }
        .confirm-tip{
            font-size:15px;
            margin:10px 0 20px;
            line-height:1.6;
        }
        .confirm-buttons{
            display:flex;
            gap:10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-row">
            <div class="title">
                <i class="fa-solid fa-book"></i> 专升本英语自测
            </div>
            <button class="light-btn" id="darkToggle"><i class="fa-solid fa-moon"></i></button>
        </div>
        <div class="desc">专升本英语语法、单选顺序刷题，错题本地缓存</div>
        <div class="stat-box" id="statBox">
            统计：已做题0 | 正确0 | 错题0 | 正确率0%
        </div>
        <div class="calc-box">
            <div class="form-item">
                <label>题型选择</label>
                <select id="typeSelect">
                    <option value="single">单项选择题</option>
                    <option value="grammar">语法填空题</option>
                </select>
            </div>
            <div class="page-tip" id="pageTip">当前：第 1 / 100 题</div>
            <div class="question-box" id="qBox">
                <div class="q-title">点击下一题开始练习</div>
                <div class="ans-area">你的答案：</div>
            </div>
            <div class="form-item">
                <label>填写你的答案（回车快速提交）</label>
                <input type="text" id="userAns" placeholder="A/B/C/D 或单词">
            </div>
            <div class="btn-row">
                <button class="main-btn" id="checkAns">核对答案</button>
                <button class="light-btn" id="saveErr">收藏错题</button>
            </div>
            <div class="nav-row">
                <button class="light-btn" id="prevQ">上一题</button>
                <button class="main-btn" id="nextQ">下一题</button>
            </div>
            <div class="result-box" id="resBox">
                答案解析将展示在这里
            </div>
        </div>
        <div class="btn-box">
            <button class="light-btn" id="resetAll">重置刷题进度</button>
            <button class="light-btn" id="openErrModal">错题本</button>
            <button class="light-btn" id="importBtn">导入题库</button>
            <button class="light-btn" id="exportBtn">导出题库</button>
        </div>
        <div class="soft-text">
            适配统招专升本英语｜时态/主谓一致/非谓语核心考点
        </div>
    </div>

    <!-- 错题弹窗（屏幕正中央） -->
    <div class="modal hide" id="errModal">
        <div class="modal-inner">
            <h3 style="margin-bottom:12px;color:var(--theme)">错题本</h3>
            <div id="errListBox"></div>
            <div class="func-row" style="margin-top:16px">
                <button class="light-btn" id="clearErr">清空全部错题</button>
                <button class="main-btn" id="closeErrModal">关闭</button>
            </div>
        </div>
    </div>

    <!-- 导出题库弹窗（屏幕正中央） -->
    <div class="modal hide" id="exportModal">
        <div class="modal-inner">
            <h3 style="margin-bottom:12px;color:var(--theme)">导出全部题目</h3>
            <div class="form-item">
                <label>单选题库</label>
                <textarea id="exportSingle" readonly></textarea>
            </div>
            <div class="form-item" style="margin-top:10px">
                <label>语法填空题库</label>
                <textarea id="exportGrammar" readonly></textarea>
            </div>
            <button class="main-btn" id="closeExport" style="margin-top:16px">关闭</button>
        </div>
    </div>

    <!-- 导入题库弹窗 -->
    <div class="modal hide" id="importModal">
        <div class="modal-inner">
            <h3 style="margin-bottom:12px;color:var(--theme)">导入题库</h3>
            <div class="form-item">
                <label>选择导入类型</label>
                <select id="importType">
                    <option value="single">单选题</option>
                    <option value="grammar">语法填空</option>
                </select>
            </div>
            <div class="form-item" style="margin-top:10px">
                <label>粘贴题目（一行一个，格式看说明）</label>
                <textarea id="importText" placeholder="单选题格式：题目|A|B|C|D|答案|解析
语法填空格式：题目|答案|解析"></textarea>
            </div>
            <button class="main-btn" id="doImport" style="margin-top:16px">确认导入</button>
            <button class="light-btn" id="closeImport" style="margin-top:8px">关闭</button>
        </div>
    </div>

    <!-- 自定义居中确认弹窗 -->
    <div class="modal hide confirm-modal" id="confirmModal">
        <div class="modal-inner">
            <h3 style="color:var(--theme)" id="confirmTitle">提示</h3>
            <div class="confirm-tip" id="confirmText"></div>
            <div class="confirm-buttons">
                <button class="light-btn" id="confirmCancel">取消</button>
                <button class="main-btn" id="confirmOk">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 获取所有DOM元素
        const typeSelect = document.getElementById('typeSelect');
        const qBox = document.getElementById('qBox');
        const pageTip = document.getElementById('pageTip');
        const userAns = document.getElementById('userAns');
        const prevQ = document.getElementById('prevQ');
        const nextQ = document.getElementById('nextQ');
        const checkAns = document.getElementById('checkAns');
        const saveErr = document.getElementById('saveErr');
        const resetAll = document.getElementById('resetAll');
        const resBox = document.getElementById('resBox');
        const darkToggle = document.getElementById('darkToggle');
        const statBox = document.getElementById('statBox');
        const openErrModal = document.getElementById('openErrModal');
        const errModal = document.getElementById('errModal');
        const errListBox = document.getElementById('errListBox');
        const clearErr = document.getElementById('clearErr');
        const closeErrModal = document.getElementById('closeErrModal');
        const exportBtn = document.getElementById('exportBtn');
        const exportModal = document.getElementById('exportModal');
        const exportSingle = document.getElementById('exportSingle');
        const exportGrammar = document.getElementById('exportGrammar');
        const closeExport = document.getElementById('closeExport');
        const importBtn = document.getElementById('importBtn');
        const importModal = document.getElementById('importModal');
        const importType = document.getElementById('importType');
        const importText = document.getElementById('importText');
        const doImport = document.getElementById('doImport');
        const closeImport = document.getElementById('closeImport');

        // 自定义确认弹窗元素
        const confirmModal = document.getElementById('confirmModal');
        const confirmTitle = document.getElementById('confirmTitle');
        const confirmText = document.getElementById('confirmText');
        const confirmCancel = document.getElementById('confirmCancel');
        const confirmOk = document.getElementById('confirmOk');
        let confirmCallback = null;

        // 单项选择题 100 道
        const singleList = [];
        for(let i=1;i<=100;i++){
            let t = i % 100;
            let q,ans,opt,explain;
            if(t===1){q=`${i}. He ______ English every day.`; ans="A"; opt="A.learns B.learn C.learning D.learned"; explain="一般现在时，主语三单+s";}
            else if(t===2){q=`${i}. She ______ to school yesterday.`; ans="B"; opt="A.go B.went C.goes D.going"; explain="yesterday过去时";}
            else if(t===3){q=`${i}. Look! They ______ basketball.`; ans="C"; opt="A.play B.plays C.are playing D.played"; explain="look现在进行时";}
            else if(t===4){q=`${i}. I ______ here for 5 years.`; ans="D"; opt="A.live B.lived C.am living D.have lived"; explain="for+时间段现在完成时";}
            else if(t===5){q=`${i}. We ______ to Beijing tomorrow.`; ans="A"; opt="A.will go B.go C.went D.going"; explain="tomorrow将来时";}
            else if(t===6){q=`${i}. ______ you like music?`; ans="B"; opt="A.Is B.Do C.Are D.Does"; explain="一般现在时疑问句用do";}
            else if(t===7){q=`${i}. ______ she like dogs?`; ans="D"; opt="A.Is B.Are C.Do D.Does"; explain="主语三单用does";}
            else if(t===8){q=`${i}. I get up ______ 6 o'clock.`; ans="A"; opt="A.at B.in C.on D.for"; explain="时刻前用at";}
            else if(t===9){q=`${i}. We have no class ______ Sunday.`; ans="C"; opt="A.at B.in C.on D.to"; explain="星期前用on";}
            else if(t===10){q=`${i}. We plant trees ______ spring.`; ans="B"; opt="A.at B.in C.on D.with"; explain="季节前用in";}
            else if(t===11){q=`${i}. This is the man ______ helped me.`; ans="A"; opt="A.who B.which C.whose D.what"; explain="先行词是人用who";}
            else if(t===12){q=`${i}. This is the pen ______ I lost.`; ans="B"; opt="A.who B.that C.whom D.what"; explain="先行词是物用that";}
            else if(t===13){q=`${i}. I like tea ______ he likes coffee.`; ans="C"; opt="A.so B.or C.but D.because"; explain="转折用but";}
            else if(t===14){q=`${i}. I didn't go out ______ it rained.`; ans="D"; opt="A.but B.though C.if D.because"; explain="原因用because";}
            else if(t===15){q=`${i}. ______ you study hard, you will pass.`; ans="A"; opt="A.If B.Although C.Unless D.Before"; explain="if条件句主将从现";}
            else if(t===16){q=`${i}. He runs as ______ as a horse.`; ans="B"; opt="A.fastest B.fast C.faster D.more fast"; explain="as...as用原级";}
            else if(t===17){q=`${i}. This book is ______ than that one.`; ans="C"; opt="A.interesting B.most C.more interesting D.interested"; explain="than比较级";}
            else if(t===18){q=`${i}. This is the ______ day of my life.`; ans="D"; opt="A.happy B.happier C.happily D.happiest"; explain="最高级";}
            else if(t===19){q=`${i}. I want ______ a teacher.`; ans="A"; opt="A.to be B.be C.being D.been"; explain="want to do";}
            else if(t===20){q=`${i}. He enjoys ______ books.`; ans="C"; opt="A.read B.to read C.reading D.reads"; explain="enjoy doing";}
            else if(t===21){q=`${i}. Stop ______! The bell is ringing.`; ans="B"; opt="A.talk B.talking C.to talk D.talked"; explain="stop doing";}
            else if(t===22){q=`${i}. It's time ______ dinner.`; ans="D"; opt="A.to B.at C.in D.for"; explain="it's time for sth";}
            else if(t===23){q=`${i}. It's good ______ English every day.`; ans="A"; opt="A.to read B.read C.reading D.reads"; explain="it is + adj + to do";}
            else if(t===24){q=`${i}. There ______ a book and two pens.`; ans="A"; opt="A.is B.are C.be D.am"; explain="there be就近原则";}
            else if(t===25){q=`${i}. Neither I nor he ______ wrong.`; ans="C"; opt="A.are B.am C.is D.be"; explain="就近原则";}
            else if(t===26){q=`${i}. Everyone ______ here.`; ans="C"; opt="A.are B.were C.is D.be"; explain="不定代词作主语单数";}
            else if(t===27){q=`${i}. I have ______ friends.`; ans="A"; opt="A.many B.much C.little D.a little"; explain="many修饰可数复数";}
            else if(t===28){q=`${i}. There is ______ water.`; ans="B"; opt="A.many B.much C.few D.a few"; explain="much修饰不可数";}
            else if(t===29){q=`${i}. He is ______ honest boy.`; ans="C"; opt="A.a B.the C.an D./"; explain="元音开头用an";}
            else if(t===30){q=`${i}. This is ______ university.`; ans="A"; opt="A.a B.an C.the D./"; explain="辅音开头用a";}
            else if(t===31){q=`${i}. ______ earth goes around the sun.`; ans="C"; opt="A.A B.An C.The D./"; explain="独一无二加the";}
            else if(t===32){q=`${i}. I like playing ______ basketball.`; ans="D"; opt="A.a B.an C.the D./"; explain="球类不加冠词";}
            else if(t===33){q=`${i}. He can ______ very well.`; ans="B"; opt="A.swims B.swim C.swimming D.swam"; explain="情态动词后接原形";}
            else if(t===34){q=`${i}. You must ______ hard.`; ans="A"; opt="A.work B.works C.working D.worked"; explain="must后接原形";}
            else if(t===35){q=`${i}. May I ______ in?`; ans="B"; opt="A.comes B.come C.came D.coming"; explain="may后接原形";}
            else if(t===36){q=`${i}. He is used to ______ early.`; ans="C"; opt="A.get B.gets C.getting D.got"; explain="be used to doing";}
            else if(t===37){q=`${i}. I used to ______ up late.`; ans="A"; opt="A.stay B.staying C.stayed D.stays"; explain="used to do";}
            else if(t===38){q=`${i}. The book is worth ______.`; ans="B"; opt="A.read B.reading C.to read D.reads"; explain="be worth doing";}
            else if(t===39){q=`${i}. I don't know ______ he will come.`; ans="C"; opt="A.what B.which C.if D.who"; explain="if是否";}
            else if(t===40){q=`${i}. I don't know ______ to do.`; ans="A"; opt="A.what B.which C.if D.whether"; explain="what to do";}
            else if(t===41){q=`${i}. This is ______ book.`; ans="A"; opt="A.my B.mine C.me D.I"; explain="形容词性物主代词my";}
            else if(t===42){q=`${i}. This book is ______.`; ans="B"; opt="A.my B.mine C.me D.I"; explain="名词性物主代词mine";}
            else if(t===43){q=`${i}. He is too young ______ to school.`; ans="C"; opt="A.go B.going C.to go D.went"; explain="too...to...";}
            else if(t===44){q=`${i}. I prefer apples ______ bananas.`; ans="D"; opt="A.for B.with C.on D.to"; explain="prefer A to B";}
            else if(t===45){q=`${i}. Not only he but also I ______ a student.`; ans="B"; opt="A.is B.am C.are D.be"; explain="就近原则";}
            else if(t===46){q=`${i}. Either you or he ______ right.`; ans="C"; opt="A.are B.am C.is D.be"; explain="就近原则";}
            else if(t===47){q=`${i}. I remember ______ her.`; ans="B"; opt="A.see B.seeing C.to see D.saw"; explain="remember doing";}
            else if(t===48){q=`${i}. Remember ______ the door.`; ans="C"; opt="A.close B.closing C.to close D.closed"; explain="remember to do";}
            else if(t===49){q=`${i}. I learn by ______ aloud.`; ans="D"; opt="A.read B.reads C.readed D.reading"; explain="by后接doing";}
            else if(t===50){q=`${i}. He is good at ______.`; ans="C"; opt="A.dance B.dances C.dancing D.danced"; explain="介词后接doing";}
            else if(t===51){q=`${i}. She is afraid ______ dogs.`; ans="A"; opt="A.of B.in C.on D.at"; explain="be afraid of害怕";}
            else if(t===52){q=`${i}. We are proud ______ our country.`; ans="B"; opt="A.in B.of C.for D.on"; explain="be proud of骄傲";}
            else if(t===53){q=`${i}. He is late ______ school.`; ans="C"; opt="A.in B.on C.for D.at"; explain="be late for迟到";}
            else if(t===54){q=`${i}. I am busy ______ my homework.`; ans="D"; opt="A.in B.on C.at D.with"; explain="be busy with忙于";}
            else if(t===55){q=`${i}. He is interested ______ history.`; ans="B"; opt="A.on B.in C.at D.for"; explain="be interested in感兴趣";}
            else if(t===56){q=`${i}. He is tired ______ the work.`; ans="A"; opt="A.of B.in C.on D.at"; explain="be tired of厌倦";}

            if(typeSelect.value === "single"){
                qBox.innerHTML = `<div class="q-title">${item.q}</div><div>${item.opt}</div><div class="ans-area">你的答案：</div>`;

                return;
            }
            const item = currentList[currentIndex];
            record.total++;
            let correct = false;
            if(val === item.ans.toUpperCase()){
                resBox.innerText = `✅ 正确！答案：${item.ans}\n解析：${item.explain}`;
                record.right++;
                correct = true;

            localStorage.setItem('enRecord', JSON.stringify(record));
            updateStat();

        // 深色/浅色模式切换
        darkToggle.onclick = () => {
            document.body.classList.toggle('dark-mode');
            const icon = darkToggle.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        };

        // 渲染错题列表（带单题删除）
        function renderErrList(){
            if(errorList.length === 0){
                errListBox.innerHTML = '<div style="text-align:center;padding:10px 0">暂无错题</div>';
                return;
            }
            let html = '';
            errorList.forEach((e,i) => {
                html += `<div class="err-item">
                    <div style="flex:1">
                        <div>${i+1}. ${e.q}</div>
                        <div style="margin-top:4px;color:var(--subtext)">答案：${e.ans}</div>
                    </div>
                    <button class="del-btn" data-index="${i}">删除</button>
                </div>`;
            });
            errListBox.innerHTML = html;

            // 绑定单题删除
            document.querySelectorAll('.del-btn').forEach(btn=>{
                btn.onclick = ()=>{
                    const idx = btn.dataset.index;
                    errorList.splice(idx,1);
                    localStorage.setItem('enError', JSON.stringify(errorList));
                    renderErrList();
                    updateStat();
                };
            });
        }

        // 打开错题本弹窗
        openErrModal.onclick = () => {
            renderErrList();
            errModal.classList.remove('hide');
        };
        // 关闭错题本弹窗
        closeErrModal.onclick = () => errModal.classList.add('hide');
        // 清空所有错题
        clearErr.onclick = () => {
            openConfirmModal("清空提示", "确定清空全部收藏错题？数据无法恢复", ()=>{
                errorList = [];
                localStorage.setItem('enError', JSON.stringify(errorList));
                errListBox.innerHTML = '<div style="text-align:center;padding:10px 0">暂无错题</div>';
                updateStat();
            });
        };

        // 导出全部题库到弹窗
        exportBtn.onclick = () => {
            let s = '';
            singleList.forEach((item,i) => {
                s += `${item.q}\n${item.opt}\n答案：${item.ans}\n解析：${item.explain}\n----------------\n`;
            });
            exportSingle.value = s;
            let g = '';
            grammarList.forEach((item,i) => {
                g += `${item.q}\n答案：${item.ans}\n解析：${item.explain}\n----------------\n`;
            });
            exportGrammar.value = g;
            exportModal.classList.remove('hide');
        };
        // 关闭导出弹窗
        closeExport.onclick = () => exportModal.classList.add('hide');

        // 导入题库功能
        importBtn.onclick = () => importModal.classList.remove('hide');
        closeImport.onclick = () => importModal.classList.add('hide');
        doImport.onclick = () => {
            const type = importType.value;
            const text = importText.value.trim();
            if(!text){
                alert('请粘贴题目内容');
                return;
            }
            const lines = text.split('\n').filter(line=>line.trim());
            let count = 0;
            if(type === 'single'){
                lines.forEach(line=>{
                    let arr = line.split('|');
                    if(arr.length >=6){
                        singleList.push({
                            q:arr[0], opt:arr[1]+' '+arr[2]+' '+arr[3]+' '+arr[4],
                            ans:arr[5], explain:arr[6]||''
                        });
                        count++;
                    }
                });
            }else{
                lines.forEach(line=>{
                    let arr = line.split('|');
                    if(arr.length>=3){
                        grammarList.push({q:arr[0], ans:arr[1], explain:arr[2]||''});
                        count++;
                    }
                });
            }
            alert(`导入成功！共导入 ${count} 题`);
            importText.value = '';
            importModal.classList.add('hide');
            renderItem();
        };

        // 页面初始化
        updateStat();
        renderItem();
    </script>
</body>
</html>

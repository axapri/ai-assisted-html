<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 密码强度检测</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 340px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            min-height: 310px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .form-item input,
        .form-item select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }

        .strength-bar {
            height: 8px;
            width: 100%;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .strength-progress {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .level-text {
            font-size: 14px;
            margin-top: 4px;
        }

        .tip-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--subtext);
        }
        .tip-item i {
            width: 16px;
        }

        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--theme);
            line-height:1.7;
        }

        .btn-box {
            display: flex;
            gap: 12px;
            margin: 22px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }

        #genBtn {
            background: var(--theme);
            color: #fff;
        }

        #copyBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-shield-halved"></i> 密码强度检测
        </div>
        <div class="desc">实时检测密码复杂度，一键生成高强度密码</div>

        <div class="calc-box">
            <div class="form-item">
                <label>待检测密码</label>
                <input type="text" id="pwdInput" placeholder="请输入需要检测的密码">
            </div>

            <div class="form-item">
                <label>安全强度</label>
                <div class="strength-bar">
                    <div class="strength-progress" id="progress"></div>
                </div>
                <div class="level-text" id="levelText">未输入密码</div>
            </div>

            <div class="form-item">
                <label>判定规则</label>
                <div class="tip-item" id="tip1"><i class="fa-solid fa-circle"></i> 长度 ≥8位</div>
                <div class="tip-item" id="tip2"><i class="fa-solid fa-circle"></i> 包含大写英文字母</div>
                <div class="tip-item" id="tip3"><i class="fa-solid fa-circle"></i> 包含小写英文字母</div>
                <div class="tip-item" id="tip4"><i class="fa-solid fa-circle"></i> 包含数字</div>
                <div class="tip-item" id="tip5"><i class="fa-solid fa-circle"></i> 包含特殊符号 !@#$%^&* 等</div>
            </div>

            <div class="result-box" id="result">
                密码判定结果展示区域
            </div>
        </div>

        <div class="btn-box">
            <button id="genBtn">随机生成密码</button>
            <button id="copyBtn">复制当前密码</button>
        </div>

        <div class="soft-text">
            本地离线计算判定，不会上传密码<br>按照字符组合判定安全等级
        </div>
    </div>

    <script>
        const pwdInput = document.getElementById('pwdInput');
        const progress = document.getElementById('progress');
        const levelText = document.getElementById('levelText');
        const genBtn = document.getElementById('genBtn');
        const copyBtn = document.getElementById('copyBtn');
        const resultBox = document.getElementById('result');
        const tips = [
            document.getElementById('tip1'),
            document.getElementById('tip2'),
            document.getElementById('tip3'),
            document.getElementById('tip4'),
            document.getElementById('tip5')
        ];

        let currentPwd = "";

        // 强度检测逻辑
        function checkStrength(pwd) {
            currentPwd = pwd;
            let score = 0;
            const regUpper = /[A-Z]/;
            const regLower = /[a-z]/;
            const regNum = /[0-9]/;
            const regSymbol = /[!@#$%^&*(),.?":{}|<>]/;

            tips[0].style.color = pwd.length >= 8 ? '#16a34a' : 'var(--subtext)';
            tips[1].style.color = regUpper.test(pwd) ? '#16a34a' : 'var(--subtext)';
            tips[2].style.color = regLower.test(pwd) ? '#16a34a' : 'var(--subtext)';
            tips[3].style.color = regNum.test(pwd) ? '#16a34a' : 'var(--subtext)';
            tips[4].style.color = regSymbol.test(pwd) ? '#16a34a' : 'var(--subtext)';

            if (pwd.length >= 8) score += 20;
            if (regUpper.test(pwd)) score += 20;
            if (regLower.test(pwd)) score += 20;
            if (regNum.test(pwd)) score += 20;
            if (regSymbol.test(pwd)) score += 20;

            let width, text, color, resText;
            if (score === 0) {
                width = 0; text = '未输入密码'; color = '#999';
                resText = '暂无内容';
            } else if (score <= 40) {
                width = 40; text = '弱（不安全）'; color = '#ef4444';
                resText = '当前密码强度弱，极易被破解，建议增加字符类型与长度';
            } else if (score <= 60) {
                width = 60; text = '一般（可优化）'; color = '#f97316';
                resText = '密码安全性一般，建议补充大写字母或特殊符号';
            } else if (score <= 80) {
                width = 80; text = '良好（较安全）'; color = '#eab308';
                resText = '密码安全性良好，日常账号可以正常使用';
            } else {
                width = 100; text = '极强（非常安全）'; color = '#16a34a';
                resText = '高强度密码，暴力破解难度极高，安全性优秀';
            }
            progress.style.width = width + '%';
            progress.style.background = color;
            levelText.textContent = text;
            levelText.style.color = color;
            resultBox.innerText = resText;
        }

        // 生成高强度密码
        function createStrongPwd() {
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const num = '0123456789';
            const symbol = '!@#$%^&*()_+-=';
            let res = '';
            res += upper[Math.floor(Math.random() * upper.length)];
            res += lower[Math.floor(Math.random() * lower.length)];
            res += num[Math.floor(Math.random() * num.length)];
            res += symbol[Math.floor(Math.random() * symbol.length)];
            const all = upper + lower + num + symbol;
            for (let i = 0; i < 8; i++) {
                res += all[Math.floor(Math.random() * all.length)];
            }
            return res.split('').sort(() => Math.random() - 0.5).join('');
        }

        // 输入监听
        pwdInput.addEventListener('input', () => {
            checkStrength(pwdInput.value);
        });

        // 生成按钮
        genBtn.addEventListener('click', () => {
            const pwd = createStrongPwd();
            pwdInput.value = pwd;
            checkStrength(pwd);
        });

        // 复制按钮
        copyBtn.addEventListener('click', async () => {
            if (!currentPwd) {
                resultBox.innerText = '暂无密码可复制';
                return;
            }
            try {
                await navigator.clipboard.writeText(currentPwd);
                resultBox.innerText = '密码复制成功！';
            } catch (err) {
                resultBox.innerText = '复制失败，请手动选中复制';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 单位换算器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 340px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .calc-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            min-height: 310px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .form-item input,
        .form-item select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #24292f;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-item select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }

        .result-box {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--theme);
            line-height:1.7;
        }

        .btn-box {
            display: flex;
            gap: 12px;
            margin: 22px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }

        #calcBtn {
            background: var(--theme);
            color: #fff;
        }

        #resetBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 14px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-ruler-combined"></i> 单位换算器
        </div>
        <div class="desc">长度/重量/面积常用单位快速互换</div>

        <div class="calc-box">
            <div class="form-item">
                <label>换算分类</label>
                <select id="typeSel">
                    <option value="len">长度单位</option>
                    <option value="weight">重量单位</option>
                    <option value="area">面积单位</option>
                </select>
            </div>
            <div class="form-item">
                <label>原单位</label>
                <select id="fromUnit"></select>
            </div>
            <div class="form-item">
                <label>目标单位</label>
                <select id="toUnit"></select>
            </div>
            <div class="form-item">
                <label>输入数值</label>
                <input type="number" id="numIn" value="1">
            </div>
            <div class="result-box" id="result">
                计算结果将显示在这里
            </div>
        </div>

        <div class="btn-box">
            <button id="calcBtn">立即换算</button>
            <button id="resetBtn">清空重置</button>
        </div>

        <div class="soft-text">
            采用国标换算系数，数据仅供日常参考
        </div>
    </div>

    <script>
        const typeSel = document.getElementById('typeSel');
        const fromUnit = document.getElementById('fromUnit');
        const toUnit = document.getElementById('toUnit');
        const numIn = document.getElementById('numIn');
        const calcBtn = document.getElementById('calcBtn');
        const resetBtn = document.getElementById('resetBtn');
        const result = document.getElementById('result');

        // 换算基准(统一换算成基准值)
        const unitData = {
            len:{
                list:[["米",1],["千米",1000],["厘米",0.01],["毫米",0.001],["里",500],["尺",1/3]],
                base:1
            },
            weight:{
                list:[["千克",1],["吨",1000],["克",0.001],["斤",0.5],["两",0.05]],
                base:1
            },
            area:{
                list:[["平方米",1],["公顷",10000],["平方千米",1000000],["亩",2000/3]]
            }
        };

        function setOption(type){
            const arr = unitData[type].list;
            fromUnit.innerHTML = "";
            toUnit.innerHTML = "";
            arr.forEach((item,idx)=>{
                fromUnit.innerHTML += `<option value="${item[1]}">${item[0]}</option>`;
                toUnit.innerHTML += `<option value="${item[1]}">${item[0]}</option>`;
            })
            toUnit.selectedIndex = 1;
        }

        function autoSave(){
            localStorage.setItem('unitSave',JSON.stringify({
                t:typeSel.value,f:fromUnit.value,tg:toUnit.value,n:numIn.value
            }))
        }

        window.onload = ()=>{
            setOption(typeSel.value);
            let cache = localStorage.getItem('unitSave');
            if(cache){
                let d = JSON.parse(cache);
                typeSel.value = d.t;
                setOption(d.t);
                fromUnit.value = d.f;
                toUnit.value = d.tg;
                numIn.value = d.n;
            }
        }

        typeSel.onchange = ()=>{setOption(typeSel.value);autoSave()}
        [fromUnit,toUnit,numIn].forEach(i=>i.onchange=autoSave)

        calcBtn.onclick = ()=>{
            let n = Number(numIn.value);
            let f = Number(fromUnit.value);
            let t = Number(toUnit.value);
            if(n<=0){result.innerText="请输入有效数值";return;}
            let res = n * f / t;
            result.innerHTML = `换算结果：${res.toFixed(4)}`;
            autoSave();
        }

        resetBtn.onclick = ()=>{
            typeSel.value="len";
            setOption("len");
            numIn.value="1";
            result.innerText="计算结果将显示在这里";
            localStorage.removeItem('unitSave');
        }
    </script>
</body>
</html>

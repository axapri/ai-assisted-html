            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7880' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;

            resize: none;

        .result-box {
            background: #fff;

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-link"></i> URL编码解码
        </div>
        <div class="desc">网址URL一键编码转义 / 解码还原，后端接口调试必备</div>
        <div class="calc-box">
            <div class="form-item">
                <label>转换模式</label>
                <select id="modeSelect">
                    <option value="encodeComponent">encodeURIComponent 编码(参数专用)</option>
                    <option value="encodeUri">encodeURI 编码(完整链接)</option>
                    <option value="decode">URL 解码</option>
                </select>
            </div>
            <div class="form-item">
                <label>输入内容</label>
                <textarea id="inputText" placeholder="粘贴链接、带中文参数URL进行处理"></textarea>
            </div>
            <div class="result-box" id="result">
                处理结果将展示在这里
            </div>
        </div>
        <div class="btn-box">
            <button class="runBtn" id="runBtn">执行转换</button>
            <button class="copyBtn" id="copyBtn">复制结果</button>
            <button class="clearBtn" id="clearBtn">清空</button>
        </div>
        <div class="extra-btn-box">
            <button class="swapBtn" id="swapBtn"><i class="fa-solid fa-exchange-alt"></i> 互换输入输出（结果填入输入框）</button>
        </div>
        <div class="soft-text">
            本地运算，数据不会上传服务器，自带反斜杠\兼容处理
        </div>
        <div class="tip-text">
            <strong>两种编码区别（新手必读）：</strong><br>
            1. encodeURI：完整网址专用，不会编码 / ?:&#35;@&amp;+=$ 适合整站URL编码<br>
            2. encodeURIComponent：接口参数专用，会编码所有特殊字符，适合Query参数、POST参数
        </div>
    </div>
    <div class="toast" id="toast"></div>
<script>
    const modeSelect = document.getElementById('modeSelect');
    const inputText = document.getElementById('inputText');
    const runBtn = document.getElementById('runBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const swapBtn = document.getElementById('swapBtn');
    const resultBox = document.getElementById('result');
    const toast = document.getElementById('toast');
    let resContent = "";

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1500);
    }

    // 新增：反斜杠兼容预处理
    function preHandleStr(str) {
        // 统一正反斜杠兼容，自动转义\，兼容Windows路径、带反斜杠URL
        return str.replace(/\\/g, '/');
    }

    function handleConvert() {
        let raw = inputText.value.trim();
        if (!raw) {
            resultBox.innerText = "请输入需要处理的URL文本";
            resContent = "";
            return;
        }
        // 反斜杠转义兼容处理
        raw = preHandleStr(raw);
        try {
            const mode = modeSelect.value;
            if (mode === 'encodeComponent') {
                resContent = encodeURIComponent(raw);
            } else if (mode === 'encodeUri') {
                resContent = encodeURI(raw);
            } else {
                resContent = decodeURIComponent(raw);
            }
            resultBox.innerText = resContent;
        } catch (err) {
            resContent = "";
            resultBox.innerText = `解析失败：${err.message}\n当前内容并非标准URL编码字符串`;
        }
    }

    // 互换输入输出
    swapBtn.addEventListener('click', () => {
        if (!resContent) {
            showToast('暂无结果可互换');
            return;
        }
        inputText.value = resContent;
        resultBox.innerText = '处理结果将展示在这里';
        resContent = '';
        showToast('已将结果填入输入框，可切换解码模式二次处理');
    })

    // 清空全部
    clearBtn.addEventListener('click', () => {
        inputText.value = '';
        resultBox.innerText = '处理结果将展示在这里';
        resContent = '';
        showToast('已清空');
    })

    async function copyResult() {
        if (!resContent) {
            showToast('暂无有效结果');
            return;
        }
        try {
            await navigator.clipboard.writeText(resContent);
            showToast('复制成功');
        } catch (e) {
            const temp = document.createElement('textarea');
            temp.value = resContent;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            showToast('已选中，直接粘贴');
        }
    }

    runBtn.addEventListener('click', handleConvert);
    copyBtn.addEventListener('click', copyResult);
    inputText.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleConvert();
    })

    // 全局主题读取
    const localTheme = localStorage.getItem('site-theme');
    if (localTheme) document.body.className = `theme-${localTheme}`;
</script>

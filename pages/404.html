<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axapri | 页面失踪</title>
<link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

html, body {
  overflow: hidden;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
body::-webkit-scrollbar {
  display: none;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fafafa;
  color: #111111;
  padding: 24px;
}

.wrap {
  width: 100%;
  max-width: 460px;
  text-align: center;
}

.code {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 20px;
  color: #ae3333;
}

.text {
  font-size: 16px;
  color: #555;
  line-height: 1.6;
  margin-bottom: 36px;
}

.button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 30px;
  border-radius: 12px;
  background: #ae3333;
  color: #fff;
  text-decoration: none;
  font-weight: 500;
  transition: all 0.2s ease;
}

.button:hover {
  background: #962b2b;
  transform: translateY(-1px);
}

footer {
  position: fixed;
  bottom: 20px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 14px;
  color: #999;
}
</style>
</head>

<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="text">抱歉，您访问的页面不存在或已被移除。</div>
    <a href="index.html" class="button">
      <i class="fa-solid fa-house"></i> 返回首页
    </a>
  </div>

  <footer>© 2026 Axapri · 记录学习与创作</footer>
</body>
</html>

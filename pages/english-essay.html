<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 英语作文模板</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }
        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #fafafa;
            --hover: #f1f1f1;
        }
        .dark-mode{
            --bg:#15171b;
            --text:#e8e8e8;
            --subtext:#999;
            --border:#2c2f36;
            --card:#1e2127;
            --hover:#2c2f36;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }
        .container {
            width: 100%;
            max-width: 360px;
        }
        .search-bar{
            width:100%;
            padding:10px 14px;
            border:1px solid var(--border);
            border-radius:10px;
            background:var(--card);
            color:var(--text);
            font-size:14px;
            margin-bottom:12px;
            outline:none;
        }
        .title-row{
            display:flex;
            justify-content: space-between;
            align-items:center;
            margin-bottom:12px;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .action-row{
            display:flex;
            gap:8px;
            margin-bottom:12px;
        }
        .action-row button{
            flex:1;
        }
        .template-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            max-height: 74vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .template-wrap::-webkit-scrollbar {
            display: none;
        }
        .template-item{
            padding:14px 0;
            border-bottom:1px solid var(--border);
        }
        .template-item:last-child{
            border-bottom: none;
        }
        .template-item h4{
            color: var(--theme);
            margin-bottom: 10px;
            font-size: 16px;
        }
        .template-text{
            white-space: pre-wrap;
            font-size:14px;
            line-height:1.6;
            margin:8px 0;
            background:var(--bg);
            padding:10px;
            border-radius:8px;
        }
        .trans-label{
            font-weight:500;
            margin:6px 0 4px;
            font-size:14px;
            color: var(--theme);
        }
        .trans-text{
            white-space: pre-wrap;
            font-size:13px;
            line-height:1.6;
            margin-bottom:12px;
            background:rgba(174,51,51,0.06);
            padding:10px;
            border-radius:8px;
            color:var(--subtext);
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }
        .light-btn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .soft-text {
            margin-top: 16px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
        #darkToggle {
            width: 36px !important;
            height: 36px !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            flex: none !important;
        }
        #darkToggle i {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toast-tip{
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: var(--theme);
            color: #fff;
            border-radius: 99px;
            font-size:14px;
            z-index:999;
            opacity:0;
            pointer-events:none;
            transition: opacity 0.3s;
        }
        .toast-tip.show{
            opacity:1;
        }
        #tempCopyInput{
            position: fixed;
            left: -9999px;
            top: -9999px;
        }

        /* 打印/导出优化 */
        @media print{
            body{
                background:#fff !important;
                color:#000 !important;
                padding:0 !important;
            }
            .container{
                max-width:100% !important;
            }
            .search-bar,
            .action-row,
            #darkToggle,
            .soft-text,
            .toast-tip,
            button,
            .desc{
                display:none !important;
            }
            .template-wrap{
                border:none !important;
                box-shadow:none !important;
                background:#fff !important;
                max-height:none !important;
            }
            .template-item{
                border-color:#eee !important;
            }
            .template-text{
                background:#fff !important;
                border:1px solid #eee !important;
            }
            .trans-text{
                background:#f8f8f8 !important;
                color:#555 !important;
            }
            h4, .trans-label{
                color:#000 !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-row">
            <div class="title">
                <i class="fa-solid fa-file-word"></i> 英语作文模板
            </div>
            <button class="light-btn" id="darkToggle"><i class="fa-solid fa-moon"></i></button>
        </div>
        <div class="desc">专升本60篇英文作文｜中英对照｜一键复制｜搜索｜打印</div>

        <input type="text" class="search-bar" id="searchInput" placeholder="🔍 搜索作文关键词（中文/英文均可）">

        <div class="action-row">
            <button class="light-btn" id="printBtn"><i class="fa-solid fa-print"></i> 打印/导出PDF</button>
        </div>

        <div class="template-wrap" id="templateBox"></div>
        <div class="soft-text">
            书信 / 议论 / 通知 / 演讲 / 日记 / 环保 / 节日 / 志愿 / 文化 / 职业规划 全题型覆盖
        </div>
    </div>

    <div class="toast-tip" id="toast">复制成功</div>
    <textarea id="tempCopyInput"></textarea>

    <script>
        const templateBox = document.getElementById('templateBox');
        const darkToggle = document.getElementById('darkToggle');
        const toast = document.getElementById('toast');
        const tempInput = document.getElementById('tempCopyInput');
        const searchInput = document.getElementById('searchInput');
        const printBtn = document.getElementById('printBtn');

        const essayTemplates = [
            {
                title:"1.活动邀请信",
                content:`Dear Sir/Madam,

I am writing sincerely to invite you to take part in our school English sharing activity which will be held this Sunday morning. The activity will start at nine o’clock and last for two hours in our classroom on the third floor.

During the activity, we will exchange practical English learning methods, share beautiful writing sentences and practice oral English face to face. Besides, several excellent students will give short speeches about their learning experience. I firmly believe that all participants can gain a great deal of useful knowledge from this activity.

We would be greatly honored if you could spare your precious time to join us. Looking forward to your early reply.

Yours sincerely,
Li Hua`,
                trans:`尊敬的先生/女士：
我诚挚写信邀请您参加本周日上午的英语分享活动。活动九点开始，在三楼教室持续两小时。
活动期间，我们会交流实用英语学习方法、分享优美写作句型、面对面练习口语。此外，多名优秀学生将分享学习经历并进行简短演讲。我坚信所有参与者都能从活动中收获大量实用知识。
若您能抽出宝贵时间到场，我们将倍感荣幸。期待您尽早回信。
谨启
李华`
            },
            {
                title:"2.正反观点议论文",
                content:`Nowadays, reading English articles has become an essential way for students to improve their comprehensive English ability. However, different students hold totally different opinions towards daily English reading.

Some students insist that reading takes up too much spare time. What’s more, they claim that long reading will make them feel tired and lose interest in English study. Nevertheless, I hold an entirely different opinion. Long-term reading can enlarge our vocabulary, polish our writing sentences and develop better logical thinking.

From my personal point of view, every student should keep reading short English passages for at least twenty minutes every day. Only in this way can we improve our overall English level step by step.`,
                trans:`如今，阅读英文短文已成为学生提升英语综合能力的核心途径。但不同学生对每日英文阅读持有完全不同的看法。
一部分学生认为阅读占用大量课余时间。此外，他们声称长时间阅读会使人疲惫，丧失英语学习兴趣。然而我持有相反观点：长期阅读能扩充词汇、优化句式、培养更强逻辑思维。
在我看来，每位学生都应坚持每日至少二十分钟短篇英文阅读。唯有这样，我们才能循序渐进提升英语综合水平。`
            },
            {
                title:"3.学习方法建议信",
                content:`Dear friend,

I heard that you have been facing great difficulty in improving your English scores and feel worried about your learning plans. After thinking carefully, I have several practical suggestions for you.

First of all, you can read short English articles every morning to build up your language sense. Besides, listening to simple English materials before sleep can improve your listening ability. What’s more, do not be afraid of making mistakes when speaking English, because mistakes help you find your weak points.

I sincerely hope my advice can help you get rid of learning troubles and make obvious progress in the following exams.

Yours,
Li Hua`,
                trans:`亲爱的朋友：
我听说你在提升英语成绩方面遇到很大困难，对学习计划感到焦虑。经过认真思考，我有几条实用建议给你。
首先，你可以每天早晨阅读短篇英文文章培养语感；此外，睡前听简易英语材料能提升听力；更重要的是，说英语时不要害怕犯错，错误能帮你找到薄弱点。
我衷心希望我的建议能帮你摆脱学习困境，在后续考试中取得明显进步。
你的朋友
李华`
            },
            {
                title:"4.校园志愿活动通知",
                content:`Notice

A warm community volunteer activity will be organized by our Student Union this Saturday morning. All students who want to take part should gather at the school main gate at eight o’clock sharp.

During the activity, we will clean the public walkways and green areas in the neighborhood. After that, we will send daily supplies and greeting cards to the elderly living alone. Every participant needs to bring water and paper towels by themselves.

All participants must arrive on time and obey the arrangement of student leaders. Do not be late or leave early without permission.
Student Union`,
                trans:`通知
学生会将于本周六上午组织社区志愿活动。有意参加的同学请早上八点整在校正门集合。
活动期间，我们会清扫小区公共步道与绿化区域，随后为独居老人送去生活用品与贺卡。每位参与者需自备饮用水与纸巾。
所有参与者务必准时到场，服从负责人安排，不得迟到、早退。
学生会`
            },
            {
                title:"5.病假请假条",
                content:`Dear respected teacher,

I am writing to ask for a two-day sick leave. Yesterday evening I caught a serious cold with high fever and went to the hospital immediately.

The doctor said my physical condition is not suitable for normal study. He advises me to stay at home, take medicine on time and rest for two days. I promise that I will make up all missed lessons and homework after I return to school.

I sincerely hope you can understand my situation and approve my leave request.

Yours respectfully,
Li Hua`,
                trans:`尊敬的老师：
我写信申请两天病假。昨晚我患上重感冒并高烧，立刻前往医院就诊。
医生说我的身体不适合在校正常学习，建议我居家按时服药、休养两天。我保证返校后补齐所有落下的课程与作业。
我真诚希望您能体谅我的情况，批准我的请假申请。
学生：李华 敬上`
            },
            {
                title:"6.致老师感谢信",
                content:`Dear Miss Wang,

I am writing to express my deepest thanks to you. Without your long-term patient guidance and encouragement, I could never make such great progress in English this term.

In the past months, you always spent your spare time explaining difficult grammar points to me after class. Whenever I felt upset about my grades, you cheered me up and encouraged me to keep practicing. All your warm words will stay in my memory forever.

I will keep following your advice and make progress in future study. Wish you good health and everything goes well.

Yours,
Li Hua`,
                trans:`亲爱的王老师：
我写信向您表达最深切的谢意。没有您长期耐心的指导与鼓励，这学期我的英语绝不会取得如此大的进步。
过去几个月，您总利用课后时间为我讲解难懂语法。每当我因成绩消沉，您都会开导我、鼓励我坚持练习。您温暖的话语我会永远铭记。
我会继续遵循您的建议，在今后学习中不断进步。祝您身体健康，万事顺遂。
学生李华`
            },
            {
                title:"7.环境保护倡议书",
                content:`Nowadays, environmental protection has become one of the hottest social topics. It is everyone’s duty to protect our living environment.

We can take several simple but effective actions in daily life. First, save water and electricity whenever we use them. Second, carry reusable cloth bags instead of plastic bags when shopping. Third, plant more trees and flowers if we have spare time.

Small daily actions can bring huge changes to the earth. Let us start from tiny things and call on more classmates to join us. Let’s protect our beautiful planet together.`,
                trans:`如今，环境保护已是全球热门话题之一，保护生存环境是每个人的责任。
日常生活中我们可以采取简单高效的行动：第一，用水用电时节约资源；第二，购物时使用布袋代替塑料袋；第三，有空时多种植花草树木。
日常微小行动能给地球带来巨大改变。让我们从小事做起，号召更多同学加入，共同守护美丽星球。`
            },
            {
                title:"8.商品服务投诉信",
                content:`Dear store manager,

I am writing to complain about the terrible service and defective goods in your bookstore. I bought an English reference book here yesterday afternoon, but I found nearly ten pages missing after I got home.

I went back to the store and asked for a new copy. However, the shop assistant refused my reasonable request without any explanation, which made me very disappointed. I hope you can deal with this problem quickly and give me a satisfactory solution.

I am looking forward to your timely reply.

Sincerely,
Li Hua`,
                trans:`尊敬的店长：
我写信投诉贵书店的糟糕服务与残次商品。昨天下午我在此购买一本英语参考书，回家后发现缺失近十页。
我返回书店要求更换新书，但店员无理由拒绝我的合理要求，令我十分失望。希望您尽快处理此事，给我满意的解决方案。
期待您及时回复。
李华`
            },
            {
                title:"9.自我介绍",
                content:`Hello everyone,

My name is Li Hua. I am an outgoing and hard-working student who loves English learning. I spend at least thirty minutes reading English articles and memorizing words every day.

I enjoy communicating with others in English and taking part in English speech contests. I hope we can help each other, learn together and make progress side by side in the new term.

Thank you for listening to my self-introduction.`,
                trans:`大家好：
我叫李华，性格开朗勤奋，热爱英语学习。我每天至少花三十分钟阅读英文文章、记忆单词。
我喜欢用英语与人交流，参加英语演讲比赛。希望新学期我们能互帮互助、共同学习、并肩进步。
感谢大家聆听我的自我介绍。`
            },
            {
                title:"10.英语社团申请信",
                content:`Dear club teacher,

I am writing to apply for joining the English club. I have a strong interest in oral English and hope to improve my spoken skills by taking part in club activities.

I have kept reading English news for more than one year. I am a careful and responsible person, willing to take part in all activities and help organize English sharing meetings.

I would be grateful if you could accept my application.

Yours faithfully,
Li Hua`,
                trans:`尊敬的社团老师：
我写信申请加入英语社团。我对英语口语有浓厚兴趣，希望通过社团活动提升口语水平。
我坚持阅读英文新闻一年多，细心负责，愿意参加所有活动，协助组织英语分享会。
若您能批准我的申请，我将十分感激。
申请人：李华`
            },
            {
                title:"11.向朋友求助书信",
                content:`Dear Tom,

I have a learning problem and I am writing to ask for your help. Our teacher asks us to finish an English composition about reading, but I lack good sentence materials and writing structures.

You are really good at English writing and always get high marks. Could you share some useful expressions and writing ideas with me? I will help you with your weak subjects when you need.

I am looking forward to your reply.

Yours,
Li Hua`,
                trans:`亲爱的汤姆：
我遇到学习难题，写信寻求你的帮助。老师让我们写一篇关于阅读的英语作文，但我缺少优质句型与写作框架。
你的英语写作非常出色，常年高分。你能分享一些实用句式与写作思路给我吗？你需要帮助时，我也会辅导你的薄弱科目。
期待你的回信。
李华`
            },
            {
                title:"12.英语主题演讲稿",
                content:`Good morning, teachers and classmates,

Today my topic is the importance of daily English reading. Reading can expand our vocabulary and improve our logical thinking ability.

Many students give up reading because they think it is boring. In fact, we can choose interesting short stories and news to keep reading every day. Reading will gradually improve our writing and listening skills without extra hard training.

Let us form a good habit of reading English every day. Thank you!`,
                trans:`老师、同学们，早上好：
今天我演讲的主题是每日英文阅读的重要性。阅读能扩充词汇，提升逻辑思维能力。
许多学生觉得阅读枯燥而放弃。事实上，我们可以选择有趣的短篇故事与新闻坚持每日阅读。阅读会逐步提升写作与听力水平，无需额外高强度训练。
让我们养成每日阅读英文的好习惯。谢谢大家！`
            },
            {
                title:"13.班级活动报告",
                content:`Activity Report
Last Sunday our class held an English learning activity in the classroom from 2:00 p.m. to 4:30 p.m.

We divided into four groups to discuss learning problems and exchange good learning habits. At the end of the activity, each group gave a short English report about their discussion results.

This activity made us realize that communication and sharing can help us make faster progress than learning alone. We plan to hold similar activities once a month.`,
                trans:`活动报告
上周日下午2点至4点半，我们班在教室举办英语学习活动。
我们分为四组讨论学习难题，交流良好学习习惯。活动最后，每组进行简短英文汇报。
这次活动让我们意识到：交流分享比独自学习进步更快。我们计划每月举办一次同类活动。`
            },
            {
                title:"14.成长主题征文",
                content:`My Growth with English
English has accompanied me for three years and brought great positive changes to my study and character.

At first, I was shy and afraid to speak English in public. With long-term reading and practice, I can now communicate with others confidently in English.

English not only improves my grades but also opens a new world for me. I will keep learning English persistently in the future.`,
                trans:`与英语相伴成长
英语陪伴我三年，给我的学习与性格带来巨大正向改变。
起初，我很腼腆，不敢在公共场合说英语。经过长期阅读与练习，如今我可以自信地用英语与人交流。
英语不仅提升了我的成绩，更为我打开新世界。今后我会持之以恒地学习英语。`
            },
            {
                title:"15.毕业致老师信",
                content:`Dear teacher,

As graduation is coming near, I want to express my sincere thanks to you. During these years, you always encouraged me to keep learning English even when I met difficulties.

I will remember your teaching and learning methods forever. I promise to keep studying English carefully in college.

Wish you good health and happy every day.

Yours student,
Li Hua`,
                trans:`尊敬的老师：
毕业将至，我想向您表达诚挚谢意。这些年，即便我遇到困难，您也一直鼓励我坚持学习英语。
我会永远记住您的教诲与学习方法。我保证上大学后继续认真学习英语。
祝您身体健康，天天开心。
您的学生 李华`
            },
            {
                title:"16.图书馆预约咨询信",
                content:`Dear librarian,

I am writing to consult about booking the reading room on the second floor. Our class plans to hold an English study meeting there next Friday afternoon.

Could you tell me the booking process, opening time and the maximum number of students it can hold? I will prepare all materials in advance according to your instructions.

I am looking forward to your detailed reply.

Yours,
Li Hua`,
                trans:`尊敬的图书管理员：
我写信咨询二楼阅览室的预约事宜。我们班计划下周五下午在那里举办英语学习交流会。
能否告知预约流程、开放时间与最大容纳人数？我会按您的指引提前备好所有材料。
期待您详细回复。
李华`
            },
            {
                title:"17.演讲比赛推荐信",
                content:`Dear judges,

I am writing to recommend my classmate Tom to take part in the English speech contest.

Tom is hard-working and modest, with excellent oral English. He takes an active part in all English activities and is good at expressing ideas clearly. I firmly believe he will perform wonderfully in the contest.

I hope you can consider my recommendation and give him a chance to show his talent.

Yours sincerely,
Li Hua`,
                trans:`尊敬的评委老师：
我写信推荐我的同学汤姆参加英语演讲比赛。
汤姆勤奋谦逊，英语口语出色，积极参加所有英语活动，擅长清晰表达观点。我坚信他会在比赛中表现精彩。
希望您考虑我的推荐，给他展示才华的机会。
推荐人：李华`
            },
            {
                title:"18.周末公园日记",
                content:`Sunday, October 15th Sunny
Today I went to the city park with my classmates after morning self-study. We took many photos of beautiful flowers and trees.

Then we sat on the lawn to share English stories and practice oral English. I learned more than thirty new words and daily expressions from my classmates.

This meaningful activity makes me love English reading and speaking again. I hope we can hold more outdoor study activities in the future.`,
                trans:`10月15日 周日 晴
今早自习后，我和同学去了城市公园。我们拍了很多花草树木的照片。
然后我们坐在草坪上分享英文故事、练习口语。我从同学身上学到三十多个新单词与日常表达。
这次有意义的活动让我重新爱上英语阅读与口语。希望今后多举办户外学习活动。`
            },
            {
                title:"19.手机利弊议论文",
                content:`Nowadays, mobile phones are very popular among students. Different students have different opinions on using mobile phones during study.

Some students think mobile phones are helpful. They can look up new words, listen to listening materials and watch English videos anytime. However, others say phones waste study time because students easily become addicted to games and videos.

In my opinion, we should use mobile phones properly to help our study instead of spending time on meaningless entertainment.`,
                trans:`如今手机在学生中非常普及。对于学习时使用手机，大家看法不同。
一部分学生认为手机很有用：可以随时查单词、听听力、看英语视频。但另一部分人认为手机浪费学习时间，学生容易沉迷游戏与视频。
在我看来，我们应合理使用手机辅助学习，不要把时间花在无意义的娱乐上。`
            },
            {
                title:"20.健康作息倡议书",
                content:`Healthy Living Proposal
Good living habits are very important for English learning. Without a healthy body, we cannot keep energetic to finish daily study tasks.

First, keep early hours to get enough energy for morning reading. Second, do proper sports every day to relax our brains. Third, refuse to stay up late playing phones or doing homework.

A healthy body gives us enough energy to learn English well. Let us form healthy living habits from today.`,
                trans:`健康生活倡议书
良好生活习惯对英语学习至关重要。没有健康的身体，我们无法保持精力完成日常学习任务。
第一，早睡早起，为晨读保持充足精力；第二，每天适度运动放松大脑；第三，拒绝熬夜玩手机、赶作业。
健康的身体给我们足够精力学好英语。让我们从今天开始养成健康作息。`
            },
            {
                title:"21.运动与学习议论文",
                content:`Sports and Study
Many students think doing sports is a waste of study time. In fact, proper sports can help us improve study efficiency greatly.

Long-time reading and writing makes our brains tired. Thirty minutes of gentle sports can relax us and make us energetic again. Sports also make us stronger and less likely to get sick.

I suggest every student exercise for thirty minutes every day. Balancing study and rest is the key to steady progress.`,
                trans:`运动与学习
许多学生认为运动浪费学习时间。事实上，适度运动能大幅提升学习效率。
长时间读写会让大脑疲惫。三十分钟舒缓运动能放松身心，恢复精力。运动还能增强体质，减少生病。
我建议每位学生每天运动三十分钟。平衡学习与休息是稳步进步的关键。`
            },
            {
                title:"22.阅读的价值议论文",
                content:`The Value of Reading
Reading is the cheapest and most convenient way to open our eyes to the world, especially English reading for students.

English reading brings us new vocabulary, foreign culture and beautiful sentences for compositions. It also improves our reading speed and logical analysis ability in exams.

We should form a lifelong reading habit and stick to reading English materials every day. Reading will benefit us for a lifetime.`,
                trans:`阅读的价值
阅读是成本最低、最便捷的拓宽眼界方式，对学生而言英文阅读尤为重要。
英文阅读带给我们新单词、外国文化与优美作文句式，还能提升考试中的阅读速度与逻辑分析能力。
我们应养成终身阅读习惯，每日坚持阅读英文素材。阅读将让我们终身受益。`
            },
            {
                title:"23.网课利弊作文",
                content:`Online English Learning
Online courses provide us with convenient ways to learn English at home.

We can watch teaching videos and listen to materials anytime and anywhere. However, many students lack self-control. They turn off classes secretly and play games or watch videos during class time.

We should make full use of online resources to improve our English skills instead of wasting time on entertainment.`,
                trans:`线上英语学习
网课为我们提供足不出户学习英语的便捷方式。
我们可以随时随地观看教学视频、听听力材料。但许多学生缺乏自制力，偷偷逃课玩游戏、刷视频。
我们应充分利用线上资源提升英语能力，不要把时间浪费在娱乐上。`
            },
            {
                title:"24.假期兼职书信",
                content:`Dear teacher,

I plan to take a part-time job during the summer holiday. I want to work as an English tutor for junior students nearby.

This job can improve my oral English and teach me how to communicate with teenagers. I have made a clear timetable to make sure it will not affect my holiday study plan.

Could you give me some advice on my part-time plan?

Yours student,
Li Hua`,
                trans:`尊敬的老师：
我计划暑假找一份兼职，想担任小区周边中小学生的英语家教。
这份工作能锻炼我的英语口语，教会我与青少年沟通。我制定了清晰时间表，保证不会影响假期学习计划。
您能给我的兼职计划一些建议吗？
学生 李华`
            },
            {
                title:"25.传统节日作文",
                content:`My Favorite Festival
My favorite Chinese traditional festival is the Spring Festival.

During the festival, all family members get together to have a big dinner on New Year’s Eve. We watch the Spring Festival Gala and exchange best wishes with each other. It is full of warmth and happiness.

In my free time, I often introduce Spring Festival customs to foreign friends in English. I hope more people can understand Chinese traditional culture.`,
                trans:`我最喜欢的节日
我最喜欢的中国传统节日是春节。
春节期间，全家人除夕夜团聚吃年夜饭，一起看春晚、互送祝福，充满温暖与欢乐。
闲暇时，我经常用英语向外国朋友介绍春节习俗，希望更多人了解中国传统文化。`
            },
            {
                title:"26.寻物启事",
                content:`Lost Notice
I lost an important black English notebook on the school playground at 3:00 p.m. this Wednesday after PE class.

It contains my class notes, vocabulary lists and grammar points. All contents are very important for my exams.

If you find it, please call me at 138XXXX1234. I will express my sincere thanks to you.
Li Hua from Class 3`,
                trans:`寻物启事
本周三下午3点体育课结束后，我在学校操场丢失一本重要的黑色英语笔记本。
本子里有我的课堂笔记、单词表与语法知识点，对我的考试非常重要。
如有捡到者，请致电138XXXX1234联系我，我将深表感谢。
三班 李华`
            },
            {
                title:"27.失约道歉信",
                content:`Dear Tom,

I am writing to say sorry to you for missing our English study activity yesterday afternoon. I know you prepared many reading materials for me in advance.

My mother suddenly had a high fever and I had to look after her at home, so I could not keep our promise. I feel very sorry for wasting your time.

Could we make a new plan to study English together this weekend? I will prepare everything on time.

Yours,
Li Hua`,
                trans:`亲爱的汤姆：
我为昨天下午错过我们的英语学习活动向你道歉。我知道你提前为我准备了很多阅读材料。
我妈妈突然发高烧，我必须在家照顾她，所以没能遵守约定。很抱歉浪费了你的时间。
我们这周末重新约时间一起学英语好吗？我会准时备好一切。
李华`
            },
            {
                title:"28.新生欢迎演讲稿",
                content:`Dear new classmates,

Welcome to our English class! It’s our great honor to study and grow with you in the new school year.

Our teachers are patient and ready to help you. Our class holds many interesting activities every month, such as speech contests and reading sharing meetings.

If you have any problems in English learning, teachers and classmates are all willing to help you. Wish you a happy and fruitful school life!`,
                trans:`亲爱的新同学们：
欢迎来到英语班级！新学年能和大家一同学习成长，我们倍感荣幸。
我们的老师耐心且乐于助人，班级每月举办演讲比赛、读书分享会等趣味活动。
如果你在英语学习上遇到困难，老师和同学都愿意帮助你。祝愿你拥有快乐充实的校园生活！`
            },
            {
                title:"29.网课学习心得",
                content:`My Online English Learning Experience
Last semester we took online English courses at home due to special reasons, which gave me a new learning experience.

We listened to online lectures, finished homework and handed it in through mobile phones. Our class also held online group discussions to exchange learning ideas.

This special experience taught me that we must learn to study independently and control ourselves strictly without teachers’ face-to-face supervision.`,
                trans:`我的线上英语学习心得
上学期因特殊情况，我们在家上网课，这段经历给了我全新学习体验。
我们线上听课、完成作业并通过手机提交，班级还开展线上小组讨论交流学习思路。
这段特殊经历教会我：没有老师面对面监督，我们也必须学会自主学习、严格自律。`
            },
            {
                title:"30.节约粮食倡议书",
                content:`Save Food Proposal
Food comes from farmers’ hard work, so saving food is a good virtue for every student.

We should follow three rules at the dining hall. First, take proper food according to our appetite. Second, never throw away edible food. Third, remind classmates to save food when eating together.

Saving food is a traditional virtue. Let us start from every meal and refuse to waste food.`,
                trans:`节约粮食倡议书
粮食来之不易，节约粮食是每位学生的优良美德。
在食堂我们应遵守三条准则：第一，根据食量适量取餐；第二，不丢弃可食用饭菜；第三，共同就餐时提醒同学节约粮食。
节约粮食是传统美德。让我们从每一餐做起，拒绝浪费粮食。`
            },
            {
                title:"31.城市变化议论文",
                content:`Great Changes of Our City
Our city has changed greatly in transportation, environment and cultural life in recent years.

New wide roads and convenient buses connect every corner of the city. Many empty lands have become green parks with trees and flowers. More libraries and activity centers are built for citizens.

The better environment provides us with more comfortable conditions to study and relax. I am proud of our city’s great changes.`,
                trans:`我们城市的巨大变化
近几年，我们的城市在交通、环境、文化生活方面发生了巨大变化。
崭新宽阔的道路与便捷公交连通城市各个角落，许多空地变成绿树成荫的公园，更多图书馆与活动中心为市民开放。
更优的环境为我们提供更舒适的学习休闲条件。我为城市的巨大变化感到自豪。`
            },
            {
                title:"32.志愿服务意义作文",
                content:`The Meaning of Volunteer Service
Taking part in volunteer activities is not only a school task, but also a valuable chance for us to grow and understand society.

When we clean public areas or accompany the elderly, we learn to care for others and take social responsibility. We can also practice oral English when talking with foreign visitors.

Volunteer experience shapes our kind character and enriches our after-school life. Every student should take part in volunteer activities actively.`,
                trans:`志愿服务的意义
参加志愿活动不仅是学校任务，更是我们成长、了解社会的珍贵机会。
清扫公共区域、陪伴老人时，我们学会关爱他人、承担社会责任；与外国游客交流时，还能锻炼英语口语。
志愿经历塑造我们善良的品格，丰富课余生活。每位学生都应积极参加志愿活动。`
            },
            {
                title:"33.线上英语活动介绍",
                content:`An Online English Activity
Our class held an online English culture sharing activity last Friday evening, which gave us an unforgettable learning experience.

Each student prepared a short introduction about foreign culture or festivals. We spoke in turn and communicated with each other. Our English teacher gave professional comments at last.

This activity breaks the space limit and helps us learn foreign culture easily at home. We plan to hold such activities every two months.`,
                trans:`一场线上英语活动
上周五晚上，我们班举办线上英语文化分享活动，带给我们难忘的学习体验。
每位同学准备一段外国文化或节日的简短介绍，轮流发言、互相交流。最后英语老师给出专业点评。
这场活动打破空间限制，让我们在家轻松学习外国文化。我们计划每两个月举办一次。`
            },
            {
                title:"34.中华文化传播作文",
                content:`Spread Chinese Traditional Culture
As Chinese students, we have the duty to spread our excellent traditional culture to the world.

We can introduce festivals, poems, food and customs to foreign friends through English articles or conversations. Learning English well helps us tell Chinese stories clearly to the world.

We should improve our English ability and introduce our traditional culture to foreign friends whenever we have chances. Let more people know the beauty of China.`,
                trans:`传播中华传统文化
作为中国学生，我们有责任向世界传播优秀传统文化。
我们可以通过英文文章或对话，向外国朋友介绍节日、诗词、美食与习俗。学好英语能帮我们向世界讲好中国故事。
我们应提升英语能力，抓住机会向外国朋友介绍传统文化，让更多人领略中国之美。`
            },
            {
                title:"35.缓解学习压力作文",
                content:`Ways to Reduce Study Pressure
Nowadays most students face heavy study pressure from exams and homework. We need to find healthy ways to relax ourselves.

First, we can read interesting English stories to relax our minds. Second, taking a walk or doing sports can release tiredness quickly. Third, talking with teachers or friends about worries is also helpful.

Balancing study and rest can reduce pressure effectively and keep our study efficiency stable.`,
                trans:`缓解学习压力的方法
如今大多数学生面临考试与作业带来的沉重学习压力，我们需要寻找健康方式放松自己。
第一，阅读趣味英文故事放松心情；第二，散步或运动能快速释放疲惫；第三，向老师或朋友倾诉烦恼也很有帮助。
平衡学习与休息能有效减压，保持稳定的学习效率。`
            },
            {
                title:"36.健康饮食习惯作文",
                content:`Healthy Eating Habits
Healthy eating habits provide steady energy for our daily English study. Unhealthy eating makes us sleepy and unable to focus on study.

We should eat enough vegetables and fruits every day to get enough vitamins. Stay away from too much oily fast food and sweet drinks. Drinking more warm water is good for our health.

A healthy diet keeps our brains clear and energetic. Every student should form healthy eating habits from today.`,
                trans:`健康饮食习惯
健康的饮食习惯为我们日常英语学习提供稳定能量，不健康饮食会让人昏昏欲睡、无法专注学习。
我们每天应吃足量蔬菜水果获取维生素，远离过多油腻快餐与甜饮料，多喝温水有益健康。
健康饮食让我们头脑清醒、精力充沛。每位学生都应从今天开始养成健康饮食习惯。`
            },
            {
                title:"37.低碳生活议论文",
                content:`Low-carbon Life
Living a low-carbon life is everyone’s responsibility to protect the earth. We can do many small things every day.

We can walk or ride bikes for short trips instead of taking cars. Turn off lights and screens when leaving rooms. Use both sides of paper when writing English exercises.

These small actions can help protect the environment. Let us take action and live a low-carbon green life from now on.`,
                trans:`低碳生活
过低碳生活是每个人保护地球的责任，我们每天都能做很多小事。
短途出行我们可以步行或骑自行车，代替坐车；离开房间时关灯关屏幕；写英语练习时纸张双面使用。
这些小事都能助力环保。让我们从现在开始行动，过低碳绿色生活。`
            },
            {
                title:"38.读书分享会作文",
                content:`An English Reading Sharing Meeting
Our class held an English reading sharing meeting last week. All students took an active part in it.

Each student introduced their favorite English book or passage, shared beautiful sentences and reading feelings. We discussed and learned from each other happily.

This sharing meeting aroused our interest in English reading and helped us learn more useful expressions. I hope we can hold more such activities in the future.`,
                trans:`一场英语读书分享会
上周我们班举办英语读书分享会，全体同学积极参与。
每位同学介绍自己最喜欢的英文书或文章，分享优美句子与阅读感受，大家愉快交流、互相学习。
这场分享会激发了我们对英语阅读的兴趣，帮我们学到更多实用表达。希望今后多举办这类活动。`
            },
            {
                title:"39.职业规划作文",
                content:`My Career Plan
My ideal job is to become an English teacher in the future. I want to pass English knowledge to more students and help them improve their skills.

To realize my dream, I must study English hard now, improve my listening, speaking, reading and writing abilities comprehensively. I also need to practice expressing myself clearly and patiently.

I will keep working hard for my career goal and make my dream come true step by step.`,
                trans:`我的职业规划
我未来理想的工作是成为一名英语老师，想把英语知识传递给更多学生，帮他们提升能力。
为实现梦想，我现在必须努力学习英语，全面提升听说读写能力，同时练习清晰耐心地表达自己。
我会为职业目标持续努力，一步步实现梦想。`
            },
            {
                title:"40.文明班级倡议书",
                content:`Civilized Class Proposal
A clean, united and civilized class environment is very important for our study. We should work together to build a warm and positive class atmosphere.

First, keep our classroom clean and tidy every day. Second, respect teachers and get along well with classmates. Third, study hard and help each other make progress. Fourth, take good care of public things in class.

Let us take action together to build a civilized and excellent class where everyone can study happily and grow healthily.`,
                trans:`文明班级倡议书
整洁团结的文明班级环境对我们的学习至关重要，我们应共同打造温暖积极的班级氛围。
第一，每日保持教室干净整洁；第二，尊敬老师、与同学和睦相处；第三，勤奋学习、互帮互助进步；第四，爱护班级公共物品。
让我们共同行动，建设文明优秀的班集体，让每个人都能快乐学习、健康成长。`
            },
            {
                title:"41.美食介绍作文",
                content:`Chinese Traditional Food
China is famous for its rich and delicious traditional food. Among all kinds of local dishes, dumplings are my favorite traditional Chinese food.

Dumplings are made of flour and fresh meat or vegetables. They are delicious and healthy. During festivals and special celebrations, families usually make dumplings together to celebrate happy moments. Making dumplings has become a part of Chinese traditional culture.

In my opinion, traditional food carries our culture and family warmth. I am proud of our traditional food culture and hope more foreign friends can taste and love Chinese food.`,
                trans:`中国传统美食
中国以丰富美味的传统美食闻名世界。在众多特色美食中，饺子是我最喜欢的传统食物。
饺子由面皮、鲜肉或蔬菜制作而成，美味又健康。每逢节日或喜庆时刻，家家户户都会一起包饺子庆祝。包饺子已经成为中国传统文化的一部分。
在我看来，传统美食承载着文化底蕴与家庭温情。我为中国饮食文化自豪，也希望更多外国朋友品尝、喜爱中国美食。`
            },
            {
                title:"42.旅行见闻记叙文",
                content:`A Wonderful Travel Experience
Last holiday, I went on a wonderful trip with my parents. I visited a famous scenic city and learned a lot during this meaningful journey.

We visited beautiful mountains, clean lakes and ancient traditional buildings. I took many photos and enjoyed local traditional food. I also met friendly local people and talked with them in simple English. This trip broadened my horizons and made my holiday colorful.

Traveling teaches us knowledge that we cannot learn from books. I hope I can travel to more places in the future and experience different cultures.`,
                trans:`一次精彩的旅行经历
上个假期，我和父母开启了一场精彩旅行，游览了一座知名风景城市，在这段充实的旅程中收获良多。
我们观赏了秀丽的山川、清澈的湖泊与古朴的中式建筑，拍摄了许多照片，品尝了当地特色美食。我还遇到友善的当地人，用简单英文和他们交流。这次旅行开阔了我的眼界，让假期丰富多彩。
旅行教会我们书本上学不到的知识。我希望未来能去往更多地方，体验不同的风土人情。`
            },
            {
                title:"43.线上购物利弊",
                content:`Online Shopping
With the development of the Internet, online shopping has become more and more popular in our daily life. It brings both advantages and disadvantages for students.

On one hand, online shopping is very convenient. We can buy all kinds of things at home and save plenty of time. On the other hand, some online goods are of low quality. Some students even spend too much money on useless things.

In my opinion, we should shop online rationally. We should buy necessary things and avoid wasting money. Correct online shopping habits can bring us great convenience.`,
                trans:`线上购物
随着互联网发展，网购在日常生活中越来越普及，它给学生带来便利的同时，也存在一些弊端。
一方面，网购十分便捷，足不出户就能买到各类商品，节省大量时间；另一方面，部分网购商品质量较差，还有一些学生挥霍金钱购买无用物品。
我认为，我们应理性网购，只购买刚需物品、杜绝浪费。养成正确的网购习惯，才能真正享受便利。`
            },
            {
                title:"44.纸质书vs电子书",
                content:`Paper Books vs E-books
Nowadays, many students choose to read e-books instead of traditional paper books. Both reading ways have their own advantages.

E-books are convenient to carry and we can read them anytime. However, long-time screen reading is bad for our eyes. Paper books are more comfortable to read and help us focus better. They also give us a better reading experience.

I think we should combine these two ways. Use e-books for casual reading and paper books for serious study. This is the best way to improve our reading ability.`,
                trans:`纸质书与电子书对比
如今很多学生选择阅读电子书，替代传统纸质书，两种阅读方式各有优势。
电子书便携性强、随时可读，但长时间看屏幕伤害眼睛；纸质书阅读体验更佳，更能帮助我们集中注意力，深耕学习。
我认为我们可以结合两种方式：休闲阅读用电子书、深度学习用纸质书，这是提升阅读能力的最佳方式。`
            },
            {
                title:"45.校园文明倡议",
                content:`Behave Civilized on Campus
A civilized campus environment is important for all teachers and students. We should develop good manners and behave well at school.

First, we should speak politely and respect teachers and classmates. Second, keep the campus clean and never litter. Third, follow school rules and never run or shout in teaching buildings. Fourth, help classmates in need and build a friendly campus atmosphere.

Small good behaviors can make our school more beautiful. Let us start from ourselves and be civilized students.`,
                trans:`校园文明行为倡议
文明的校园环境对全体师生至关重要，我们应当养成良好礼仪，规范校园行为。
第一，文明用语、尊师友爱；第二，保持校园整洁、不乱扔垃圾；第三，遵守校规校纪，不在教学楼追逐喧哗；第四，乐于助人，营造友善校园氛围。
微小的文明举动能让校园更美好，让我们从我做起，争做文明学生。`
            },
            {
                title:"46.校园运动会介绍",
                content:`Our School Sports Meeting
Our school held a wonderful autumn sports meeting last month. All students took an active part in different sports events.

There were many exciting games, such as running, jumping and ball games. All athletes tried their best and showed great sports spirit. Other students cheered for players and kept the scene warm and lively.

The sports meeting not only exercises our bodies, but also strengthens class unity. It teaches us the importance of perseverance and teamwork. I look forward to the next sports meeting.`,
                trans:`我们的校园运动会
上个月我校举办了精彩的秋季运动会，全体同学积极参与各类赛事项目。
运动会设有跑步、跳远、球类等多项精彩项目，参赛选手奋力拼搏，展现出良好的体育精神，其余同学热情助威，现场氛围热烈。
运动会不仅锻炼体魄，更增强班级凝聚力，让我们懂得坚持与团结协作的重要性。我十分期待下一次运动会。`
            },
            {
                title:"47.兴趣爱好作文",
                content:`My Hobby
Everyone has different hobbies, and my favorite hobby is reading English books in my spare time. This hobby brings me endless happiness and progress.

Reading English books helps me enlarge vocabulary, improve my grammar and learn foreign culture. Whenever I feel tired or stressed, reading can calm my mind and relax myself. It makes my after-school life rich and colorful.

I will keep this good hobby forever. A good hobby can help us grow steadily and become a better person.`,
                trans:`我的兴趣爱好
每个人都有不同爱好，我课余时间最喜欢读英文书籍，这个爱好带给我无尽的快乐与进步。
阅读英文书籍能扩充词汇、巩固语法、学习异国文化。每当我疲惫焦虑时，阅读能平复心情、放松身心，让课余生活丰富多彩。
我会一直坚持这个好习惯，优质的爱好能助力我们稳步成长，成为更优秀的自己。`
            },
            {
                title:"48.自律的重要性",
                content:`The Importance of Self-discipline
Self-discipline is the most important quality for every student. No one can make steady progress without strict self-control.

Self-disciplined students can finish study tasks on time, keep good living habits and refuse bad temptations. They make full use of spare time to read, practice and improve themselves. On the contrary, students who lack self-discipline always waste time and fall behind.

I believe self-discipline decides our final grades and future. We should learn to control ourselves and develop good self-discipline habits from today.`,
                trans:`自律的重要性
自律是学生最重要的品质，没有严格的自我约束，就无法稳步进步。
自律的学生能按时完成学习任务、保持良好作息、拒绝不良诱惑，充分利用课余时间阅读练习、提升自我。反之，缺乏自律的学生极易浪费时间、成绩落后。
自律决定我们的成绩与未来，我们要从现在学会自我约束，养成自律好习惯。`
            },
            {
                title:"49.尊老爱幼倡议",
                content:`Respect the Old and Love the Young
Respecting the elderly and loving children is a traditional Chinese virtue. It is our duty to carry forward this good virtue in daily life.

We can help elderly people in our community, offer seats on buses and care for younger students at school. We should be polite, patient and warm to others. Small kind acts can bring great warmth to society.

Let us start with small things, respect the old and love the young. Make our society full of love and kindness.`,
                trans:`尊老爱幼倡议书
尊老爱幼是中华传统美德，日常生活中传承这份美德是我们每个人的责任。
我们可以帮扶社区老人、公交车主动让座、在校关爱学弟学妹，待人礼貌耐心、心怀善意。微小的善举，就能为社会传递温暖。
让我们从小事做起，践行尊老爱幼，让社会充满温情与善意。`
            },
            {
                title:"50.线上交友利弊",
                content:`Making Friends Online
Nowadays, many students like making friends online. Online friendship has both advantages and disadvantages.

Online communication allows us to meet people from different places and learn new things. However, some online friends are not honest. Some students may be cheated or influenced by bad information.

In my opinion, we can make friends online but we must be careful. We should protect ourselves and keep a rational attitude towards online friendship.`,
                trans:`线上交友
如今很多学生喜欢线上交友，网络交友利弊共存。
网络能让我们结识各地朋友、学习新鲜事物，但部分网友并不真诚，学生容易受骗、受到不良信息影响。
我认为我们可以适度线上交友，但必须提高警惕、保护自我，理性对待网络友谊。`
            },
            {
                title:"51.周末出行计划书信",
                content:`Dear friend,

I am glad to tell you my weekend travel plan. I plan to visit the city museum with my classmates this Saturday morning.

The museum is full of interesting history and culture. We can learn a lot and practice oral English at the same time. I hope you can join us and have a good time together.

Looking forward to your reply.

Yours,
Li Hua`,
                trans:`亲爱的朋友：
我很高兴告诉你我的周末出行计划。我打算本周六上午和同学去城市博物馆。

                trans:`亲爱的汤姆：

            },
            {
                title:"53.英语学习方法议论文",
                content:`My English Learning Methods
English is very important for us, but many students find it difficult to learn well. In fact, proper learning methods can make English study easier and more effective.

First, we should read English passages for twenty minutes every morning. Second, listen to English materials before sleeping. Third, practice speaking English as often as possible.

Keeping good habits is the key to success. If we keep practicing every day, we will make great progress in English.`,
                trans:`我的英语学习方法
英语对我们非常重要，但许多学生觉得很难学好。事实上，正确的学习方法能让英语学习更轻松高效。
第一，我们应该每天早晨读二十分钟英语文章；第二，睡前听英语材料；第三，尽可能多练习说英语。
坚持好习惯是成功的关键。如果我们每天坚持练习，英语一定会取得巨大进步。`
            },
            {
                title:"54.环保出行倡议",
                content:`Green Travel Proposal
Air pollution is becoming a serious problem. It is everyone’s duty to choose green travel ways and protect the environment.

We can walk or ride bikes for short trips. For long-distance travel, we can take buses or subways. Fewer cars mean less air pollution.

Green travel is good for the environment and our health. Let us choose green travel ways and make our sky cleaner and clearer.`,
                trans:`绿色出行倡议书
空气污染日益严重，选择绿色出行方式、保护环境是每个人的责任。
短途我们可以步行或骑自行车，长途可以乘坐公交或地铁。汽车越少，空气污染越少。
绿色出行有利于环境与健康。让我们选择绿色出行，让天空更洁净、更清澈。`
            },
            {
                title:"55.童年回忆记叙文",
                content:`An Unforgettable Childhood Memory

When I was a child, my friends and I read English stories and sang simple English songs together. We helped each other and made progress together. Those warm days made me fall in love with English.

This beautiful memory will stay in my heart forever. It encourages me to keep studying English hard all the time.`,
                trans:`一段难忘的童年回忆
在我所有童年回忆中，和朋友们一起学英语的经历最难忘。
小时候，我和伙伴们一起读英文故事、唱简单的英文歌，互帮互助、共同进步。那些温暖的日子让我爱上了英语。

            },
            {
                title:"56.图书馆使用建议信",
                content:`Dear librarian,

I am a student who often reads in the library. I want to give some suggestions to make our library better.

First, you can add more simple English books for students. Second, please keep the reading room quiet and tidy. Third, you can tell us some reading tips regularly.

Yours,
Li Hua`,
                trans:`尊敬的图书管理员：

第一，可以增加更多适合学生的简易英文书籍；第二，请保持阅览室安静整洁；第三，可以定期给我们一些阅读建议。
希望我的建议能被采纳，祝愿我们的图书馆越来越受学生欢迎。
李华`
            },
            {
                title:"57.短视频利弊议论文",
                content:`Short Videos
Nowadays, short videos are very popular among students. They bring us happiness but also cause some problems.

Short videos can help us relax and learn new knowledge in our free time. However, many students spend too much time watching them, which influences our study and rest.

In my opinion, we should watch short videos in a proper time. We must control our time and never let them influence our normal study life.`,
                trans:`短视频
如今短视频在学生中非常流行，它们带给我们快乐，但也带来一些问题。
短视频能帮我们在空闲时放松心情、学习新知识。然而许多学生花太多时间看视频，影响学习与休息。
我认为，我们应该在合适的时间看短视频，必须控制时间，绝不能影响正常的学习生活。`
            },
            {
                title:"58.手工活动介绍",
                content:`A Meaningful Handcraft Activity
Our class held a special handcraft activity last week. We made small English greeting cards with our own hands.

We wrote beautiful English sentences and drew colorful pictures on the cards. Then we gave the cards to our teachers and classmates as small gifts.

This activity not only improves our writing skills but also makes us feel the warmth of sharing. It is a really meaningful and unforgettable experience.`,
                trans:`一场有意义的手工活动
上周我们班举办了一场特别的手工活动，我们亲手制作英文贺卡。
我们在卡片上写下优美的英语句子，画上彩色图案，然后把卡片作为小礼物送给老师和同学。
这次活动不仅提升了我们的书写能力，还让我们感受到分享的温暖。这真是一次有意义、难忘的经历。`
            },
            {
                title:"59.合作的重要性作文",
                content:`The Importance of Teamwork
Teamwork is very important in our study and daily life. No one can live or work well alone.

In group activities, we can help each other, share ideas and finish tasks faster. Teamwork also teaches us how to communicate with others and understand each other.

Working together can make difficult things easy. We should learn to cooperate with others and develop good teamwork spirit.`,
                trans:`合作的重要性
团队合作在我们学习和日常生活中非常重要，没有人能独自很好地生活和学习。
在集体活动中，我们可以互相帮助、分享想法、更快完成任务。合作还教会我们如何与人沟通、互相理解。
团队合作能让困难的事情变简单。我们应该学会与他人合作，培养良好的团队精神。`
            },
            {
                title:"60.英语学习计划书信",
                content:`Dear teacher,

The new term is coming, and I have made a clear English study plan to improve my ability.

First, I will read English for twenty minutes every morning. Second, I will finish homework carefully and take notes in class. Third, I will take part in English activities actively and practice speaking bravely.

I will try my best to follow this plan. I hope I can get great progress in English this term.

Yours student,
Li Hua`,
                trans:`尊敬的老师：
新学期即将到来，我制定了清晰的英语学习计划来提升能力。
第一，我每天早晨读二十分钟英语；第二，认真完成作业、做好课堂笔记；第三，积极参加英语活动，勇敢练习口语。
我会尽力遵守这份计划，希望这学期英语能取得巨大进步。
学生 李华`
            }
        ];

        // 复制文本
        function copyText(text){
            return new Promise((resolve)=>{
                if(navigator.clipboard && window.isSecureContext){
                    navigator.clipboard.writeText(text).then(()=>resolve(true)).catch(()=>{
                        tempInput.value = text;
                        tempInput.select();
                        document.execCommand('copy');
                        resolve(true);
                    })
                }else{
                    tempInput.value = text;
                    tempInput.select();
                    document.execCommand('copy');
                    resolve(true);
                }
            })
        }

        // 渲染模板
        function renderTemplates(list){
            let html = "";
            (list || essayTemplates).forEach((item,idx)=>{
                html += `<div class="template-item">
                    <h4>${item.title}</h4>
                    <div class="template-text">${item.content}</div>
                    <div class="trans-label">中文翻译：</div>
                    <div class="trans-text">${item.trans}</div>
                    <button class="light-btn copy-btn" data-index="${idx}">一键复制英文</button>
                </div>`
            })
            templateBox.innerHTML = html;

            document.querySelectorAll('.copy-btn').forEach(btn=>{
                btn.onclick = async function(){
                    const idx = this.dataset.index;
                    const targetText = (list || essayTemplates)[idx].content;
                    await copyText(targetText);
                    toast.classList.add('show');
                    setTimeout(()=>toast.classList.remove('show'),1500);
                }
            })
        }

        // 搜索功能
        searchInput.oninput = function(){
            const key = this.value.trim().toLowerCase();
            if(!key){
                renderTemplates();
                return;
            }
            const filtered = essayTemplates.filter(item => 
                item.title.toLowerCase().includes(key) ||
                item.content.toLowerCase().includes(key) ||
                item.trans.includes(key)
            );
            renderTemplates(filtered);
        }

        // 打印/导出
        printBtn.onclick = () => window.print();

        // 深色模式
        function loadDarkMode(){
            let mode = localStorage.getItem('essayDark');
            if(mode === "1"){
                document.body.classList.add('dark-mode');
                let icon = darkToggle.querySelector('i');
                icon.classList.replace('fa-moon','fa-sun');
            }
        }
        darkToggle.onclick = function(){
            document.body.classList.toggle('dark-mode');
            let icon = this.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            localStorage.setItem('essayDark', document.body.classList.contains('dark-mode') ? "1" : "0");
        }

        // 初始化
        loadDarkMode();
        renderTemplates();
    </script>
</body>
</html>

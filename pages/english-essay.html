<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 英语作文模板</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
            -webkit-appearance: none;
        }
        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #fafafa;
            --hover: #f1f1f1;
        }
        .dark-mode{
            --bg:#15171b;
            --text:#e8e8e8;
            --subtext:#999;
            --border:#2c2f36;
            --card:#1e2127;
            --hover:#2c2f36;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 20px 40px;
        }
        .container {
            width: 100%;
            max-width: 360px;
        }
        .search-bar{
            width:100%;
            padding:10px 14px;
            border:1px solid var(--border);
            border-radius:10px;
            background:var(--card);
            color:var(--text);
            font-size:14px;
            margin-bottom:12px;
            outline:none;
        }
        .title-row{
            display:flex;
            justify-content: space-between;
            align-items:center;
            margin-bottom:12px;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            color: var(--theme);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .action-row{
            display:flex;
            gap:8px;
            margin-bottom:12px;
        }
        .action-row button{
            flex:1;
        }
        .template-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(174,51,51,0.08);
            max-height: 74vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .template-wrap::-webkit-scrollbar {
            display: none;
        }
        .template-item{
            padding:14px 0;
            border-bottom:1px solid var(--border);
        }
        .template-item:last-child{
            border-bottom: none;
        }
        .template-item h4{
            color: var(--theme);
            margin-bottom: 10px;
            font-size: 16px;
        }
        .template-text{
            white-space: pre-wrap;
            font-size:14px;
            line-height:1.6;
            margin:8px 0;
            background:var(--bg);
            padding:10px;
            border-radius:8px;
        }
        .trans-label{
            font-weight:500;
            margin:6px 0 4px;
            font-size:14px;
            color: var(--theme);
        }
        .trans-text{
            white-space: pre-wrap;
            font-size:13px;
            line-height:1.6;
            margin-bottom:12px;
            background:rgba(174,51,51,0.06);
            padding:10px;
            border-radius:8px;
            color:var(--subtext);
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            -webkit-appearance: none;
        }
        button:active {
            transform: scale(0.96);
        }
        .light-btn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .soft-text {
            margin-top: 16px;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.6;
            text-align: center;
        }
        #darkToggle {
            width: 36px !important;
            height: 36px !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            flex: none !important;
        }
        #darkToggle i {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toast-tip{
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: var(--theme);
            color: #fff;
            border-radius: 99px;
            font-size:14px;
            z-index:999;
            opacity:0;
            pointer-events:none;
            transition: opacity 0.3s;
        }
        .toast-tip.show{
            opacity:1;
        }
        #tempCopyInput{
            position: fixed;
            left: -9999px;
            top: -9999px;
        }

        /* 打印/导出优化 */
        @media print{
            body{
                background:#fff !important;
                color:#000 !important;
                padding:0 !important;
            }
            .container{
                max-width:100% !important;
            }
            .search-bar,
            .action-row,
            #darkToggle,
            .soft-text,
            .toast-tip,
            button,
            .desc{
                display:none !important;
            }
            .template-wrap{
                border:none !important;
                box-shadow:none !important;
                background:#fff !important;
                max-height:none !important;
            }
            .template-item{
                border-color:#eee !important;
            }
            .template-text{
                background:#fff !important;
                border:1px solid #eee !important;
            }
            .trans-text{
                background:#f8f8f8 !important;
                color:#555 !important;
            }
            h4, .trans-label{
                color:#000 !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-row">
            <div class="title">
                <i class="fa-solid fa-file-word"></i> 英语作文模板
            </div>
            <button class="light-btn" id="darkToggle"><i class="fa-solid fa-moon"></i></button>
        </div>
        <div class="desc">专升本60篇英文作文｜中英对照｜一键复制｜搜索｜打印</div>

        <input type="text" class="search-bar" id="searchInput" placeholder="🔍 搜索作文关键词（中文/英文均可）">

        <div class="action-row">
            <button class="light-btn" id="printBtn"><i class="fa-solid fa-print"></i> 打印/导出PDF</button>
        </div>

        <div class="template-wrap" id="templateBox"></div>
        <div class="soft-text">
            书信 / 议论 / 通知 / 演讲 / 日记 / 环保 / 节日 / 志愿 / 文化 / 职业规划 全题型覆盖
        </div>
    </div>

    <div class="toast-tip" id="toast">复制成功</div>
    <textarea id="tempCopyInput"></textarea>

    <script>
        const templateBox = document.getElementById('templateBox');
        const darkToggle = document.getElementById('darkToggle');
        const toast = document.getElementById('toast');
        const tempInput = document.getElementById('tempCopyInput');
        const searchInput = document.getElementById('searchInput');
        const printBtn = document.getElementById('printBtn');

        const essayTemplates = [
    {
        title: "1.活动邀请信",
        content: `Dear Sir/Madam,

I’m writing to sincerely invite you to join our campus English culture exchange salon, which will be held this coming Sunday morning. The event will start at 9:00 a.m. sharp and last two hours in Room 306 on the third floor of the teaching building.

During the salon, we will share efficient vocabulary memorization methods, collect practical writing sentence patterns, and carry out situational oral practice face to face. Besides, several top-ranking students will give short speeches about their personal learning experience and useful tips. I firmly believe every participant can gain plenty of practical knowledge from this activity.

We would feel highly honored if you could spare your valuable time to attend our event. Looking forward to your early reply at your convenience.

Yours sincerely,
Li Hua`,
        trans: `尊敬的先生/女士：
我诚挚致函，邀请您参与本周日上午举办的校园英语文化交流沙龙。活动上午九点准时开始，于教学楼三楼306室举行，全程时长两小时。
活动期间，我们会分享高效的单词记忆方法、整理实用写作句型，并开展面对面的情景口语练习。此外，数名成绩优异的学生将进行简短发言，分享个人学习心得与实用技巧。我坚信每位参与者都能从本次活动中收获大量实用知识。
若您能抽出宝贵时间莅临，我们将倍感荣幸。期待您在方便之时尽早回复。
谨启
李华`
    },
    {
        title: "2.正反观点议论文",
        content: `Nowadays, daily English passage reading has become a core approach for students to improve their overall English competence. However, students hold sharply different opinions on sticking to everyday English reading.

Some students argue that daily reading eats into too much of their after-school leisure time. What’s more, they claim that long reading tasks easily cause mental tiredness and reduce their interest in English learning. On the contrary, I hold a totally different view. Long-term persistent reading can expand our vocabulary, polish our writing expressions and foster stronger logical thinking ability.

From my point of view, every student should keep reading short English passages for at least 20 minutes each day. Only in this way can we raise our comprehensive English level step by step steadily.`,
        trans: `如今，每日英文阅读已成为学生提升英语综合能力的核心途径。但对于坚持日常英文阅读这件事，学生们持有截然不同的看法。
一部分学生认为日常阅读占用了过多课余休闲时间。此外，他们表示长时间的阅读任务容易造成精神疲惫，降低英语学习兴趣。而我持完全相反的观点：长期坚持阅读能够扩充词汇量、打磨写作表达、培养更强的逻辑思维能力。
在我看来，每位学生都应坚持每日至少20分钟的短篇英文阅读。唯有如此，我们才能循序渐进、稳步提升英语综合水平。`
    },
    {
        title: "3.学习方法建议信",
        content: `Dear friend,

I’ve learned that you’re facing obvious difficulties in lifting your English exam scores, and you feel anxious about your current study plan. After careful thought, I have several practical suggestions for your situation.

First of all, you can read short English essays every morning to gradually develop your language sense. Besides, listening to easy English audio materials before bedtime can effectively improve your listening ability. Most importantly, never fear making mistakes when speaking English, for errors help you locate your weak points clearly.

I sincerely hope my advice can help you get out of learning trouble and make remarkable progress in the coming exams.

Yours,
Li Hua`,
        trans: `亲爱的朋友：
我得知你在提升英语考试分数上遇到了明显阻碍，对当下的学习规划感到焦虑。经过认真思考，我有几条适配你情况的实用建议。
首先，你可以每天早晨朗读英文短文，循序渐进培养语感；此外，睡前收听简易英语音频素材能有效提升听力；更重要的是，说英语时不要害怕犯错，失误能帮你清晰定位薄弱环节。
我衷心希望我的建议能帮你摆脱学习困境，在后续考试中取得显著进步。
你的朋友
李华`
    },
    {
        title: "4.校园志愿活动通知",
        content: `Notice

A community public welfare volunteer activity will be organized by our Student Union this Saturday morning. All students willing to join should gather at the school west gate at 8 o’clock sharp.

During the activity, we will sweep public sidewalks and tidy up green belt areas in the nearby neighborhood. After that, we will deliver daily necessities and handwritten greeting cards to local elderly people living alone. Every participant needs to bring bottled water and paper tissues on their own.

All participants must arrive on time and follow the arrangements of student leaders. No one shall be late or leave early without permission.
Student Union`,
        trans: `通知
学生会将于本周六上午组织一场社区公益志愿活动。有意参与的同学请于早上八点整在校西门集合。
活动期间，我们将清扫周边社区的公共步道、整理绿化带区域，随后为当地独居老人派送生活用品与手写贺卡。每位参与者需自行携带瓶装水与纸巾。
所有参与者务必准时到场，服从负责人安排，不得无故迟到、擅自早退。
学生会`
    },
    {
        title: "5.病假请假条",
        content: `Dear respected teacher,

I’m writing to apply for a two-day sick leave. Last night I caught a bad cold with a persistent high fever, and I went to the nearby community hospital for treatment right away.

The doctor said my physical condition is not fit for regular school study. He advised me to stay at home, take medicine on schedule and rest for two full days. I promise I will make up all missed lessons and homework immediately after I return to school.

I sincerely hope you can understand my situation and approve my leave request.

Yours respectfully,
Li Hua`,
        trans: `尊敬的老师：
我写信申请两天病假。昨晚我患上重感冒并持续高烧，随即前往附近社区医院就诊。
医生表示我的身体状态不适合正常在校学习，建议我居家按时服药、休养整整两天。我保证返校后立刻补齐所有落下的课程与作业。
我真诚希望您能体谅我的情况，批准我的请假申请。
学生：李华 敬上`
    },
    {
        title: "6.致老师感谢信",
        content: `Dear Miss Wang,

I’m writing to express my deepest gratitude to you from the bottom of my heart. Without your long-term patient guidance and constant encouragement, I could never have made such great progress in English this term.

Over the past months, you always spent your spare time explaining tricky grammar points to me after class. Whenever I felt down about my grades, you would cheer me up and encourage me to keep practicing. All your warm words will stay in my memory forever.

I will keep following your advice and keep making progress in future study. Wish you good health and all the best.

Yours,
Li Hua`,
        trans: `亲爱的王老师：
我提笔向您致以最诚挚的谢意。没有您长期耐心的指导与不断的鼓励，这学期我的英语绝不会取得如此大的进步。
过去几个月里，您总利用课后空余时间为我讲解疑难语法点。每当我因成绩低落，您都会开导我、鼓励我坚持练习。您温暖的话语我会永远铭记在心。
我会继续遵从您的建议，在今后的学习中不断进步。祝您身体健康，万事顺遂。
学生李华`
    },
    {
        title: "7.环境保护倡议书",
        content: `Nowadays, environmental protection has become one of the most widely discussed social topics. It is everyone’s responsibility to protect our living environment.

We can take several simple but effective actions in daily life. First, save water and electricity whenever we use them. Second, take reusable cloth bags instead of plastic bags when going shopping. Third, plant more trees and flowers in our spare time.

Small daily acts can bring great changes to the earth. Let’s start from little things and call on more classmates to join us. Let’s protect our beautiful home planet together.`,
        trans: `如今，环境保护已是社会关注度最高的话题之一，守护我们的生存环境是每个人的责任。
日常生活中我们可以采取简单却有效的行动：第一，用水用电时刻注意节约；第二，购物时携带可循环布袋替代塑料袋；第三，闲暇时间多栽种花草树木。
日常微小的举动就能给地球带来巨大改变。让我们从小事做起，号召更多同学加入，共同守护我们美丽的地球家园。`
    },
    {
        title: "8.商品服务投诉信",
        content: `Dear store manager,

I’m writing to complain about the poor service and defective goods in your bookstore. I bought an English reference book here yesterday afternoon, but I found nearly ten pages missing when I checked it carefully after arriving home.

I returned to the store and asked for a brand-new replacement. However, the shop assistant refused my reasonable request without any explanation, which made me very disappointed. I hope you can handle this problem promptly and give me a satisfactory solution.

I’m looking forward to your timely reply.

Sincerely,
Li Hua`,
        trans: `尊敬的店长：
我写信投诉贵书店糟糕的服务与残次商品。昨日下午我在此购买一本英语参考书，回家仔细翻阅后发现缺失近十页内容。
我返回门店要求更换一本全新的书，但店员未做任何解释就拒绝了我的合理诉求，令我十分失望。希望您尽快处理此事，给我一份满意的解决方案。
期待您及时回复。
李华`
    },
    {
        title: "9.自我介绍",
        content: `Hello everyone,

My name is Li Hua. I’m an outgoing and diligent student with great passion for English learning. I spend no less than thirty minutes every day reading English passages and memorizing new vocabulary.

I enjoy communicating with others in English and taking part in various English speech contests. I hope we can help each other, learn together and make joint progress throughout the new semester.

Thank you for listening to my self-introduction.`,
        trans: `大家好：
我叫李华，性格开朗、学习踏实，十分热爱英语学习。我每天至少花三十分钟阅读英文文章、记忆新单词。
我喜欢用英语与人交流，也乐于参加各类英语演讲比赛。希望新学期我们能互帮互助、共同学习、携手进步。
感谢大家聆听我的自我介绍。`
    },
    {
        title: "10.英语社团申请信",
        content: `Dear club teacher,

I’m writing to apply for membership in the school English club. I have a strong interest in oral English, and I hope to polish my speaking skills by taking part in regular club activities.

I have kept reading English news articles for more than a year. I am a careful and responsible person, willing to participate in all activities and help organize English sharing sessions.

I would be very grateful if you could accept my application.

Yours faithfully,
Li Hua`,
        trans: `尊敬的社团老师：
我写信申请加入学校英语社团。我对英语口语抱有浓厚兴趣，希望通过参与社团日常活动打磨自己的口语水平。
我坚持阅读英文新闻报道已有一年多，做事细心负责，愿意参加社团全部活动，协助筹办英语分享会。
若您能批准我的入社申请，我将不胜感激。
申请人：李华`
    },
    {
        title: "11.向朋友求助书信",
        content: `Dear Tom,

I’ve run into a learning problem, so I’m writing to ask for your help. Our teacher assigned us an English composition on the theme of reading, but I lack high-quality sentence materials and clear writing structures.

You are really good at English writing and always get high scores in writing tasks. Could you share some practical expressions and writing ideas with me? I will help you with your weak subjects whenever you need.

I’m looking forward to your reply.

Yours,
Li Hua`,
        trans: `亲爱的汤姆：
我遇到了学习难题，写信寻求你的帮助。老师布置了一篇以阅读为主题的英语作文，但我缺少优质的句型素材与清晰的写作框架。
你的英语写作功底十分出色，写作题型常年拿高分。你能分享一些实用表达与写作思路给我吗？你需要的时候，我也会辅导你的薄弱科目。
期待你的回信。
李华`
    },
    {
        title: "12.英语主题演讲稿",
        content: `Good morning, teachers and classmates,

Today my topic is the importance of keeping daily English reading. Regular reading can expand our vocabulary and improve our logical thinking ability effectively.

Many students give up reading because they think it is dull and boring. In fact, we can choose interesting short stories and news reports to keep reading every day. Reading will gradually improve our writing and listening skills without extra heavy training.

Let’s develop the good habit of reading English every day. Thank you!`,
        trans: `老师、同学们，早上好：
今天我演讲的主题是坚持每日英文阅读的重要性。常态化阅读能有效扩充词汇量，提升我们的逻辑思维能力。
许多学生觉得阅读枯燥乏味而放弃。事实上，我们可以挑选有趣的短篇故事与新闻报道坚持每日阅读。无需额外高强度训练，阅读就能循序渐进提升我们的读写与听力水平。
让我们养成每日阅读英文的好习惯。谢谢大家！`
    },
    {
        title: "13.班级活动报告",
        content: `Activity Report
Last Sunday, our class held an English learning exchange activity in the classroom from 2:00 p.m. to 4:30 p.m.

We were divided into four groups to discuss common learning difficulties and exchange good daily learning habits. At the end of the activity, each group gave a short English report on their discussion results.

This activity made us realize that communication and sharing can bring faster progress than studying alone. We plan to hold similar activities once a month in the future.`,
        trans: `活动报告
上周日下午2点至4点半，我们班在教室举办了一场英语学习交流会。
全班分为四个小组，讨论常见学习难点，交流良好的日常学习习惯。活动尾声，每个小组就本组讨论成果进行了简短的英文汇报。
本次活动让我们认识到：交流分享比独自埋头学习进步更快。我们计划今后每月举办一次同类活动。`
    },
    {
        title: "14.成长主题征文",
        content: `My Growth with English
English has been with me for three full years, bringing great positive changes to both my study and personal character.

At first, I was shy and afraid to speak English in public. Through long-term reading and repeated practice, I can now communicate with others confidently in English.

English not only improves my grades but also opens up a whole new world for me. I will keep learning English persistently in the days ahead.`,
        trans: `与英语相伴成长
英语陪伴我整整三年，给我的学习与性格都带来了巨大的正向改变。
起初，我十分腼腆，不敢在公共场合说英语。经过长期阅读与反复练习，如今我可以自信地用英语与人交流。
英语不仅提升了我的成绩，更为我打开了一片全新的天地。今后我会持之以恒地学习英语。`
    },
    {
        title: "15.毕业致老师信",
        content: `Dear teacher,

As graduation is drawing near, I want to express my sincere thanks to you. Over these years, you always encouraged me to keep learning English even when I ran into difficulties.

I will remember your teaching and learning methods forever. I promise to keep studying English carefully after I enter college.

Wish you good health and happiness every day.

Yours student,
Li Hua`,
        trans: `尊敬的老师：
毕业日渐临近，我想向您表达诚挚的谢意。这些年里，即便我遇到困难，您也始终鼓励我坚持学习英语。
我会永远记住您的教诲与学习方法。我保证进入大学后，依旧会认真钻研英语。
祝您身体健康，天天开心。
您的学生 李华`
    },
    {
        title: "16.图书馆预约咨询信",
        content: `Dear librarian,

I’m writing to inquire about booking the study room on the third floor. Our class plans to hold an English study seminar there next Friday afternoon.

Could you tell me the booking procedure, daily opening hours and the maximum number of students the room can hold? I will prepare all materials in advance strictly according to your instructions.

I’m looking forward to your detailed reply.

Yours,
Li Hua`,
        trans: `尊敬的图书管理员：
我写信咨询三楼自习室的预约事宜。我们班计划下周五下午在那里举办一场英语学习研讨会。
能否告知预约流程、每日开放时间以及自习室可容纳的学生最大人数？我会严格按照您的指引提前备好所有材料。
期待您的详细回复。
李华`
    },
    {
        title: "17.演讲比赛推荐信",
        content: `Dear judges,

I’m writing to recommend my classmate Tom to participate in the English speech contest.

Tom is hard-working and modest, with excellent oral English ability. He takes an active part in all school English activities and is good at expressing his ideas clearly and logically. I firmly believe he will give a wonderful performance in the contest.

I hope you can consider my recommendation and give him a chance to show his talent.

Yours sincerely,
Li Hua`,
        trans: `尊敬的评委老师：
我写信推荐我的同学汤姆参加本次英语演讲比赛。
汤姆勤奋谦逊，英语口语能力出众，积极参与校内所有英语活动，擅长条理清晰地表达观点。我坚信他会在比赛中呈现精彩的发挥。
希望您考量我的推荐，给予他展示才华的机会。
推荐人：李华`
    },
    {
        title: "18.周末公园日记",
        content: `Sunday, November 5th Sunny
After morning self-study today, I went to the city wetland park with my classmates. We took lots of photos of beautiful blooming flowers and green trees.

Then we sat on the lawn to share English short stories and practice oral English together. I learned more than thirty new words and daily expressions from my classmates.

This meaningful activity has rekindled my love for English reading and speaking. I hope we can hold more outdoor study activities in the future.`,
        trans: `11月5日 周日 晴
今日早自习结束后，我和同学们一同前往城市湿地公园。我们拍摄了许多盛放的鲜花与葱郁树木的照片。
随后我们坐在草坪上分享英文小故事，一起练习口语。我从同学身上学到了三十多个新单词与日常表达。
这次有意义的活动重新点燃了我对英语读写与口语的热爱。希望今后能多举办户外学习活动。`
    },
    {
        title: "19.手机利弊议论文",
        content: `Nowadays, mobile phones are extremely popular among students. Students hold different views on using mobile phones during study time.

Some students think mobile phones are helpful learning tools. They can look up new words, listen to listening materials and watch English teaching videos anytime. However, others argue that phones waste study time, as students easily get addicted to games and short videos.

In my opinion, we should use mobile phones properly to assist our study, instead of spending time on meaningless entertainment.`,
        trans: `如今手机在学生群体中十分普及。对于学习时段使用手机这件事，同学们各有不同看法。
一部分学生认为手机是很有用的学习工具：可以随时查单词、听听力、看英语教学视频。但另一部分人表示手机会浪费学习时间，学生很容易沉迷游戏与短视频。
在我看来，我们应合理使用手机辅助学习，不要把时间耗费在无意义的娱乐上。`
    },
    {
        title: "20.健康作息倡议书",
        content: `Healthy Living Proposal
Good living habits play a vital role in English learning. Without a healthy body, we cannot stay energetic enough to finish daily study tasks efficiently.

First, keep regular early hours to get enough energy for morning reading. Second, do proper exercise every day to relax our brains. Third, refuse to stay up late playing with phones or finishing homework.

A healthy body provides us with enough energy to learn English well. Let’s form healthy living habits starting from today.`,
        trans: `健康生活倡议书
良好的生活习惯对英语学习至关重要。没有健康的身体，我们就无法保持充沛精力，高效完成日常学习任务。
第一，规律早睡早起，为晨读储备充足精力；第二，每天适度运动，放松大脑；第三，拒绝熬夜玩手机、赶作业。
健康的身体为我们学好英语提供充足动力。让我们从今天开始养成健康的生活作息。`
    },
    {
        title: "21.运动与学习议论文",
        content: `Sports and Study
Many students hold the view that doing sports is a waste of study time. In fact, proper physical exercise can greatly improve our study efficiency.

Long hours of reading and writing will make our brains exhausted. Thirty minutes of gentle exercise can relax us and make us energetic again. Sports also strengthen our physique and reduce the chance of getting sick.

I suggest every student do exercise for thirty minutes every day. Balancing study and rest is the key to steady progress.`,
        trans: `运动与学习
许多学生认为做运动会浪费学习时间。事实上，适度的体育锻炼能大幅提升学习效率。
长时间读写会让大脑疲惫不堪，三十分钟的舒缓运动能让我们放松身心、恢复精力。运动还能增强体质，减少生病的概率。
我建议每位学生每天运动三十分钟。平衡学习与休息，是稳步进步的关键。`
    },
    {
        title: "22.阅读的价值议论文",
        content: `The Value of Reading
Reading is the most low-cost and convenient way to broaden our horizons, and English reading is especially important for students.

English reading brings us new vocabulary, foreign culture knowledge and beautiful sentences for compositions. It also improves our reading speed and logical analysis ability needed in exams.

We should form a lifelong reading habit and stick to reading English materials every day. Reading will benefit us for a whole lifetime.`,
        trans: `阅读的价值
阅读是成本最低、最便捷的拓宽眼界的方式，对学生而言，英文阅读的价值尤为重要。
英文阅读带给我们新词汇、异国文化知识与优美的作文句式，还能提升考试所需的阅读速度与逻辑分析能力。
我们应养成终身阅读的习惯，每日坚持阅读英文素材。阅读将让我们受益终身。`
    },
    {
        title: "23.网课利弊作文",
        content: `Online English Learning
Online courses provide us with a convenient way to learn English without leaving home.

We can watch teaching videos and listen to learning materials anytime and anywhere. However, many students lack self-discipline. They secretly skip classes to play games or watch videos during class time.

We should make full use of online resources to improve our English skills, rather than wasting time on entertainment.`,
        trans: `线上英语学习
网课为我们提供了足不出户学习英语的便捷途径。
我们可以随时随地观看教学视频、收听学习素材。但许多学生缺乏自制力，会在上课期间偷偷逃课玩游戏、刷视频。
我们应当充分利用线上资源提升英语能力，而不是把时间浪费在娱乐上。`
    },
    {
        title: "24.假期兼职书信",
        content: `Dear teacher,

I plan to take a part-time job during the summer vacation. I want to work as an English tutor for primary and junior high school students in the nearby community.

This job can improve my oral English and teach me how to communicate with teenagers properly. I have made a clear timetable to make sure it will not affect my holiday study plan.

Could you give me some advice on my part-time plan?

Yours student,
Li Hua`,
        trans: `尊敬的老师：
我计划暑假找一份兼职，想担任附近社区中小学生的英语家教。
这份工作能锻炼我的英语口语，教会我如何与青少年恰当沟通。我制定了清晰的时间表，保证不会影响假期学习计划。
您能给我的兼职计划一些建议吗？
学生 李华`
    },
    {
        title: "25.传统节日作文",
        content: `My Favorite Festival
My favorite traditional Chinese festival is the Spring Festival.

During the festival, all family members get together for a big dinner on New Year’s Eve. We watch the Spring Festival Gala and send best wishes to each other. The whole festival is full of warmth and happiness.

In my spare time, I often introduce Spring Festival customs to foreign friends in English. I hope more people can learn about traditional Chinese culture.`,
        trans: `我最喜欢的节日
我最喜欢的中国传统节日是春节。
春节期间，全家人会在除夕夜团聚吃年夜饭，一起看春晚、互送祝福，整个节日都充满温暖与欢乐。
闲暇时，我经常用英语向外国朋友介绍春节习俗，希望更多人了解中国传统文化。`
    },
    {
        title: "26.寻物启事",
        content: `Lost Notice
I lost an important black English notebook on the school playground at 3:00 p.m. this Wednesday after PE class.

It contains my class notes, vocabulary lists and key grammar points. All the contents are very important for my final exams.

If you find it, please call me at 136XXXX2468. I will express my sincere thanks to you.
Li Hua from Class 2`,
        trans: `寻物启事
本周三下午3点体育课结束后，我在学校操场遗失了一本重要的黑色英语笔记本。
本子里有我的课堂笔记、单词汇总表与核心语法知识点，全部内容对我的期末考试非常重要。
如有捡到者，请致电136XXXX2468联系我，我将深表感谢。
二班 李华`
    },
    {
        title: "27.失约道歉信",
        content: `Dear Tom,

I’m writing to say sorry to you for missing our English study activity yesterday afternoon. I know you prepared lots of reading materials for me in advance.

My mother suddenly had a high fever and I had to look after her at home, so I couldn’t keep our promise. I feel terribly sorry for wasting your time.

Could we make a new plan to study English together this weekend? I will prepare everything punctually.

Yours,
Li Hua`,
        trans: `亲爱的汤姆：
我为昨天下午错过我们的英语学习活动向你致歉。我知道你提前为我准备了很多阅读材料。
我妈妈突然发高烧，我必须在家照顾她，因此没能遵守约定。很抱歉浪费了你的时间。
我们这周末重新约定时间一起学英语好吗？我会准时备好一切。
李华`
    },
    {
        title: "28.新生欢迎演讲稿",
        content: `Dear new classmates,

Welcome to our English class! It is our great honor to study and grow with you in the new school year.

Our teachers are patient and always ready to help you. Our class holds many interesting activities every month, such as speech contests and reading sharing meetings.

If you have any problems in English learning, both teachers and classmates are willing to help you. Wish you a happy and rewarding school life!`,
        trans: `亲爱的新同学们：
欢迎来到英语班级！新学年能和大家一同学习成长，我们倍感荣幸。
我们的老师耐心友善，随时愿意为大家提供帮助。班级每月会举办演讲比赛、读书分享会等诸多趣味活动。
如果你在英语学习上遇到困难，老师和同学都乐意伸出援手。祝愿你拥有快乐充实的校园生活！`
    },
    {
        title: "29.网课学习心得",
        content: `My Online English Learning Experience
Last semester we took online English courses at home due to special reasons, which brought me a brand-new learning experience.

We attended online lectures, finished homework and submitted it through mobile phones. Our class also held online group discussions to exchange learning ideas.

This special experience taught me that we must learn to study independently and exercise strict self-control without teachers’ face-to-face supervision.`,
        trans: `我的线上英语学习心得
上学期因特殊原因，我们在家上英语网课，这段经历带给我全新的学习体验。
我们线上听课、完成作业并通过手机提交，班级还开展线上小组讨论，交流学习思路。
这段特殊经历让我明白：没有老师面对面监督，我们也必须学会自主学习、严格自律。`
    },
    {
        title: "30.节约粮食倡议书",
        content: `Save Food Proposal
Food comes from farmers’ hard work, so saving food is a fine virtue for every student.

We should follow three rules in the school dining hall. First, take proper amount of food according to our appetite. Second, never throw away edible food. Third, remind classmates to save food when eating together.

Saving food is a traditional Chinese virtue. Let’s start from every meal and refuse to waste food.`,
        trans: `节约粮食倡议书
粮食来之不易，节约粮食是每位学生都应具备的美好品德。
在学校食堂我们应遵守三条准则：第一，根据食量适量取餐；第二，不丢弃可食用的饭菜；第三，共同就餐时提醒同学节约粮食。
节约粮食是中华传统美德。让我们从每一餐做起，拒绝浪费粮食。`
    },
    {
        title: "31.城市变化议论文",
        content: `Great Changes of Our City
Our city has changed dramatically in transportation, environment and cultural life in recent years.

New wide roads and convenient bus routes connect every corner of the city. Many vacant lands have turned into green parks with lush trees and flowers. More libraries and activity centers have been built for local citizens.

The better environment provides us with more comfortable conditions for study and relaxation. I am proud of the great changes in our city.`,
        trans: `我们城市的巨大变化
近几年，我们的城市在交通、环境、文化生活方面都发生了翻天覆地的变化。
崭新宽阔的道路与便捷的公交线路连通城市各个角落，许多空地变成了绿树成荫的公园，更多图书馆与活动中心也面向市民建成开放。
更优的环境为我们提供了更舒适的学习与休闲条件。我为城市的巨大变化感到自豪。`
    },
    {
        title: "32.志愿服务意义作文",
        content: `The Meaning of Volunteer Service
Taking part in volunteer activities is not only a school task, but also a precious opportunity for us to grow and understand society.

When we clean public areas or accompany the elderly, we learn to care for others and take social responsibility. We can also practice oral English when communicating with foreign visitors.

Volunteer experience shapes our kind character and enriches our after-school life. Every student should take an active part in volunteer activities.`,
        trans: `志愿服务的意义
参加志愿活动不只是学校任务，更是我们成长、了解社会的宝贵机会。
清扫公共区域、陪伴老人时，我们学会关爱他人、承担社会责任；与外国游客交流时，还能锻炼英语口语。
志愿经历塑造我们善良的品格，丰富课余生活。每位学生都应积极参与志愿服务活动。`
    },
    {
        title: "33.线上英语活动介绍",
        content: `An Online English Activity
Our class held an online English culture sharing activity last Friday evening, which left us an unforgettable learning experience.

Each student prepared a short introduction about foreign culture or traditional festivals. We took turns to speak and communicated with each other. Our English teacher gave professional comments at the end.

This activity breaks the space limit and helps us learn foreign culture easily at home. We plan to hold such activities every two months.`,
        trans: `一场线上英语活动
上周五晚上，我们班举办了一场线上英语文化分享活动，带给我们难忘的学习体验。
每位同学准备了一段关于外国文化或传统节日的简短介绍，大家轮流发言、互相交流。最后英语老师给出了专业点评。
这场活动打破了空间限制，让我们在家就能轻松学习外国文化。我们计划每两个月举办一次。`
    },
    {
        title: "34.中华文化传播作文",
        content: `Spread Chinese Traditional Culture
As Chinese students, we have the duty to spread our excellent traditional culture to the whole world.

We can introduce festivals, poems, food and customs to foreign friends through English articles or conversations. Learning English well helps us tell Chinese stories clearly to the world.

We should improve our English ability and introduce our traditional culture to foreign friends whenever we have chances. Let more people know the beauty of China.`,
        trans: `传播中华传统文化
作为中国学生，我们有责任向世界传播中华优秀传统文化。
我们可以通过英文文章或对话，向外国朋友介绍节日、诗词、美食与习俗。学好英语，能帮我们向世界讲好中国故事。
我们应提升英语能力，抓住机会向外国朋友介绍传统文化，让更多人领略中国之美。`
    },
    {
        title: "35.缓解学习压力作文",
        content: `Ways to Reduce Study Pressure
Nowadays most students face heavy study pressure from exams and piles of homework. We need to find healthy ways to relax ourselves.

First, we can read interesting English stories to calm our minds. Second, taking a walk or doing sports can release tiredness quickly. Third, talking about worries with teachers or friends is also very helpful.

Balancing study and rest can reduce pressure effectively and keep our study efficiency stable.`,
        trans: `缓解学习压力的方法
如今大多数学生都面临着考试与成堆作业带来的沉重学习压力，我们需要寻找健康的方式放松自己。
第一，阅读趣味英文故事平复心情；第二，散步或运动能快速释放疲惫；第三，向老师或朋友倾诉烦恼也十分有帮助。
平衡学习与休息能有效减压，保持稳定的学习效率。`
    },
    {
        title: "36.健康饮食习惯作文",
        content: `Healthy Eating Habits
Healthy eating habits provide steady energy for our daily English study. Unhealthy diets make us sleepy and unable to focus on study.

We should eat enough vegetables and fruits every day to get sufficient vitamins. Stay away from too much oily fast food and sugary drinks. Drinking more warm water is also good for our health.

A healthy diet keeps our brains clear and energetic. Every student should form healthy eating habits from today.`,
        trans: `健康饮食习惯
健康的饮食习惯为我们日常英语学习提供稳定能量，不健康的饮食会让人昏昏欲睡，无法专注学习。
我们每天应吃足量的蔬菜水果，获取充足的维生素，远离过多油腻快餐与含糖饮料，多喝温水也有益健康。
健康饮食让我们头脑清醒、精力充沛。每位学生都应从今天开始养成健康的饮食习惯。`
    },
    {
        title: "37.低碳生活议论文",
        content: `Low-carbon Life
Living a low-carbon life is everyone’s responsibility to protect the earth. We can do many small things in our daily life.

We can walk or ride bikes for short trips instead of taking cars. Turn off lights and electronic screens when leaving rooms. Use both sides of paper when doing English exercises.

These small acts can all contribute to environmental protection. Let’s take action and live a low-carbon green life from now on.`,
        trans: `低碳生活
践行低碳生活是每个人保护地球的责任，日常生活中我们可以做很多小事。
短途出行我们可以步行或骑自行车，替代乘车；离开房间时关闭电灯与电子屏幕；做英语练习时纸张双面使用。
这些小事都能为环保出一份力。让我们从现在开始行动，过低碳绿色生活。`
    },
    {
        title: "38.读书分享会作文",
        content: `An English Reading Sharing Meeting
Our class held an English reading sharing meeting last week. All students took an active part in the activity.

Each student introduced their favorite English book or passage, shared beautiful sentences and their reading feelings. We discussed happily and learned a lot from each other.

This sharing meeting aroused our interest in English reading and helped us master more useful expressions. I hope we can hold more such activities in the future.`,
        trans: `一场英语读书分享会
上周我们班举办了一场英语读书分享会，全体同学都积极参与。
每位同学介绍自己最喜欢的英文书或文章，分享优美句子与个人阅读感受，大家愉快交流、互相学习。
这场分享会激发了我们对英语阅读的兴趣，帮助我们掌握了更多实用表达。希望今后能多举办这类活动。`
    },
    {
        title: "39.职业规划作文",
        content: `My Career Plan
My ideal job is to become an English teacher in the future. I want to pass on English knowledge to more students and help them improve their language skills.

To realize my dream, I must study English hard now, and comprehensively improve my listening, speaking, reading and writing abilities. I also need to practice expressing myself clearly and patiently.

I will keep working hard for my career goal and make my dream come true step by step.`,
        trans: `我的职业规划
我未来理想的职业是成为一名英语老师，想把英语知识传递给更多学生，帮助他们提升语言能力。
为实现梦想，我现在必须努力学习英语，全面提升听说读写能力，同时练习清晰耐心地表达自己。
我会为职业目标持续努力，一步步实现梦想。`
    },
    {
        title: "40.文明班级倡议书",
        content: `Civilized Class Proposal
A clean, united and civilized class environment is very important for our study. We should work together to build a warm and positive class atmosphere.

First, keep our classroom clean and tidy every day. Second, respect teachers and get along well with classmates. Third, study hard and help each other make progress. Fourth, take good care of public property in the classroom.

Let’s take action together to build a civilized and excellent class where everyone can study happily and grow healthily.`,
        trans: `文明班级倡议书
整洁、团结、文明的班级环境对我们的学习至关重要，我们应共同营造温暖积极的班级氛围。

    {
        title: "41.美食介绍作文",
        content: `Chinese Traditional Food
China is famous around the world for its rich and delicious traditional food. Among all kinds of local dishes, dumplings are my favorite traditional Chinese food.

Dumplings are made of flour wrappers and fresh meat or vegetable fillings. They taste delicious and are good for health. During festivals and special celebrations, families usually make dumplings together to celebrate happy moments. Making dumplings has become an important part of Chinese traditional culture.

In my opinion, traditional food carries our cultural heritage and family warmth. I am proud of our traditional food culture and hope more foreign friends can taste and love Chinese food.`,
        trans: `中国传统美食
中国以丰富美味的传统美食闻名世界。在各类地方美食中，饺子是我最喜爱的中国传统食物。
饺子由面皮和新鲜的肉蔬馅料制作而成，味道鲜美又健康。每逢节日与喜庆时刻，家家户户都会一起包饺子庆祝。包饺子已经成为中国传统文化的重要组成部分。
在我看来，传统美食承载着文化底蕴与家庭温情。我为中华饮食文化感到自豪，也希望更多外国朋友能品尝并喜爱中国美食。`
    },
    {
        title: "42.旅行见闻记叙文",
        content: `A Wonderful Travel Experience
Last holiday, I went on a wonderful trip with my parents. We visited a famous scenic city and gained a lot during this meaningful journey.

We visited beautiful mountains, clear lakes and ancient traditional buildings. I took lots of photos and tasted local special food. I also met friendly local people and talked with them in simple English. This trip broadened my horizons and made my holiday colorful.

Traveling teaches us knowledge that we cannot learn from textbooks. I hope I can travel to more places in the future and experience different local customs.`,
        trans: `一次精彩的旅行经历

    {
        title: "43.线上购物利弊",
        content: `Online Shopping

        trans: `线上购物

        trans: `纸质书与电子书对比

    {

        trans: `校园文明行为倡议

    {

        // 复制文本
        function copyText(text){
            return new Promise((resolve)=>{
                if(navigator.clipboard && window.isSecureContext){
                    navigator.clipboard.writeText(text).then(()=>resolve(true)).catch(()=>{
                        tempInput.value = text;
                        tempInput.select();
                        document.execCommand('copy');
                        resolve(true);
                    })
                }else{
                    tempInput.value = text;
                    tempInput.select();
                    document.execCommand('copy');
                    resolve(true);
                }
            })
        }

        // 渲染模板
        function renderTemplates(list){
            let html = "";
            (list || essayTemplates).forEach((item,idx)=>{
                html += `<div class="template-item">
                    <h4>${item.title}</h4>
                    <div class="template-text">${item.content}</div>
                    <div class="trans-label">中文翻译：</div>
                    <div class="trans-text">${item.trans}</div>
                    <button class="light-btn copy-btn" data-index="${idx}">一键复制英文</button>
                </div>`
            })
            templateBox.innerHTML = html;

            document.querySelectorAll('.copy-btn').forEach(btn=>{
                btn.onclick = async function(){
                    const idx = this.dataset.index;
                    const targetText = (list || essayTemplates)[idx].content;
                    await copyText(targetText);
                    toast.classList.add('show');
                    setTimeout(()=>toast.classList.remove('show'),1500);
                }
            })
        }

        // 搜索功能
        searchInput.oninput = function(){
            const key = this.value.trim().toLowerCase();
            if(!key){
                renderTemplates();
                return;
            }
            const filtered = essayTemplates.filter(item => 
                item.title.toLowerCase().includes(key) ||
                item.content.toLowerCase().includes(key) ||
                item.trans.includes(key)
            );
            renderTemplates(filtered);
        }

        // 打印/导出
        printBtn.onclick = () => window.print();

        // 深色模式
        function loadDarkMode(){
            let mode = localStorage.getItem('essayDark');
            if(mode === "1"){
                document.body.classList.add('dark-mode');
                let icon = darkToggle.querySelector('i');
                icon.classList.replace('fa-moon','fa-sun');
            }
        }
        darkToggle.onclick = function(){
            document.body.classList.toggle('dark-mode');
            let icon = this.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            localStorage.setItem('essayDark', document.body.classList.contains('dark-mode') ? "1" : "0");
        }

        // 初始化
        loadDarkMode();
        renderTemplates();
    </script>
</body>
</html>

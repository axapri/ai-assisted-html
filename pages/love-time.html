<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 爱意时光计算器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }
        .theme-dark {
            --bg: #111827;
            --text: #f3f6f6;
            --subtext: #9ca3af;
            --border: #374151;
            --theme: #c94444;
            --card: #1f3133;
            --hover: #374151;
        }
        .theme-green {
            --bg: #f8fff9;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dcfce7;
            --theme: #16a34a;
            --card: #f0fdf4;
            --hover: #dcfce7;
        }
        .theme-blue {
            --bg: #f8fafc;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dbeafe;
            --theme: #3b82f6;
            --card: #eff6ff;
            --hover: #dbeafe;
        }
        .theme-purple {
            --bg: #fdfaff;
            --text: #1e293b;
            --subtext: #475569;
            --border: #f3e8ff;
            --theme: #a855f7;
            --card: #faf5ff;
            --hover: #f3e8ff;
        }
        .theme-yellow {
            --bg: #fffbeb;
            --text: #292524;
            --subtext: #78716c;
            --border: #fef3c7;
            --theme: #d97706;
            --card: #fffced;
            --hover: #fef3c7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .item {
            margin-bottom: 24px;
        }

        .item label {
            display: block;
            font-size: 15px;
            color: var(--subtext);
            margin-bottom: 8px;
        }

        input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--card);
            color: var(--text);
            outline: none;
        }

        .btn-box {
            display: flex;
            gap: 14px;
            margin: 40px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        #calcBtn {
            background: var(--theme);
            color: #fff;
        }

        #resetBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .result-box {
            padding-top: 30px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .big-num {
            font-size: 48px;
            font-weight: 700;
            color: var(--theme);
            margin: 10px 0;
        }

        .info-line {
            font-size: 16px;
            color: var(--text);
            margin: 6px 0;
        }

        .soft-text {
            margin-top: 20px;
            font-size: 14px;
            color: var(--subtext);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-heart"></i>爱意时光计算器
        </div>
        <div class="desc">以时光为证，计算彼此相遇的缘分</div>

        <div class="item">
            <label>你的生日</label>
            <input type="date" id="birth1">
        </div>

        <div class="item">
            <label>TA的生日</label>
            <input type="date" id="birth2">
        </div>

        <div class="btn-box">
            <button id="calcBtn">计算缘分</button>
            <button id="resetBtn">重置</button>
        </div>

        <div class="result-box">
            <div class="info-line">彼此相隔天数</div>
            <div class="big-num" id="dayShow">0</div>
            <div class="info-line" id="yearShow">相差年份：——</div>
            <div class="soft-text">
                山河万里，有幸相逢，便是人间最好的温柔
            </div>
        </div>
    </div>

    <script>
        // 同步全局主题
        document.body.className = localStorage.getItem('site-theme') ? 'theme-' + localStorage.getItem('site-theme') : '';

        const b1 = document.getElementById('birth1');
        const b2 = document.getElementById('birth2');
        const calcBtn = document.getElementById('calcBtn');
        const resetBtn = document.getElementById('resetBtn');
        const dayShow = document.getElementById('dayShow');
        const yearShow = document.getElementById('yearShow');

        // 加载缓存
        window.onload = function(){
            b1.value = localStorage.getItem('love_b1') || '';
            b2.value = localStorage.getItem('love_b2') || '';
        };

        calcBtn.onclick = function(){
            let d1 = b1.value;
            let d2 = b2.value;
            if(!d1 || !d2){
                alert('请选择两个生日日期');
                return;
            }

            let t1 = new Date(d1).getTime();
            let t2 = new Date(d2).getTime();

            // 保存
            localStorage.setItem('love_b1', d1);
            localStorage.setItem('love_b2', d2);

            // 计算天数
            let diffDay = Math.abs(Math.floor((t1 - t2) / (1000 * 60 * 60 * 24)));
            let diffYear = (diffDay / 365).toFixed(1);

            dayShow.innerText = diffDay.toLocaleString();
            yearShow.innerText = `相差年份：${diffYear} 年`;
        };

        resetBtn.onclick = function(){
            localStorage.removeItem('love_b1');
            localStorage.removeItem('love_b2');
            b1.value = '';
            b2.value = '';
            dayShow.innerText = '0';
            yearShow.innerText = '相差年份：——';
        };
    </script>
</body>
</html>

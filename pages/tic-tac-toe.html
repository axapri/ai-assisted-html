<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axapri | 井字棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            transition: all 0.2s ease;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f9fafb;
            padding: 20px;
        }
        #game {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #status {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #2563eb;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .cell {
            aspect-ratio: 1;
            background: #e5e7eb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .cell:hover:not(.won) {
            background: #d1d5db;
            transform: scale(1.02);
        }
        .cell.won {
            background: #10b981 !important;
            color: white !important;
        }
        .x {
            color: #2563eb;
        }
        .o {
            color: #ef4444;
        }
        .btn {
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        #start {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 100;
        }
        .title {
            font-size: 32px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div id="game">
    <div id="status">轮到：X</div>
    <div id="board"></div>
    <button class="btn" onclick="restart()">重新开始</button>
</div>
<div id="start">
    <div class="title">井字棋</div>
    <button class="btn" onclick="startGame()">开始游戏</button>
</div>
<script>
let board, player, gameOver, winCells;
function $(id) { return document.getElementById(id); }

function startGame() {
    $("start").style.display = "none";
    init();
}

function init() {
    board = [null, null, null, null, null, null, null, null, null];
    player = "X";
    gameOver = false;
    winCells = [];
    update();
    render();
}

function render() {
    let b = $("board");
    b.innerHTML = "";
    board.forEach((v, i) => {
        let c = document.createElement("div");
        c.classList.add("cell");
        if (v) {
            c.textContent = v;
            c.classList.add(v.toLowerCase());
        }
        if (winCells.includes(i)) c.classList.add("won");
        c.onclick = () => click(i);
        b.appendChild(c);
    });
}

function update() {
    $("status").innerText = gameOver
        ? (gameOver === "tie" ? "平局！" : "胜利者：" + gameOver)
        : "轮到：" + player;
}

function click(i) {
    if (gameOver || board[i]) return;
    board[i] = player;
    check();
    if (!gameOver) player = player === "X" ? "O" : "X";
    update();
    render();
}

function check() {
    const win = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6]
    ];
    for (let w of win) {
        let [a, b, c] = w;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            gameOver = board[a];
            winCells = [a, b, c];
            return;
        }
    }
    if (!board.includes(null)) gameOver = "tie";
}

function restart() {
    location.reload();
}
</script>
</body>
</html>

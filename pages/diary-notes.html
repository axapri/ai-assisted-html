<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 情绪私密日记本</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }
        .theme-dark {
            --bg: #111827;
            --text: #f3f6f6;
            --subtext: #9ca3af;
            --border: #374151;
            --theme: #c94444;
            --card: #1f3133;
            --hover: #374151;
        }
        .theme-green {
            --bg: #f8fff9;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dcfce7;
            --theme: #16a34a;
            --card: #f0fdf4;
            --hover: #dcfce7;
        }
        .theme-blue {
            --bg: #f8fafc;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dbeafe;
            --theme: #3b82f6;
            --card: #eff6ff;
            --hover: #dbeafe;
        }
        .theme-purple {
            --bg: #fdfaff;
            --text: #1e293b;
            --subtext: #475569;
            --border: #f3e8ff;
            --theme: #a855f7;
            --card: #faf5ff;
            --hover: #f3e8ff;
        }
        .theme-yellow {
            --bg: #fffbeb;
            --text: #292524;
            --subtext: #78716c;
            --border: #fef3c7;
            --theme: #d97706;
            --card: #fffced;
            --hover: #fef3c7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 15px;
            margin-bottom: 40px;
        }

        textarea {
            width: 100%;
            height: 260px;
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            font-size: 15px;
            line-height: 1.8;
            outline: none;
            resize: none;
        }

        .btn-box {
            display: flex;
            gap: 14px;
            margin: 30px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        #saveBtn {
            background: var(--theme);
            color: #fff;
        }

        #clearBtn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .soft-text {
            margin-top: 10px;
            font-size: 14px;
            color: var(--subtext);
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-book-open"></i>情绪私密日记本
        </div>
        <div class="desc">把心事藏在这里，只与自己温柔倾诉</div>

        <textarea id="diary" placeholder="写下今日心情、心事、碎碎念..."></textarea>

        <div class="btn-box">
            <button id="saveBtn">保存日记</button>
            <button id="clearBtn">清空内容</button>
        </div>

        <div class="soft-text">
          无论世界多么喧嚣，我愿做你心中的一片宁静之地。
        </div>
    </div>

    <script>
        // 同步全局主题
        document.body.className = localStorage.getItem('site-theme') ? 'theme-' + localStorage.getItem('site-theme') : '';

        const diary = document.getElementById('diary');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');

        // 加载本地日记
        window.onload = function(){
            diary.value = localStorage.getItem('private_diary') || '';
        };

        // 保存
        saveBtn.onclick = function(){
            localStorage.setItem('private_diary', diary.value);
            alert('日记已温柔封存 ✨');
        };

        // 清空
        clearBtn.onclick = function(){
            if(confirm('确定要清空今日所有文字吗？无法恢复')){
                diary.value = '';
                localStorage.removeItem('private_diary');
            }
        };
    </script>
</body>
</html>

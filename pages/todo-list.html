<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Axapri | 待办清单</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f7f8fa;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #222;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #eaeef5;
      border-radius: 12px;
      font-size: 15px;
    }

    select {
      padding: 12px;
      border: 1px solid #eaeef5;
      border-radius: 12px;
      background: #fff;
    }

    button {
      padding: 12px 16px;
      background: #457eff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 500;
    }

    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .task-text {
      flex: 1;
      font-size: 15px;
    }

    .done {
      text-decoration: line-through;
      color: #999;
    }

    .high {
      border-left: 3px solid #ff4d4f;
      padding-left: 8px;
    }

    .medium {
      border-left: 3px solid #ffab00;
      padding-left: 8px;
    }

    .low {
      border-left: 3px solid #4cd964;
      padding-left: 8px;
    }

    .task-buttons {
      display: flex;
      gap: 6px;
    }

    .btn-edit {
      background: #f5f5f5;
      color: #333;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 12px;
    }

    .btn-del {
      background: #fff0f0;
      color: #ff4444;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 12px;
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .btn-clear {
      background: #f5f5f5;
      color: #666;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-box {
      background: #fff;
      width: 90%;
      max-width: 320px;
      border-radius: 16px;
      padding: 20px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .modal-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: none;
    }

    .btn-cancel {
      background: #ae3333;
    }

    .btn-confirm {
      background: #457eff;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">待办清单</div>
    <div class="input-row">
      <input id="taskInput" placeholder="输入待办事项...">
      <select id="priority">
        <option value="low">低优先级</option>
        <option value="medium">中优先级</option>
        <option value="high">高优先级</option>
      </select>
      <button onclick="addTask()">新增</button>
    </div>
  </div>

  <div id="taskList" class="card"></div>

  <div class="bottom-bar">
    <button class="btn-clear" onclick="showClearDoneModal()">清除已完成</button>
    <button class="btn-clear" onclick="showClearAllModal()">清空全部</button>
  </div>

  <!-- 修改弹窗 -->
  <div class="modal" id="editModal">
    <div class="modal-box">
      <div class="modal-title">修改待办</div>
      <input type="text" id="editInput" class="modal-input">
      <div class="modal-buttons">
        <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn btn-confirm" onclick="saveEdit()">确认</button>
      </div>
    </div>
  </div>

  <!-- 清空全部弹窗 -->
  <div class="modal" id="clearAllModal">
    <div class="modal-box">
      <div class="modal-title">提示</div>
      <div style="margin-bottom:16px">确定要清空所有待办吗？</div>
      <div class="modal-buttons">
        <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn btn-confirm" onclick="doClearAll()">确认</button>
      </div>
    </div>
  </div>

  <!-- 清除已完成弹窗 -->
  <div class="modal" id="clearDoneModal">
    <div class="modal-box">
      <div class="modal-title">提示</div>
      <div style="margin-bottom:16px">确定要清除已完成的任务吗？</div>
      <div class="modal-buttons">
        <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn btn-confirm" onclick="doClearDone()">确认</button>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('taskInput');
    const priority = document.getElementById('priority');
    const list = document.getElementById('taskList');
    const editModal = document.getElementById('editModal');
    const clearAllModal = document.getElementById('clearAllModal');
    const clearDoneModal = document.getElementById('clearDoneModal');
    const editInput = document.getElementById('editInput');
    let currentEditIndex = null;

    function getTasks() {
      return JSON.parse(localStorage.getItem('todos')) || [];
    }

    function saveTasks(tasks) {
      localStorage.setItem('todos', JSON.stringify(tasks));
    }

    function render() {
      const tasks = getTasks();
      list.innerHTML = '';

      tasks.forEach((task, index) => {
        const el = document.createElement('div');
        el.className = 'task ' + task.priority;
        el.innerHTML = `
          <div class="task-left">
            <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleDone(${index})">
            <div class="task-text ${task.done ? 'done' : ''}">${task.text}</div>
          </div>
          <div class="task-buttons">
            <button class="btn-edit" onclick="openEditModal(${index})">修改</button>
            <button class="btn-del" onclick="deleteTask(${index})">删除</button>
          </div>
        `;
        list.appendChild(el);
      });
    }

    // 关闭所有弹窗
    function closeModal() {
      editModal.style.display = "none";
      clearAllModal.style.display = "none";
      clearDoneModal.style.display = "none";
      currentEditIndex = null;
    }

    // 修改弹窗
    function openEditModal(index) {
      const tasks = getTasks();
      currentEditIndex = index;
      editInput.value = tasks[index].text;
      editModal.style.display = "flex";
    }

    function saveEdit() {
      const val = editInput.value.trim();
      if (!val) return;

      const tasks = getTasks();
      tasks[currentEditIndex].text = val;
      saveTasks(tasks);
      render();
      closeModal();
    }

    // 清空全部弹窗
    function showClearAllModal() {
      clearAllModal.style.display = "flex";
    }

    function doClearAll() {
      saveTasks([]);
      render();
      closeModal();
    }

    // 清除已完成弹窗
    function showClearDoneModal() {
      clearDoneModal.style.display = "flex";
    }

    function doClearDone() {
      let tasks = getTasks();
      tasks = tasks.filter(t => !t.done);
      saveTasks(tasks);
      render();
      closeModal();
    }

    // 基础功能
    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      const tasks = getTasks();
      tasks.push({
        text: text,
        done: false,
        priority: priority.value
      });

      saveTasks(tasks);
      input.value = '';
      render();
    }

    function toggleDone(index) {
      const tasks = getTasks();
      tasks[index].done = !tasks[index].done;
      saveTasks(tasks);
      render();
    }

    function deleteTask(index) {
      const tasks = getTasks();
      tasks.splice(index, 1);
      saveTasks(tasks);
      render();
    }

    render();
  </script>
</body>
</html>

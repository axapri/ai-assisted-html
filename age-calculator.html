<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axapri | 年龄计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            transition: all 0.25s ease;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f9fafb;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.04);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            text-align: center;
            overflow: hidden;
        }
        .title {
            font-size: 26px;
            font-weight: 600;
            color: #111827;
        }
        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 15px;
            text-align: center;
            min-width: 0;
        }
        .result {
            font-size: 20px;
            color: #2563eb;
            font-weight: 600;
            padding: 16px;
            background: #f9fafb;
            border-radius: 12px;
            min-height: 60px;
            width: 100%;
            white-space: pre-wrap; 
            word-wrap: break-word;
            line-height: 1.4;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }
        .calc {
            background: #2563eb;
            color: white;
        }
        .clear {
            background: #e5e7eb;
            color: #374151;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">年龄计算器</div>

    <div class="input-row">
        <input type="number" id="year" placeholder="年">
        <input type="number" id="month" placeholder="月">
        <input type="number" id="day" placeholder="日">
    </div>

    <div class="result" id="res"></div>

    <div class="btn-group">
        <button class="btn calc" onclick="calc()">计算</button>
        <button class="btn clear" onclick="clearAll()">清空</button>
    </div>
</div>

<script>
function calc() {
    const y = year.value;
    const m = month.value;
    const d = day.value;

    if (!y || !m || !d) {
        res.innerText = "请填写完整年月日";
        return;
    }

    const birth = new Date(y, m - 1, d);
    const now = new Date();
    
    // 计算年龄
    let age = now.getFullYear() - birth.getFullYear();
    if (now < new Date(now.getFullYear(), birth.getMonth(), birth.getDate())) age--;
    
    // 计算总天数
    const days = Math.floor((now - birth) / (1000 * 60 * 60 * 24));
    
    // 两行显示，自动换行，绝不超出卡片
    res.innerText = `年龄：${age} 岁\n总天数：${days} 天`;
}

function clearAll() {
    year.value = "";
    month.value = "";
    day.value = "";
    res.innerText = "";
}
</script>
</body>
</html>

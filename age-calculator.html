<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axapri | 年龄计算器</title>
    <link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            transition: all 0.25s ease;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafafa;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.06);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            text-align: center;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            color: #ae3333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 15px;
            text-align: center;
            min-width: 0;
        }
        input:focus {
            outline: none;
            border-color: #ae3333;
        }
        .result {
            font-size: 20px;
            color: #ae3333;
            font-weight: 600;
            padding: 16px;
            background: #f9f9f9;
            border-radius: 12px;
            min-height: 60px;
            width: 100%;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
            border: 1px solid #f0f0f0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        .calc {
            background: #ae3333;
            color: white;
        }
        .calc:hover {
            background: #962b2b;
        }
        .clear {
            background: #e5e7eb;
            color: #374151;
        }
        .clear:hover {
            background: #d8d8d8;
        }

        .back-home {
            color: #ae3333;
            text-decoration: none;
            font-size: 14px;
        }
        .back-home:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 8px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">
        <i class="fa-solid fa-cake-candles"></i>年龄计算器
    </div>

    <div class="input-row">
        <input type="number" id="year" placeholder="年">
        <input type="number" id="month" placeholder="月">
        <input type="number" id="day" placeholder="日">
    </div>

    <div class="result" id="res"></div>

    <div class="btn-group">
        <button class="btn calc" onclick="calc()">计算</button>
        <button class="btn clear" onclick="clearAll()">清空</button>
    </div>

    <a href="index.html" class="back-home">首页</a>
    <div class="footer">© 2026 Axapri · 记录学习与创作</div>
</div>

<script>
function calc() {
    const y = document.getElementById('year').value;
    const m = document.getElementById('month').value;
    const d = document.getElementById('day').value;
    const res = document.getElementById('res');

    if (!y || !m || !d) {
        res.innerText = "请填写完整年月日";
        return;
    }

    const birth = new Date(y, m - 1, d);
    const now = new Date();
    
    let age = now.getFullYear() - birth.getFullYear();
    if (now < new Date(now.getFullYear(), birth.getMonth(), birth.getDate())) {
        age--;
    }
    
    const days = Math.floor((now - birth) / (1000 * 60 * 60 * 24));
    res.innerText = `年龄：${age} 岁\n总天数：${days} 天`;
}

function clearAll() {
    document.getElementById('year').value = "";
    document.getElementById('month').value = "";
    document.getElementById('day').value = "";
    document.getElementById('res').innerText = "";
}
</script>
</body>
</html>

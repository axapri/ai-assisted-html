<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axapri | 页面失踪</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

html, body {
  overflow: hidden;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
body::-webkit-scrollbar {
  display: none;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ffffff;
  color: #111111;
  padding: 24px;
}

.wrap {
  width: 100%;
  max-width: 460px;
  text-align: center;
}

.code {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 20px;
  color: #111;
}

.text {
  font-size: 16px;
  color: #555;
  line-height: 1.6;
  margin-bottom: 36px;
}

.button {
  display: inline-block;
  padding: 14px 30px;
  border-radius: 12px;
  background: #f1f1f1;
  color: #111;
  text-decoration: none;
  font-weight: 500;
  transition: all 0.2s ease;
}

.button:hover {
  background: #e0e0e0;
  transform: translateY(-1px);
}
</style>
</head>

<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="text">抱歉，您访问的页面不存在或已被移除。</div>
    <a href="https://axapri.github.io/ai-assisted-html/" class="button">返回首页</a>
  </div>
</body>
</html>

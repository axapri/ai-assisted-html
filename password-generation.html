<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 禁止页面缩放，保持界面稳定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Axapri | 密码生成器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --dark: #1e293b;
            --gray: #94a3b8;
            --radius: 12px;
        }

        body {
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 24px;
        }

        .title i {
            color: var(--primary);
        }

        .password-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        #password {
            width: 100%;
            padding: 16px 70px 16px 18px;
            font-size: 16px;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            background: #fafbfc;
            outline: none;
            letter-spacing: 1px;
            color: var(--dark);
        }

        #password:focus {
            border-color: var(--primary);
        }

        .copy-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            font-size: 18px;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #edefff;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0;
        }

        .row label {
            color: #334155;
            font-size: 15px;
        }

        /* 固定密码长度输入框，禁止放大 */
        input[type="number"] {
            width: 70px !important;
            height: 36px !important;
            padding: 8px 10px !important;
            font-size: 15px !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 8px !important;
            outline: none !important;
            text-align: center !important;
        }

        input[type="number"]:focus {
            border-color: var(--primary) !important;
        }

        .checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
        }

        .checkbox:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox:checked::after {
            content: "\f00c";
            font-family: FontAwesome;
            color: #fff;
            font-size: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .generate {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 500;
            margin-top: 24px;
            cursor: pointer;
        }

        .generate:hover {
            background: #4f46e5;
        }

        .tip {
            text-align: center;
            font-size: 12px;
            color: var(--gray);
            margin-top: 16px;
        }

        .symbol-title {
            margin: 18px 0 10px;
            font-size: 14px;
            color: var(--gray);
        }

        .symbol-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .symbol-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 6px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
        }

        .symbol-item:hover {
            border-color: var(--primary);
            background: #f8faff;
        }

        .symbol-item span {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="title">
            <i class="fa fa-key"></i> 密码生成器
        </div>

        <!-- 密码展示框 -->
        <div class="password-wrapper">
            <input type="text" id="password" readonly placeholder="点击生成">
            <button class="copy-btn" onclick="copyPassword()">
                <i class="fa fa-clipboard"></i>
            </button>
        </div>

        <!-- 密码长度设置 -->
        <div class="row">
            <label>密码长度</label>
            <input type="number" id="len" min="4" max="32" value="16">
        </div>

        <!-- 字符类型选择 -->
        <div class="row">
            <label>大写字母 A-Z</label>
            <input type="checkbox" class="checkbox" id="upper" checked>
        </div>
        <div class="row">
            <label>小写字母 a-z</label>
            <input type="checkbox" class="checkbox" id="lower" checked>
        </div>
        <div class="row">
            <label>数字 0-9</label>
            <input type="checkbox" class="checkbox" id="num" checked>
        </div>

        <!-- 特殊符号选择 -->
        <div class="symbol-title">自定义特殊符号</div>
        <div class="symbol-grid">
            <div class="symbol-item" onclick="toggleSym(this)"><span>!</span><input type="checkbox" class="checkbox sym" data-char="!" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>@</span><input type="checkbox" class="checkbox sym" data-char="@" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>#</span><input type="checkbox" class="checkbox sym" data-char="#" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>$</span><input type="checkbox" class="checkbox sym" data-char="$" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>%</span><input type="checkbox" class="checkbox sym" data-char="%" onclick="event.stopPropagation()"></div>

            <div class="symbol-item" onclick="toggleSym(this)"><span>&</span><input type="checkbox" class="checkbox sym" data-char="&" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>*</span><input type="checkbox" class="checkbox sym" data-char="*" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>-</span><input type="checkbox" class="checkbox sym" data-char="-" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>_</span><input type="checkbox" class="checkbox sym" data-char="_" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>+</span><input type="checkbox" class="checkbox sym" data-char="+" onclick="event.stopPropagation()"></div>

            <div class="symbol-item" onclick="toggleSym(this)"><span>=</span><input type="checkbox" class="checkbox sym" data-char="=" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>?</span><input type="checkbox" class="checkbox sym" data-char="?" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>(</span><input type="checkbox" class="checkbox sym" data-char="(" onclick="event.stopPropagation()"></div>
            <div class="symbol-item" onclick="toggleSym(this)"><span>)</span><input type="checkbox" class="checkbox sym" data-char=")" onclick="event.stopPropagation()"></div>
        </div>

        <button class="generate" onclick="generatePassword()">生成密码</button>
        <div class="tip">本地计算，不上传服务器</div>
    </div>

    <script>
        // 缓存DOM元素，提升性能
        const pwdInput = document.getElementById('password');
        const lenInput = document.getElementById('len');
        const symCheckboxes = document.querySelectorAll('.sym');

        /**
         * 切换特殊符号选中状态（点击卡片生效）
         */
        function toggleSym(element) {
            const checkbox = element.querySelector('.sym');
            checkbox.checked = !checkbox.checked;
        }

        /**
         * 生成密码（支持疯狂连点，极致流畅）
         */
        function generatePassword() {
            const length = parseInt(lenInput.value);
            let charPool = '';

            // 拼接选中的字符集
            if (document.getElementById('upper').checked) charPool += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (document.getElementById('lower').checked) charPool += 'abcdefghijklmnopqrstuvwxyz';
            if (document.getElementById('num').checked) charPool += '0123456789';
            
            // 拼接选中的特殊符号
            symCheckboxes.forEach(checkbox => {
                if (checkbox.checked) charPool += checkbox.dataset.char;
            });

            // 无字符时提示
            if (!charPool) {
                alert('请至少选择一种字符');
                return;
            }

            // 生成随机密码
            let password = '';
            const poolLength = charPool.length;
            for (let i = 0; i < length; i++) {
                password += charPool[Math.floor(Math.random() * poolLength)];
            }

            pwdInput.value = password;
        }

        /**
         * 复制密码到剪贴板
         */
        async function copyPassword() {
            if (!pwdInput.value) {
                alert('请先生成密码');
                return;
            }
            await navigator.clipboard.writeText(pwdInput.value);
        }
    </script>
</body>
</html>

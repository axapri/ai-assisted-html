<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axapri | 自由进制转换</title>
    <link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ae3333;
            --dark: #1e293b;
            --gray: #94a3b8;
            --radius: 14px;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafafa;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            gap: 22px;
            text-align: center;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .label-row {
            display: flex;
            gap: 14px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--gray);
            padding: 0 4px;
            text-align: left;
        }
        .label-row span {
            flex: 1;
        }

        .select-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        select {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 15px;
            text-align: center;
            min-width: 0;
            background: #fff;
            outline: none;
        }
        select:focus {
            border-color: var(--primary);
        }

        .input-box {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 15px;
            text-align: center;
            outline: none;
        }
        .input-box:focus {
            border-color: var(--primary);
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: #962b2b;
        }
        .btn-clear {
            background: #e5e7eb;
            color: #374151;
        }
        .btn-clear:hover {
            background: #d8d8d8;
        }

        .result {
            font-size: 20px;
            color: var(--primary);
            font-weight: 600;
            padding: 16px;
            background: #f9f9f9;
            border-radius: 12px;
            min-height: 60px;
            width: 100%;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tip {
            font-size: 12px;
            color: var(--gray);
        }

        .back-home {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }
        .back-home:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 8px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">
        <i class="fa-solid fa-exchange"></i> 自由进制转换
    </div>

    <div class="label-row">
        <span>源进制</span>
        <span>目标进制</span>
    </div>

    <div class="select-row">
        <select id="from">
            <option value="2">二进制</option>
            <option value="8">八进制</option>
            <option value="10" selected>十进制</option>
            <option value="16">十六进制</option>
        </select>
        <select id="to">
            <option value="2">二进制</option>
            <option value="8">八进制</option>
            <option value="10">十进制</option>
            <option value="16" selected>十六进制</option>
        </select>
    </div>

    <input type="text" class="input-box" id="input" placeholder="输入数字">
    
    <!-- 两个按钮：转换 + 清空 -->
    <div class="btn-group">
        <button class="btn btn-primary" onclick="convert()">开始转换</button>
        <button class="btn btn-clear" onclick="clearAll()">清空</button>
    </div>

    <div class="result" id="result">结果将显示在这里</div>

    <div class="tip">支持 2/8/10/16 任意互相转换 · 本地计算</div>

    <a href="index.html" class="back-home">首页</a>
    <div class="footer">© 2026 Axapri · 记录学习与创作</div>
</div>

<script>
const inputEl = document.getElementById('input');
const resultEl = document.getElementById('result');

inputEl.addEventListener('input', function() {
    if (this.value.trim() === '') {
        resultEl.innerText = '结果将显示在这里';
    }
});

function convert() {
    const from = parseInt(document.getElementById('from').value);
    const to = parseInt(document.getElementById('to').value);
    const val = inputEl.value.trim();

    if (!val) {
        resultEl.innerText = '请输入内容';
        return;
    }

    try {
        const dec = parseInt(val, from);
        const res = dec.toString(to).toUpperCase();
        resultEl.innerText = res;
    } catch (e) {
        resultEl.innerText = '输入格式错误';
    }
}

// 清空功能
function clearAll() {
    inputEl.value = "";
    resultEl.innerText = "结果将显示在这里";
}
</script>
</body>
</html>

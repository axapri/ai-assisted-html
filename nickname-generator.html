<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 温柔昵称生成器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }
        .theme-dark {
            --bg: #111827;
            --text: #f3f6f6;
            --subtext: #9ca3af;
            --border: #374151;
            --theme: #c94444;
            --card: #1f3133;
            --hover: #374151;
        }
        .theme-green {
            --bg: #f8fff9;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dcfce7;
            --theme: #16a34a;
            --card: #f0fdf4;
            --hover: #dcfce7;
        }
        .theme-blue {
            --bg: #f8fafc;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dbeafe;
            --theme: #3b82f6;
            --card: #eff6ff;
            --hover: #dbeafe;
        }
        .theme-purple {
            --bg: #fdfaff;
            --text: #1e293b;
            --subtext: #475569;
            --border: #f3e8ff;
            --theme: #a855f7;
            --card: #faf5ff;
            --hover: #f3e8ff;
        }
        .theme-yellow {
            --bg: #fffbeb;
            --text: #292524;
            --subtext: #78716c;
            --border: #fef3c7;
            --theme: #d97706;
            --card: #fffced;
            --hover: #fef3c7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .nickname {
            font-size: 22px;
            color: var(--theme);
            line-height: 1.8;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--theme);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-copy {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
        }

        .soft-text {
            margin-top: 20px;
            font-size: 14px;
            color: var(--subtext);
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-feather"></i>温柔昵称生成器
        </div>
        <div class="desc">生成晚风、月色、治愈系文艺网名</div>

        <div class="result-card">
            <div class="nickname" id="nickname">等待生成温柔昵称</div>
        </div>

        <button class="btn-generate" id="genBtn">生成新昵称</button>
        <button class="btn-copy" id="copyBtn">复制当前昵称</button>

        <div class="soft-text">
            自带晚风氛围感，适合网名、个性签名、主页备注
        </div>
    </div>

    <script>
        document.body.className = localStorage.getItem('site-theme') ? 'theme-' + localStorage.getItem('site-theme') : '';

        const nameList = [
            "晚风寄信", "月色沉人间", "山野赴秋", "云间贩温柔",
            "借一场晚风", "星河漫枕边", "人间拾温柔", "风落旧山川",
            "枕星而眠", "雾里藏温柔", "落日邮递员", "山河皆入梦",
            "风捎来温柔", "半勺月光", "林间听风", "与晚风私语",
            "温一壶月色", "清风渡我", "秋意漫星河", "落日余温柔",
            "月亮不打烊", "晚风遇黄昏", "云边小卖部", "星河失眠记"
        ];

        const nickEl = document.getElementById('nickname');
        const genBtn = document.getElementById('genBtn');
        const copyBtn = document.getElementById('copyBtn');
        let nowName = '';

        // 生成昵称
        genBtn.onclick = function () {
            nowName = nameList[Math.floor(Math.random() * nameList.length)];
            nickEl.innerText = nowName;
        };

        // 复制功能（兼容所有浏览器）
        copyBtn.onclick = function () {
            if (!nowName) {
                alert('请先生成昵称哦~');
                return;
            }
            
            // 复制方法
            const input = document.createElement('textarea');
            input.value = nowName;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            
            alert('复制成功啦！✨\n' + nowName);
        };
    </script>
</body>
</html>

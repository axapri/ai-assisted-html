<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Axapri | 生命倒计时</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.2s ease, background-color 0.25s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        :root {
            --bg: #ffffff;
            --text: #24292f;
            --subtext: #6b7880;
            --border: #e5e7eb;
            --theme: #ae3333;
            --card: #f9f9f9;
            --hover: #f1f1f1;
        }
        .theme-dark {
            --bg: #111827;
            --text: #f3f6f6;
            --subtext: #9ca3af;
            --border: #374151;
            --theme: #c94444;
            --card: #1f3133;
            --hover: #374151;
        }
        .theme-green {
            --bg: #f8fff9;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dcfce7;
            --theme: #16a34a;
            --card: #f0fdf4;
            --hover: #dcfce7;
        }
        .theme-blue {
            --bg: #f8fafc;
            --text: #1e293b;
            --subtext: #475569;
            --border: #dbeafe;
            --theme: #3b82f6;
            --card: #eff6ff;
            --hover: #dbeafe;
        }
        .theme-purple {
            --bg: #fdfaff;
            --text: #1e293b;
            --subtext: #475569;
            --border: #f3e8ff;
            --theme: #a855f7;
            --card: #faf5ff;
            --hover: #f3e8ff;
        }
        .theme-yellow {
            --bg: #fffbeb;
            --text: #292524;
            --subtext: #78716c;
            --border: #fef3c7;
            --theme: #d97706;
            --card: #fffced;
            --hover: #fef3c7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            color: var(--theme);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .desc {
            text-align: center;
            color: var(--subtext);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .item {
            margin-bottom: 24px;
        }

        .item label {
            display: block;
            font-size: 15px;
            color: var(--subtext);
            margin-bottom: 8px;
        }

        input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--card);
            color: var(--text);
            outline: none;
        }

        .btn-box {
            display: flex;
            gap: 14px;
            margin: 40px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        #start {
            background: var(--theme);
            color: #fff;
        }

        #reset {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .show-box {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .label {
            color: var(--subtext);
            font-size: 15px;
            margin-bottom: 12px;
        }

        .sec {
            font-size: 50px;
            font-weight: 700;
            color: var(--theme);
            letter-spacing: 2px;
        }

        .text {
            margin-top: 16px;
            font-size: 14px;
            color: var(--subtext);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <i class="fa-solid fa-hourglass-half"></i>生命倒计时
        </div>
        <div class="desc">时光温柔，生活可爱，岁月自有答案</div>

        <div class="item">
            <label>出生日期</label>
            <input type="date" id="birth">
        </div>

        <div class="item">
            <label>结束日期</label>
            <input type="date" id="end">
        </div>

        <div class="btn-box">
            <button id="start">开始倒计时</button>
            <button id="reset">重置</button>
        </div>

        <div class="show-box">
            <div class="label">剩余总秒数</div>
            <div class="sec" id="show">0</div>
            <div class="text">愿你在有限时光里，活出无限温柔与热爱</div>
        </div>
    </div>

    <script>
        let timer = null;
        let endStamp = 0;

        // 主题同步
        document.body.className = localStorage.getItem('site-theme') ? 'theme-' + localStorage.getItem('site-theme') : '';

        // 加载保存
        window.onload = function () {
            let b = localStorage.getItem('life_birth');
            let e = localStorage.getItem('life_end');
            let s = localStorage.getItem('life_target');

            if (b) document.getElementById('birth').value = b;
            if (e) document.getElementById('end').value = e;
            if (s) endStamp = Number(s);
        };

        // 开始
        document.getElementById('start').onclick = function () {
            let birth = document.getElementById('birth').value;
            let end = document.getElementById('end').value;

            if (!birth || !end) {
                alert('请选择两个日期');
                return;
            }

            let et = new Date(end).getTime();
            if (et <= Date.now()) {
                alert('结束日期必须晚于现在');
                return;
            }

            localStorage.setItem('life_birth', birth);
            localStorage.setItem('life_end', end);
            endStamp = et;
            localStorage.setItem('life_target', endStamp);

            run();
        };

        function run() {
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                let diff = endStamp - Date.now();
                if (diff <= 0) {
                    clearInterval(timer);
                    document.getElementById('show').innerText = '0';
                    return;
                }
                let sec = Math.floor(diff / 1000);
                document.getElementById('show').innerText = sec.toLocaleString();
            }, 1000);
        }

        // 重置
        document.getElementById('reset').onclick = function () {
            clearInterval(timer);
            timer = null;
            localStorage.removeItem('life_birth');
            localStorage.removeItem('life_end');
            localStorage.removeItem('life_target');
            document.getElementById('birth').value = '';
            document.getElementById('end').value = '';
            document.getElementById('show').innerText = '0';
        };
    </script>
</body>
</html>

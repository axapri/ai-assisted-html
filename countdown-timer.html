<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axapri | 倒计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f9fafb;
            padding: 20px;
        }
        .box {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.04);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .title {
            font-size: 32px;
            font-weight: 600;
            color: #111827;
        }
        .time {
            font-size: 64px;
            font-weight: 700;
            color: #2563eb;
        }
        .input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        input {
            width: 100px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            text-align: center;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .start { background: #2563eb; color: white; }
        .reset { background: #e5e7eb; color: #374151; }

        .finish {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            flex-direction: column;
            gap: 24px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .finish-card {
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            animation: pop 0.5s 0.1s ease forwards;
            opacity: 0;
        }

        @keyframes pop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .finish-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .finish h2 {
            font-size: 36px;
            color: #2563eb;
            margin-bottom: 8px;
        }
        .finish p {
            font-size: 16px;
            color: #6b7280;
        }
        .finish button {
            margin-top: 20px;
            padding: 14px 36px;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37,99,235,0.2);
        }
        .finish button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37,99,235,0.3);
        }
    </style>
</head>
<body>

<div class="box">
    <div class="title">倒计时器</div>
    <div class="time" id="show">00:00</div>
    <div class="input-group">
        <input type="number" id="min" placeholder="分钟" value="0">
        <input type="number" id="sec" placeholder="秒" value="0">
    </div>
    <div class="btn-group">
        <button class="btn start" id="start">开始</button>
        <button class="btn reset" id="reset">重置</button>
    </div>
</div>

<div class="finish" id="finish">
    <div class="finish-card">
        <div class="finish-icon">⏰</div>
        <h2>时间到！</h2>
        <p>倒计时已顺利结束</p>
        <button id="closeFinish">确定</button>
    </div>
</div>

<script>
    let t = null
    const minInput = document.getElementById('min')
    const secInput = document.getElementById('sec')
    const show = document.getElementById('show')
    const finish = document.getElementById('finish')

    function showTime(m,s){
        show.innerText = `${String(m).padStart(2,0)}:${String(s).padStart(2,0)}`
    }

    start.onclick = ()=>{
        clearInterval(t)
        finish.style.display = 'none'
        let m = +minInput.value
        let s = +secInput.value
        showTime(m,s)
        t = setInterval(()=>{
            if(s==0){
                if(m==0){
                    clearInterval(t)
                    finish.style.display = 'flex'
                    return
                }
                m--
                s=59
            }else{
                s--
            }
            showTime(m,s)
        },1000)
    }

    reset.onclick = ()=>{
        clearInterval(t)
        minInput.value = 0
        secInput.value = 0
        showTime(0, 0)
        finish.style.display = 'none'
    }

    closeFinish.onclick = ()=>{
        finish.style.display = 'none'
        minInput.value = 0
        secInput.value = 0
        showTime(0, 0)
        clearInterval(t)
    }
</script>
</body>
</html>
